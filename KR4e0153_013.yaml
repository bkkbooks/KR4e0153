body:
  text: 華泉集卷十三明邊貢撰文集祭文始自荆州奔喪告文嗚呼吾父委棄二孤五閲月於兹矣兒始得自荆州反哭於靈所終天之慟尚忍言哉去歲四月要吾父於臨清兒跪請偕行而吾父弗許則以道逺之故與川冦之警也今歲五月書來奉迎又阻於河北之擾吏僕徒返兒心用傷然教兒以訓辭示兒以詩篇字畫宛如情言和易是為六月十有七日拜誦竊以自慰孰知兒得報之辰乃吾父易簀之際也往吾父以兒耽嗜詞章意每不喜凡所自製咸弗示及兒得示竊以自喜嗚呼孰知為吾父之絶筆也耶逆旅之别兒奉觴涕下如縻吾父雖厲色斥兒然仰視吾父之涕固自不能收矣向風長號回軫嗚呼兒竊私異之往歲有行無若是之悲也兒在荆南延首北望思而泣泣而思恆以不見顔色為慮兒又私異之嗚呼乃今竟不及見顔色爾矣終天之慟尚忍言哉兒生三十六歲於兹矣六歲而侍吾祖奉政公於南都十四而歸二十一而繫身仕版中更十有五年雖吾父數至都下然聚不踰旬别則纍歲總而要之蓋自有生以至永訣聚者半别者半也兒在荆南實擬今秋圖乞終飬甘旨之疏曠於是乎補家世之履行於是乎徵兒之心所欲陳於吾父之前者豈一二而已也而乃遂委棄以去而又無一詞以遺我豈吾父垂不言之教耶無亦積沉痛於中懷而不忍發也將使兒子輩奚所遵述焉嗚呼已矣不可及矣復何言也昔有聚合吾父未嘗不為兒醉今之返也門庭颯然堂宇如故而吾父之聲咳遐焉杳矣叩棺告至吾父有知其復起而卒此一爵否耶幽明茫茫一慟肝裂嗚呼已矣謹告祖奠先府君文新壙告成靈車進御吾父將棄我母舍我二孤而長去矣終天之痛何可言哉嗚呼吾父有𢎞博之才而終於舉人有開濟之謨而止於五品有仁壽之德而躋於六旬此他人為吾父之所不平也而况為之兒子者耶嗚呼鴈門之行二載馳驟鬚髮嫶然面目黧瘦蓋嘗泣别於都門矣吾父罷官貢亦出守逆旅骨肉笑談杯酒又嘗瞻侍於臨清矣顔枯者丹髮瘁者華壽考之徵百歲未涯孰謂吾父遽舍我而去邪嗚呼舟中之言皎月在空子請父行父不子從父曰子行戒爾王程越明年春視爾於荆子往於荆父還於濟南北相望六千其里去春之季膏車載迎父罔此來實勞子情謂父優遊戀此桑梓哀哉抱痾乃竟不起嗚呼孰知吾父遽舍我而去耶子歸自荆父殯於室母也竛竮弟也踊躃音容渺漠庭宇荒涼寒燈照帷曉日無光嗚呼吾父育我二孤恩德惟均而父之終也貢曽不及奉枕席試湯藥以左右於一日是吾父之於子有粉軀莫報之恩而子之於父有擢髮難名之罪也一身萬死將何贖哉繼今以往惟當帥弟事母終子之身無有携二凡家門之事一托之弟而貢也服役於公若或仗吾父之蔭庇厥績用成得以沐天子之休命俾吾父之名托而有傳庶幾沒齒敢以謁靈魂於地下也嗚呼厥明之晨言赴窀穸吾父將舍我母棄我二孤而長去矣爰酹巵酒以伸虔告終天之痛何可言哉尚饗遷墓告代州府君文維宋大儒曰程伊川葬訓是垂五患維先維五患者道路伊首耕犂殿之百代是守我塋既隘西枕田溪我父維昭位祖之西既邇耕犂亦侵道路改卜新塋維此之故新塋何指云舊之東􅀢山峩峩佳城在中明發之旦辰良日吉爰鳩石工建此幽室嗚呼我父棄養兒仕於荆遺言罔叩悠悠死生維兹改卜實重之舉請命靈筵杳不聞語我思晦翁厥賢靡過考葬崇安母葬嘉禾維我先君夙孝夙敬葬弗從兆斯疚斯怲人亦有言木本水源豈兒狂悖敢忘厥恩新塋之田既曠既膴誓將後期歸我列祖崇肴在登醑酒亦澄臨堂告虔五內分崩謹告代胡東臺祭外舅姑文古稱半子維女之夫維我受德子弗之踰古稱冰玉維翁與壻自舅自我斯伉斯儷古稱髙尚曰龎德公維舅維姑實符實同既豐其家亦厚其族人嗜其羣我嗜其獨曰壽曰康乃考其終同室同穴矢言則從於戲舅氏之沒我使於廣豈不懷歸王事鞅掌姑氏之沒我仕於西太行嵳峩東望雲迷病弗侍牀殮弗侍寢悠悠我懷有恨空飲絮酒瓣香爰寫我哀二靈昭昭惠然其來尚饗祭吳廷贊大尹父文惟靈至性天成懿德允備秀鍾帝里學擅天官進獲大亨退沾休寵九齡斯近五福惟兼生順死安在公何憾粵惟令子實牧我民如春之仁如冰之操秋毫無染百廢俱興奉靈北旋祖道在即慈母之去赤子皇皇攀留莫從涕泣如雨敬陳明水爰寫哀悰尚饗祭賈編修母文維正德二載夏四月乙未潁川賈內史之母曹夫人考終命於家浹辰家人以訃至內史篤孝顚隕幾絶再踰月將返於喪次太常寺丞某素交內史瞻送惋惻於是束帛為禮以告於夫人之靈曰先民有言無生不死無盈不毁惟有令名雖死猶生始內史之歸也將畢養是圖夫人戒之曰吾以爾兄養爾勿以吾廢忠也及內史之來也身在朝列戚戚焉未嘗一日違夫人之左右蓋虞其不及見曷竟爾然也嗚呼悲哉然竊聞之婦人之美不外見也俟夫與子而已今五尺童子莫不知陶母之賢與德曜之髙者以伯鸞為之夫而侃為之子也內史之修譽於朝而為天子文學之臣時議比之瑚璉鼎鐘而天下由是慕封君之風者相望也夫人之心尚奚憾哉嗚呼如夫人者可以不死矣尚饗祭陳處士文吁維明靈以勤儉開厥家用底於裕維嗣昆式克肖懋德咸用昌於厥家五福用備鄉閭州黨罔弗敬從天乃弗弔大命顚隮用弗終厥享鄉閭州黨亦罔弗咨豫維嗣息締厥世好乃弗覿於婚媾豫用䀌傷爰潔牲以告維冥𡨕弗爽其用降監於兹祭趙錦衣母文昔雋不疑録囚徒多所平反其母聞之喜或無所出則母怒為之不食某讀史至此未嘗不嘆其賢及讀歐陽子瀧岡阡表乃知修之賢固其母之教也伏惟夫人之夫與子階錦衣掌禁刑而子貴有加焉夫人之賢弗外章也維墓有志太史氏實闡之悉則夫人之所以教其子者亦何愧於二賢之母昔人祭歐陽子之母者其言曰孟軻大賢母之教也有子如軻母不死矣嗚呼夫人之子比於二賢夫又何憾焉尚饗祭田夫人文惟靈育德名閥貞懿夙成含沖履佶蘭芬玉瑩作配君子率由四教闡惠播仁六行允蹈既蕃子息亦享宗祧於禮斯嫻於誠孔昭君子在官有赫其望薦陟卿階曰惟中相鳴琚陸離象服煒煌朝奉兩宫休哉烈光天畀鴻吉則百斯祉人之詠之黃髮兒齒孰云上德下壽弗臻載寢載疾淪殂浹辰亟襲封褒楹陳皇奠生榮死哀同咨並羡凡兹僚佐式仰徽音爰薦芳旨靈鑒且歆尚饗祭董舅氏文維𢎞治年月日外甥太常寺博士邊貢謹具香幣之儀寄奠於元舅董府君靈寢而告之以言曰貢之身出於母貢母之身出於外祖外祖沒貢不及見有舅氏在則猶外祖也貢仕而别母者六年兩見舅氏於都下則猶見母也今亦沒矣能無慟耶舅之性忠直才頴且介宜顯逺而位止驛官孝於親慈於子友於昆妹和於鄉黨州閭宜耄以期竟踰下壽而止自舅氏視之則固恬如晏如含笑永終知舅氏者當不能無惑於蒼𡨕也吾外兄弟秀立芃芃然足以華族裕家未竟之享意其在是惟舅氏之疾與葬貢曽未得一問且送之徒疚心於千里之外慟可言哉嗚呼東門奉觴言猶在耳詎知一别遂爾永違雖音塵其已消諒精爽之難昧舅氏能歆此遙意否耶尚饗祭尹冡宰文嗚呼光嶽氣分士無全才才難之嘆自尼父已前聞矣太行以東大江以北論形勝者必齊魯是歸海山之秀厯幾千百年一旦而鍾於公身貢嘗竊評之蓋百代之英而王佐之才也公為童子即岐嶷擅時譽弱冠而舉於鄉褎然居首擢第春官入翰苑以文名於四方求之古人則有如賈生韓愈者矣其在諫院也正色立朝剛毅靡屈引忠賢如不及遇回佞之黨至奮臂以擊之天威赫然執簡傍立一時奏對且前且却或至再三殿庭觀者皆汗縮竦聽退而莫不咨嗟歎服以為難求之古人則有如包孝肅劉元城者矣由銀臺入天曹公正之心濟以機警內外選舉並得其才雖書牘錯落盈案而發摘姦巧明照若神至今嘖嘖不輟談者之口求之古人則有如山濤范雲者矣其致仕以歸也雖身在山林而心馳廊廟朝報之至聞一政不便於民者輒不悅數日然見退一小人進一君子必喜而不寐曰是社稷之福也是社稷之福也古之人進不趨榮退而憂國蓋有如杜衍韓琦者矣嗚呼之數才者生非一鄉出不同世英風雋聞各炳書史而公以一身兼之可不謂之難乎使其未去以竟厥施伊傅周召有不得以專其美矣惜夫衆忌羣猜不使公一日以安其位之為快也嗚呼悲哉公之在野國之有楨公之云亡大厦以傾海波𡨕𡨕嶽雲楚楚公神在天誰繼其武嗚呼悲哉尚饗祭周于庭文嗟哉于庭稑而不穡蕖而不菂有鬱斯幹乃不千尺矧維父兄流淚到泉凡我年家誰不泫然子之尊公曰少司馬勳在王室名播天下子之哲兄曰秋官郎惟明惟允刑譽四揚簪笏之繼維子之望心子目子扶摶而上爰遘斯疾竟爾沉綿豈子願然實懸於天天司下人培淑覆德今也罔徵遂至此極充乎其容溫乎其中蔚乎其章而不其逢嗟哉于庭來也孰主往也孰尸竟止於斯胡寧不悲尚饗祭魏尚默夫人黃氏文維婦之職事舅與姑匪維舅姑曰猶有夫維婦之賢曰正而固匪維正固曰先不妬靈相夫子克婉克隨於夫且然舅姑可知靈視諸媵如鞠如育於妾且然矧在姻族黽勉周旋垂三十年胡得於人不得於天維天鑒之有德斯壽靈反其理孰之云究維豫數子為夫子朋南宫之科昔也並登欣戚之共同人之有凡事則然况失其偶薄言奠之溪泉沼芹維兹姓名靈之舊聞尚饗祭王母許安人文維靈育德名閥貞懿夙成含沖履佶蘭芬玉瑩作配君子率由四教闡惠播仁六行允蹈既育元嗣亦享宗祧於誨斯嚴於誠孔昭君子在官爰淑多士曰績用成乃傅王子元嗣赫赫天部有聲載蹶載起秉憲允平既封既養偕貴偕壽晚祜實豐孰儷其偶七齡斯越二竪乃親乃棄君子仙遊八垠嗟嗟元嗣篤斯哀毁返葬於西匪杖弗起凡我庶僚元嗣同官執紼靡從遐心則慱有腯其牲有苾其酒靈之洋洋陟降左右尚饗祭都御史公先生文勉仁持公抱廉孰匪處官暗室屋漏弗愧則難糾愆觸邪孰匪執法茹柔吐剛值勢則壓於斯二者人罔克全公之履之若大路然愈久愈貞載蹶載起靡悔靡變斃而後已季春之交節鉞始南威加列城亷頑走貪孰云季秋靈駕北返丹旌搖搖巨紼斯挽人謂先生晉文子徒體不勝衣氣凌萬夫又謂先生如蜀諸葛事煩食少天降之割某等巡守兹土聞訃軫情悼公之死慕公之生爰潔我牲載醑我酒為天下悲公也知否尚饗祭李空同妻左宜人文代梧山李公作鴻偶孟光宣儷少君繄二女之柔嘉附哲夫而有聞彼𢎞農之楊媛垂閫史之清芬匪托身於柳子雖信美其孰云彼梁與鮑固獨行之士耳而宗元之膾炙人口直詞藻之芳薰惟夫人之夫子道崇學邃超夷絶羣神交賈誼駕軼劉蕡抱孤忠以抗節排衆議之紛紛世之人見其退隱若𡨕鴻翩如可望而不可即而冀其再起則將爭步疾覩又若翔鳯之下空雲視三子者其髙下何如也於夫人之沒結腸有詩銘墓有文百世之下見夫人之諱者必謂曰此空同李子之配過鈞山之麓者必指曰此宜人左氏之墳羌孰壽而孰短諒知者之能分昔者某與夫子同官江右愛踰手足而老婦之於夫人也有娣姒之好有問遺之勤側聞哀訃心焉孔殷㪺中河之明水擷南澗之清芹望城隅而修奠幸鑒止於蒿焄尚饗祭馬封君文僉事應祥之父維公生有隱行曰介曰淳陳留老父河濵丈人乃生哲子既文既武威則迅霆化其時雨維子大夫昔蒞銓司公也就養至止京師維我諸人或面或否欽德仰風若飲醇酒大夫在汴公也在鄉悠悠白雲陟岵是望大夫曰歸問寢堂下天子勿與詔旋其馬維我諸人咸悅以嘻於昔聞者今當見之孟春之交使者西來大夫有檄銜悲茹哀維我諸人載憯載怛曰此純孝情孰可奪乃瓣我薌乃縮我茅臨風寓辭以代楚招尚饗祭外舅東臺公文維正德年月日浙江右布政使東臺胡先生終於濟南越明年丙子春喪歸濵州當是時也河南按察副使邊貢也者先生甥也縶於官守不獲臨柩以拜服緦以哭挽紼以送而其哀靡以伸也於是縮茅束帛遣其弟賢告奠於先生之靈而繼之以言曰嗚呼外舅死乎真邪非邪甲戌之秋舅氏别我齊川之上頎髯長身神完而體固也而竟止於此顧又以疽死邪世傳發疽者必暴多怒必嗜酒必厚味必服金石藥而我舅氏不嗜酒也不厚味也不暴多怒也又不服金石藥不宜疽也而顧以此死邪又傳福善而禍淫者天也嗚呼今之人庸者懦者狂者悖者貧且狠者背上而虐下者豈少也然多白頭不死據髙位享豐祿焉我舅氏於兹數者有一二乎否也而方伯之官五十之壽竟止於此而又以疽死然則所謂天者與世之傳者果足信邪且以顔回之賢而貧且夭死伯牛之賢而蒙惡疾自古屈伸之數倒施而逆降者何可勝道也至於論人則於其心不於其年於其行不於其爵我舅氏即止於此以疽死然而度支之績傳於京師經略之才著於關陜平反之澤流於汾晉之郊較之白頭不死據髙位享豐祿無一善可稱述者此奚啻燕與粵哉嗚呼舅氏吾又何悲也所可悲者一歲之前舅哭吾父之墓送吾弟之死於濟東門之外孰知一歲之後而貢也與婦哭舅氏於梁園也邪嗚呼痛矣已矣不可及矣文甫弟來傳舅氏之遺命以壙志屬空同以行狀屬貢嗚呼是幽𡨕之托也何敢卒負靈之洋洋其昭鑒之尚饗祭錢封君文於戲人有恆憂積書者未必能讀而公之生也則友聖賢飫經史以鳴道於詞場教子者未必能成而公之子也則登甲科職臺史以肅振乎朝綱抱德者未必能壽而公之壽也則踰七齡介百福又暇豫而康強之三者之難致也人得一以為幸公視之以為常載膺封典於家有光蓋庶幾乎生榮死哀垂式於鄉邦者矣所惜者子之位日以顯名日以昌宦遊河洛將車迎而就祿乃奄忽以云亡貢等同官令子聞訃悽傷遡靈風而遙奠慘白日之廽光亮英爽之如在庶俯鑒於空觴尚饗祭髙運同朝用文維年月日髙陵髙朝用先生喪過大梁布政司參政王震按察司副使邊貢二人者之於先生友也於是具雞酒之奠而展弔於先生之靈座曰嗚呼至德鮮庸逸足多蹉往嘗疑之今則破矣先生器惟國禎才本王佐維烈維義靡騁靡惰弗可怵以勢弗可黷以貨等貴富於浮雲視珠玉其如唾譬大厦之一木實允克於承荷若乃監稅則豪右屏蹤典庾則僕馬俱餓治郡則不携家室轉運則克盈程課斯固先生之餘事耳而亦豈足為先生賀也嗚呼先生有過目成誦之質而不以哲聞有片言折獄之明而不以能播老屈人下動遭抑挫是豈特造物者之深過也哉嗚呼先生已矣不可作矣維震與先生有同年之好惟貢與先生有同聲之和揆道析理莫究兹禍餞靈駕於秦關寄一哀於楚些先生其有知乎否邪恍儼爾乎如坐嗚呼尚饗祭張給事中父文雲嗚呼榮乎封君之有生於世也嗚呼哀乎封君之於是而斃也封君少時嘗讓千夫長於猶子矣已而避舍以居不階尺土卒致千金之富此非古人所謂傑者哉既貴其姪又貴其子學崇行孤抗言馳聲為良有司為大諫議珍食顯封叢於厥身古之豪傑或莫之能致也不已榮乎今四方多事烽燧靡寧天子據鞍思匡濟之佐使封君不死諫議在朝則宵旰之憂必有釋也是天下之所同嗟而並悼焉者不已哀乎夫人孰無生生而弗榮弗足以稱亦孰無死死而弗哀弗足以弔若封君者可以祀於此土已矣而貢等也者守土之官也束幣瓣香致兹薄奠封君其能歆之否乎尚饗祭馬侍御母王孺人文嗟惟夫人秉質之純履行之仁坤德之良含章括囊直大以方哭母稚年涕泗汍瀾水漿弗餐宜舅宜姑甘旨是圖閫無譁呼以儉以勤以相夫君既裕且殷訓有章程厥子用成以有令名維兹數端或得其偏人曰已難夫人備之鄉黨是師以莫不咨人固有言相木有根相水有源夫人嚴君藴華抱芬敦古貴文誨於夫人孝經魯論大義是陳屏樂去奢載奩於車以歸厥家人亦有言起構維阡宅後維先維我君卿赫赫厥聲有國之禎青驄豸衣耳目是司帝曰汝為使於東方海波不揚豺虎遁藏人又有言德維壽原善乃福門夫人在堂鼎食苾芳命黻煒煌謂百斯齡撫爾雲仍隆基是承賀書方裁訃音倐來逺邇興哀維我庶寮君卿是交誼比同胞絮酒束牲侑以粢盛爰告我誠夕日滿川寒雲在天夫人鑒焉尚饗祖奠亡弟庭寶文於戲吾與爾為兄弟二十七年今一旦已矣其何以為情耶吾去家而服官賴爾以寄門户之託吾棄親而事君賴爾以供甘旨之奉今一旦違我而去爾則忍矣老母在堂哀心如割使我入無所依出無所倚其何以為情耶明旦遷柩將殯爾於先府君墓側吾弟有知其必痛此千古之别矣尚饗華泉集卷十三
