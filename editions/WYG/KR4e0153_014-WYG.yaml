body:
  text: 華泉集巻十四明邉貢撰文集雜著俟軒觧正徳甲戌仲冬之月華泉子將如梁道過黄池之津有舟無人下上渡左隨水風而飄焉迫視之則一老父枕竿藉蓑卧於其中華泉子呼而問曰子豈非漁者乎於是老父驚起跪而言曰是也華泉子曰吾視爾輪網具焉篙櫓完焉然則胡為乎弗爾業也而憇於是焉老父笑曰夫水泉涸矣吾篙櫓雖完將安放流澌集矣吾輪網雖具將安施竊聞之知者善待時聖人之用固有時而藏焉彼涸者必有盈也集者必渙也而吾何爭焉華泉子不能詰歸而卧諸舟中因憶過魚丘之日玉光陳子嘗以俟軒求觧廼推枕而起曰是可以復陳子已矣遂援筆而書之縣令丞簿史題名碑記武鄉呉侯令陽信以最稱収令與丞與簿若史者之姓名若干人列之碑而樹之於其聽政堂之東時正徳辛巳夏四月之望也頃之村父老十數軰長眉曵笻杖聚觀之按其名而數焉至某也則瞿焉曰是某也眞父母也吾祖也吾父也嘗事焉吾賦税外無私徵焉吾舉室休休焉吾兒時尚及見也今安得斯人者來焉為父母焉言已則又慨焉歔焉啜啜焉泣焉咄而思焉𤓰其姓名弗忍移焉恍焉若聆厥欬焉盖與坐斯人於縣堂而跪且拜焉者無以異也又數之曰某也某也則衆也漠焉若弗聞焉又數之至某也某也則曰是某也三老役焉某也者廷掾役焉亦載名於斯也目以笑焉又數之至某也則出口唾焉曰是吏而盜者也已又瞋焉怒焉以杖戳焉若將剷其名或以告野史氏野史氏喟焉曰嘻惡用是碑也乎哉又惡用記乎哉夫父老者之言斯盡矣雖然不可以不記也亦不可以不碑也使後之為令與丞與簿若史者過而觀焉將問之父老曰某循者乎某良者乎為若思也某尋而常者乎為若笑也某酷者也貪者也為若怒焉者乎又思之曰後之父老之指吾名也將瞋焉乎唾焉乎漠焉而已乎盖問對之頃有感發焉顧瞻之際有懲創焉是侯之功也已侯名琦字汝器丁丑進士其心也直以恒其守也正以固其政也仁以明有父母之道焉徵最以去予固知後之父老之觀斯碑者將𤓰其姓名而思焉泣焉歔且慨焉為之廟社以春秋焉盖不止恍焉若坐其人於縣堂而跪且拜焉而已也東山春興巻引東山春興巻者邉生貢為其師月菴先生而作也月菴先生姓陳氏和州人居於金陵成化末邉生從王父遊金陵嘗受學焉當是時邉生方九歲在諸生中年最少也先生顧獨愛邉生命之曰小子貢愼爾容端爾中吾湏爾成焉邉生受教惟謹居二所年而别正徳庚午邉生自太常丞出為荆州牧先生聞之曵杖而歌曰滔滔江漢南國之紀有文王之化焉而吾徒守之吾道南矣吾其徃觀乎於是舟行踰夏値蜀冦侵楚路孔棘不至而返踰一年邉生以家難歸於濟南先生聞之曵杖而歌曰泰山巖巖魯邦所瞻是吾心之所景行者也而吾徒適又至止吾道其東乎吾徃觀之是時先生八十有二齡矣携三尺童跨蹇驢道出徐兖止邉生之舍休焉而邉生方與其友人登所謂泰山者未歸也踰七日歸見先生邉生頓首泣下叙勞苦懐想狀具説山中之槩與荆襄形勢甚詳先生曰嘻吾休矣吾行有二得焉見子一也南東山水在吾目中二也吾由是休矣邉生跽而請曰弟子不類違先生之教者二十七年於兹於先生之道未有聞焉豈足以辱先生之思也惟先生興在山水請具几杖以從若何先生笑而應曰小子貢勿復道我道盖是也留月餘先生歸與邉生游者若干人咸曰先生盖有道者也乃各為詩若詞以贈而以題命邉生邉生曰先生之都為壬申之九月也而其東也為癸酉之三月於是敬題其巻為東山春興云題海市巻後華泉子曰余自童生時讀蘇子海市詩而竊慕焉顧未嘗一至海上寤寐思服者二十年於兹矣乃今讀是巻而心休焉曰是可以弗觀已矣然不能無感焉則為之言曰夫有天地即有海有海即有市有市即有見之者矣而數千歲弗傳焉其故何也過之而弗觀觀之而弗紀與弗見者一也而一顯於宋盛傳於今豈非海市之遇也哉然是巻也侍御君記之諸大夫則賦詠之夫記之者見之者也賦詠之者非必人人而見之也而若或見之者無他焉徵諸記而已矣天下之人之慕海市如余者豈少哉吾恐讀是巻而心休焉者將不獨余也柳柳州曰美不自美因人而章蘭亭不遇右軍則清湍修竹蕪没於空山矣吁豈獨一蘭亭也哉題章二送行巻古之人有言曰愛其人者及其屋上之烏夫烏微物也愛其人猶且及之而况於其人之弟也茍其人弗可與也則仲弓之賢也韓愈子之文也而弗能以益其父與子也况於其弟耶章子行予嘗序以贈之乃北渚諸君者又各為之詩以歌之而弗已也嗚呼是可以觀章子之為人可以觀我郡侯之為政可以觀濟南學士大夫之為心矣題増修章丘縣志後𢎞治壬子陸子以楊子為章丘志正徳癸酉吕子修焉其邑之人曰劉子者告邉子曰楊子之為志也其言曰山也水也與地之産也自上世以來未之有改焉爾也惟吏之善才之出其來也無窮焉欲歲歲而益之故虗焉以俟斯楊子之志亦陸子之志也而吕子修焉可無紀乎邉子曰作之非艱述之惟艱吕子之謂矣夫由吕子以上至於陸子也餘二十祀焉其尹也幾人也奚至於吕子而始修之也若有俟焉是吕子之賢也劉子曰吕子之賢也不止是盖能使吾民富而有禮又崇吾城深吾隍盜弭而民戢斯不可無傳也於是邉子乃喟然曰祭法有言法施於民則祀之能禦大菑則祀之嗚呼若吕子者可以祀矣故為之述此焉劉子名欒吕子者名秉彛晋州人也刻岑詩成題其後殷璠評嘉州詩曰語逸體俊意毎造竒而嚴滄浪則云岑詩悲壯讀之令人感慨味斯言也予未嘗不撫巻嘆焉而臺峯子叙之亟稱其近於李杜斯可謂知言者矣夫俊也逸也是太白之長也若竒焉而又悲且壯焉非子美孰能當之子美嘗曰岑生多新詩又曰篇終接混茫又曰沈鮑得同行味斯言也意未嘗不歛袵於嘉州也二子之言不有徵乎哉今誦其集如所謂山風吹空林颯颯如有人斯悲壯而竒矣又如長風吹白茅野火燒枯桑之句不俊且逸也乎哉夫俊也逸也竒也悲也壯也五者李杜弗能兼也而岑詩近焉斯不可以刻而傳之也乎哉故曰臺峯子知言者矣叙成之明旦華泉子題今雨軒記今雨軒者楊子為尹之所居也何名乎今雨託美也何美乎楊子嘗尹崑山矣移於髙平又移於常熟常熟與崑接壤也崑人聞之者咸徃歸焉沈子輔者雨見楊子楊子觴之酒而嘻曰器也僻實無愛於崑奈何以辱崑人之來也匍匍焉泥潦之弗厭乎昔者甫也之旅於秦賔客棄之如遺跡也感魏子之來也傷舊雨焉今者宜以今雨名吾之軒庶以詔於後之人也於是諸大夫聞而誦之曰是一物也而二美具焉遺愛一也不忘徳二也孔子有言曰斯民也三代之所以直道而行也崑人有焉周公曰平易近民民必歸之楊子之謂矣題空同書翰後魯公聖於書者也子美聖於詩者也李子兼之可謂豪傑之士已矣今之學者之為詩若書莫不曰乃所願則學李子也及其成也弗顔弗杜則顧曰非我也天也嗟乎詩有宗焉曰三百篇書有祖焉曰蟲沙鳥跡斯李子之學矣今之學者求顔杜於李子無乃已疏乎古之人有言乎取法乎上僅得乎中斯李子之謂矣正徳丁丑冬十一月朔旦華泉子邉某題書博文堂冊後古之君子之於文也非徒務其博而已也彼固有所取焉也傳曰文以載道又曰文者貫道之器則是君子之取於文者固將以求道也是故天子有天子之道諸侯有諸侯之道卿大夫有卿大夫之道今之所謂宗室古之所謂同姓諸侯也漢封廣陵王之冊曰廼惠廼順則惠與順固諸侯之道矣髙皇帝垂訓於宗室命名之章其繫遼藩者曰憲術儼尊儒則尊儒之訓固遼藩之所宜世守焉者而光澤止菴又宗室之美也其建堂以儲秘書則先皇帝錫之以嘉名而命儒臣書額以示寵其自治宫室以居二縣君而不煩於民也則今上嘉悦之賜勑褒諭且曰具見體國卹民至意於戯若王之為諸侯可謂能盡其道者矣夫非順則不能體國非惠則不能恤民非崇儒則固不能博於文以不畔於道也而王咸有焉是雖天質之粹人品之髙其稽古之力固可誣也乎哉王之於文可謂非徒務其博者矣抑愚竊有感焉史稱河間積書與漢朝等當時不聞嘉寵之詔曹子建忠懿貞亮無愧大雅而丕乃忌之視今日何如耶於戯若王之遭逢固可以有所感矣題史元之所藏沈休翁髙鐡溪詩巻兵法有竒有正詩法亦然而知者寡矣休翁鐡溪固詩家之登壇者也由今觀之盖髙得其竒而沈得其正世之論詩者多厭正而喜竒喜竒則難矣正固不易造也竒非正則多失正非竒則茸然不振其病均耳守之以正而時出其竒非老將孰能當之元之總戎固熟於兵法者也間以其餘力發之於詩騷壇諸將莫敢不歛袵焉故因讀二公之詩輙及於此且以求益總戎尚有以復我也哉親交贈言引蒙山李子以刑部郎中出知陳州事在戊辰六月越七月十有二日其外伯舅前峯白巖両喬先生者置酒於其家觴别李子時在坐之客為南濠都子𤣥敬雲間陸子子淵及予凡六人也又七日李子既貨其屋乃卜城西南鄭氏之圃居焉圃有山泉松竹花鳥烟雲之勝居九日兩喬先生者速予出餞則凡坐之客皆在也而南濠不與焉兩㑹凡得詩若干篇詩有聨句者有分韻者有次韻者為選為律為絶句其體不一然親者道其所親而其所交者亦各道其交無弗盡也李子命之書既成巻又附其同官者同志者之詩若干篇於後以請名於白巖白巖為之題曰親交贈言已顧指其巻之端謂予曰李子之交於人也與人之交於李子孰有如子者乎非子莫宜引此予不敏又弗文也而弗敢以辭遂為志之郭于藩别詩引三年冬十二月御史郭君自南都來獻績於天官天官以其績上於天子天子嘉之列上考以歸且歸曰白巖喬子者御史同門友也具酒食召嘗所來徃者數人以㑹别御史而予亦與焉數人者固御史之所親愛者也於是為聨句以贈之凡若干篇御史曰是不可無答也則為之詩以留别數人數人者相繼屬和又若干篇書以遺御史志好也是夕平基李子以直宿省中先去故起句為多已而酒酣洽甚坐客譁然興至輙書故多寡先後不次也未成者二篇明日以附前峯喬子足之盖前峯有小疾不與坐也予與御史偕舉進士為同年友益親且愛故述其畧如此若乃數人者之名氏爵里則附見於所聨句之下與其次韻者之後云王遂字説遂渤海人也性質直不事華艷少嘗見於予未幾别去不見者六年矣予繼室之弟曰胡文甫者遂之妻兄也今年夏以事來京師舘於予所間以遂之字問予予為之字曰用達以復於遂曰夫遂何始也曰始於周何始於周也曰周禮遂人氏之掌曰夫間有遂是也然則何以為曰所以達水也一夫之田百雖其畆凡公室之所需與其家之父母昆弟以及其子若孫未有不仰焉者也然非遂則潦而無所於洩也暵而無所於溉也而田用萊矣故為之遂者必平其躬必虗其中必委徐其形是何也中非虛則水必壅躬非平則水必渟形非委徐則水之性莫以遂舍是未有能達者也故為之遂者必用達而後可也遂既冠以娶矣其上有母下有諸弟後且有子若孫凡家之人與公室之所須者譬之田然非遂則焉所仰也故平其躬者直也虛其中者寛也委徐其形者恭也孔子曰恭則不侮寛則得衆傳曰直則人信之三者備而君子之道幾矣則未有不達焉者也遂業農賈不通於詩書以語故未必達然所居近鄉遂治田之道知之固矣其姑之夫曰東臺先生者外舅也持是説以叩庶幾有喻矣乎丞説贈柴子柴子既仕為無錫丞持檄徃别華泉子華泉子止而飲之酒問之曰子聞丞之道乎曰未也曰衣服在躬而不知其名為罔而况於官乎何以為政曰輔也聞之丞貳於令者一邑之事盖無所不當問曰若是子且得咎夫令邑之長也令曰甲丞曰乙令曰可丞曰否令必曰是侵吾官侵則憤憤則爭爭則怨怨則咎曰若是則惟令之從乎曰惟令之從何以丞為耶先王之建官也置之長專之也貳佐之也亦以防專也設惟令之從何以丞為邪柴子懼曰若是奈何華泉子曰其剛柔之際乎在易之文二與四同功而異位然二多譽而四恒多懼以近五也是故令譬則五也簿與尉猶二也丞則四也侵之則過剛順之則過柔安得無咎子誠以感之正以輔之貞以守之遜以居之其道必大亨即大亨非我也故曰剛柔之際也柴子喜而起洗爵以謝華泉子曰微子之教吾幾不免於是柴子齊人嘗歸妹於華泉子有兄弟之義也故其言約以䂓弟賦庭寳字説予生六歲而未有名少司空泰和張達時為應天丞與大父治中府君為僚友也始以貢命予予既冠而交游字之曰來庭鄉先達太保尹公少之易以庭實於是交㳺者因遂以庭實呼之矣予弟之生少予十有一年生踰月而大父府君自金陵歸大人公亦歸自京師家慶之夕傳抱呼笑以為樂也遂相顧而大母没又三年而從大人公遊鴈門又四年而歸於是時賦之年蓋二十有四矣而顧未有字也今年春予自太常丞出守江陵過臨清而㑹焉間以為請予因字以庭寳而告之曰賦之可寳也有三焉而弟知之乎否也夫有田則有賦世固未有無賦之田也田無賦則倉廪虛倉廩虛則國用不足國用不足則雖有象犀珠貝圭璜金璧將焉用之是國之所寳者賦也予宦遊不得恒侍大人公母夫人之下温凊之禮滫髓之奉惟弟是倚焉則吾邊氏之庭所寳者非賦而誰也是家之寳也弟生魁梧有膂力能曵十石之弓而又習於馬今西方有事天子拊髀思將出而當一校之隊樹功疆圉為國虎臣則又邊庭之寳也是賦之能也非予之所及也夫是三者其名殊也其義殊也而其道一也顧名思義以求盡其道惟予弟勉之而已傳曰子生三月父命以名又曰男子二十冠而字於戱予之名不宜出於人弟之字不宜出於我也而又為之文以析其義焉者禮之權也予弟勉之試以斯言請於大人公大人公又有所以啓之者矣祈雨文嗚呼災異之來厥有咎徵欽罰惟愆沴氣薰蒸自九月不雨至於正月黔黎憔悴憂恐弗勝今二月已盡野無青草則奚望年之可登無乃吏於土者稔戾隱慝省躬之實未知所懲夫何載沐載禱誓壇之後霡霂鮮降𤣥風屢騰白晝黄霾飈旋若崩道路之嗷嗷者將不知其何以為食而我庶司羣吏則引望終日徒為之駭愕而凌兢嗚呼天之不雨為殃民者而怒也今不禍其所以致怒民則何罪反以虐棄而弗為之哀矜某等職叨民社夜􅄰夙興控訴無所壇壝再升惟神明之錫惠庶民命其終有所憑謹告祈雨告文曰爰自去秋雨雪少降以至於今土焦麥枯百姓鮮食榖價沸騰乃兹春已逾半而白日無色黄霾蔽空河之北則樹葉草根剪伐殆盡甚至有掘死人於墓烹而食之者矣河之南則老穉相率乞食於途甚至有父子夫婦不能以相保者矣菜色盈目言之痛心某等宣政於斯司防禦於斯反咎責躬蹙焉無地即發倉廩顧安得人人而濟之欲撫流移則滔滔者四郊皆是也用是齋沐竭誠率我官屬父老敢請禱於神下嗚呼神之所血食在民民之存亡在年榖年榖之豐凶在暘與雨而暘雨之暄弗暄降弗降則神之職矣伏兾轉斡化機鼓雷霆而奮之以風雨以甦民命若某等之職與不職非百姓之罪也惟神明昭别而禍福之其何敢辭謹告謝雨文維神受職九天耀靈下土主司民物參贊化機邇者亢陽為灾庶榖殄瘁上下憂損拯救無方禱祠浹辰時雨乃降焦枯少沃生意已囬卒歲可期秋成有頼敬陳明薦仰答神休伏冀威靈俯垂斡運大施甘澍永濟黔黎尚饗治河告文曰邇者洪流泛溢齧堤噬堰河之南岸日圮月侵某等憫溝洫之漸淤懼城郭之相近及農時之始暇遵王制以興工爰卜今辰下椿捲埽潔牲陳醴以祈厥成嗚呼修之者人之功佑之者神之職某等受朝廷之重托固願節民力而省民財神配海嶽之顯封亦必捍大菑而禦大患也幽明無間幸與圖之謹告祭河文維神配鎮北嶽受國顯封湯湯洪流萬水是宗踰周越梁爰達於海潤田澤疇濟物千載某按部兹境徃來一年反命届期臨流告䖍既張我㠶載擊我楫神其相之以利我涉尚饗𠂻赤榮光贊并序𠂻赤榮光圖者皇明遼藩宗室止菴光澤王受封之始而其叔祖誠菴衡陽王手以賜之者也王之先君惠王既已親為之題以發其義矣由是騷人墨士之産於此與仕於四方而過於此聞者亡弗見之則亦亡弗歌之者也後二十年某由太常丞出守荆土而見於王王出其圖而示之且命之言某不敏為天子之守吏樂其土之有賢王也取六義之比謹拜首而為之贊曰有丹者楳植於荆阿照臨江漢如爛斯霞霑之溉之雨露孔多既昌其幹亦蕃其葩於萬千年王國之華白泉子憂居圖贊有白者衣有素者冠有戚者容棘人欒欒飄颻野風吹吹葛帶永言孝思發我潛嘅陳處士畵像贊心慤而性淳服禮而蹈仁惠周乎里閈名越乎等倫若是者不可盡以畵也嫮貌而頎身質清而氣神其言也諄諄其動也誾誾若是者又非畵之所能盡也然則補其所未足載其所不傳者豈不在乎斯文噫山間松下琴儔鶴鄰兹人者其今之所謂處士而古之所謂逸民者歟紀夢為空同將易號作夏日午睡夢一青衣小鬟叩軒泣曰妾空同山之靈也主君新寵移於大陽無罪而棄妾請子一言歸之若何予告之曰乆處而惡生人之情也離騷而抱貞女之經也爾不見夫素平者乎屏之二十年一日歸焉夫誰為之媒也爾毋泣行召爾矣青衣既去鸚鵡呼婢於窓外曰將食來將食來遂窹而起華泉集巻十四
