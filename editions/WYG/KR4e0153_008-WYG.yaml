body:
  text: 華泉集巻八明邊貢撰箴雪厓箴有序少㕘白先生素秉真氣其在地曹故多所建白也忤當道出判永平已而同知登州事其在登也見山之厓積雪皓如曰是其類我矣因以為號盖未幾提刑河北又未幾而㕘佐湖南其真氣眡在地曹時益勵也某惷坦無似固嘗私淑先生而先生之心亦某所素知虞其遘閔於羣小也故作是箴以獻且自警焉峻彼曾厓有凝其雪峙于海邦于截于潔其潔伊何如練斯張其截伊何極于昊蒼有嚴君子既正既固心之樂之載瞻孔慕寢興反側天威是懐比操于雪倫行于厓厓既截只雪既潔只人之望之孰不懾只孰不懾只厥維嫉途先民有言嶢嶢者易缺皎皎者易汚不見是圖亶其然乎省菴箴秋官郎中人登劉君美之以省菴名其室乞扁于少司冦豫章李公示警也𢎞治甲子冬有銅仁之命挈其扁以隨曰吾將朝于斯夕于斯雖之蠻貊不可棄也邦人太常博士某代為之箴其詞曰身之不省其過斯永省之不戒其患乃大毋易毋煩曰省吾言克慎克正曰省吾行匪桷匪梁以心為堂堂乎堂乎吾與爾偕行銘泉硯銘我石汝琢我泉汝銘無絶其源我心汝銘畜之池盈放之川行我詞汝銜朱硯銘堅白者石圜方者池中渥者丹我其用之頌四封録頌維淵孕珠維川藴珍維婺有潘生此四臣維此四臣既才既良維國是匡維邦家之光維選維旦曰官度支錢穀維司出内是宜維珍維鑑廷尉是職兩都平反無縱無抑天子汝嘉錫典乃降叶呼工反一之云多矧維四封四封赫赫賁爾黄髮龍章鳳題萃于旬月於赫明恩受言享之人亦有言維報視施彼美四臣無競維烈肇揚清芬永勵臣節贊順菴先生像贊裕乎其情肫乎其誠無泥無譎㒺隨㒺迎不掲掲以示髙不激激以競名常道是安皎然玉瑩有儼斯真来者景行顒若厥占有孚大亨伊誰不曰彼中立者其順菴之先生也耶杜蕢贊臣曠調飲臣蕢亦飲酒生㣲波天風凜凛子卯不樂君臣始終爵亡言存千古無窮石祁子贊冠珮則兆吾弗敢知吾所知者吉凶異儀或兆或否偶邪非偶大哉禮云臣子常守紀叔姬贊國亡君亡吾將何歸父母邦魯先君廟酅歸不于魯而酅是依嗚乎賢哉其紀叔姬乎詩餘酬江月贈柴二尹廷相山城雨過望青郊迢逺碧山連屬岸旭林霏縈還帶回首屢看僮僕白石橋邊蒼松澗底冉冉雲相逐野猿孤鶴晩来聊伴幽獨幾度夢到江南畫船簫鼓夜傍蘆花宿烏帽錦衣呼喝處猶似當年拘束布衲綸巾芒鞋藜杖無寵還無辱閒觀塵世幾人能此知足鷓鴣天荅華生徳益相見真能慰渇心坐同枯槁得春霖停舟共試橘中戲步月聊為河上吟汀草碧渚花沉起揮焦尾奏商音一從京國分攜後夢裏閒来直到今滿江紅夀王總戎文武全才人盡説洛陽留守四十載始終臣節堪垂不朽月斧早分蟾窟桂霜旌晩掛營門栁抱絲桐何處訪知音山中友宣政殿談天口扼胡嶺搴旗手到如今都付野花村酒龍馬不教金勒控鵷鸞未許凡禽偶問先生得似古人誰東都叟千秋嵗送華文光歸省端陽前後正是歸時候㣲雨過溪山秀招揺蘭棹艤剥啄柴門扣江鄉裏陰陰夏木圍清晝堂上人依舊好事偏相凑前嵗景今年又狂歌風入松笑指雲生岫東海上鸞書還報雙親夀踏莎行題畫露濕春莎草生芳甸漁舟迤邐依山轉斜光明滅照村墟綠槐深䕶幽人院小柵鳴雞古梁巢燕柴門不鎖蓬蒿徧問渠莫是武陵源一溪流水桃花亂蝶戀花次韻送别吳白樓亭上雨来人欲去為怕離聲不近芭蕉樹芳草碧雲凝望處願生雙翼誰能許萬疊衷情那可賦風栁如烟蕩漾絲千縷白鴈嗷嗷江館暮醉中愁見吳山路華泉集巻八
