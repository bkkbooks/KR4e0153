body:
  text: 華泉集巻五明邊貢撰詩集七言律詩送章太守朝覲十載鄉山路不平年來吾亦羡吾生春囬麥隴見鷹化月出花田無犬驚湖上野夫眞浪迹濟南良守合垂名古亭相别戀携手日暮風烟含逺情送王灤江燈火虚堂綰夢思月明烏鵲繞棲枝眞愁逺道無書札不信殘冬有别離江甸綵舟迎早燕關山驄馬戀芳岐情多未有瓊瑶贈醉折風梅傍雪籬登天津拱北樓古今形勝天津地晩暮登臨春事幽冠冕八方通禹貢河山千里控神州風連碣石烟沙黯日倒扶桑海色流老病獨懸戎馬涕俯身疑在岳陽樓寄亭溪梧桐覆井隂隂葉蟋蟀鳴堦細細音中夜有懐孤月逈九天無夣五雲深眞慚棄置逢時幸敢負平生許國心立馬送君還憶逺似聞巫峽氣蕭森昭君出塞圖帝遣才人出漢宫逺投殊域為和戎琵琶晩映娥眉月􅓋篥寒吹粉面風終夜苦心懸北斗隔年歸信託南鴻征鞍倦倚聊成寐猶在長門女伴中雪中次錢江樓憲副兩嵗髙堂輟問安每逢新臘恨漫漫身如野鶴眞無倚心似江梅苦抱酸衣線細留春草怨繐燈深掩雪風寒他年奉檄堪垂涕毛義從來不為官起居深借鵲巢安著作從教醬瓿漫遲暮嵗華多客感清修家世本儒酸春潜水市晴烟碧雪抱山城午日寒且欲醉眠歌習隠不湏章表乞辭官再次錢江樓布被藜床雪卧安草堂幽逈夜漫漫有懐眞愛故山好多興不辭村酒酸衝曉覷林梅恰放趂暄行徑石猶寒長鑱短褐無人識白髪明時老諫官乆雨喜晴已判𡨕𡨕過此年忽從中夜覩青天雲移北牗星河近月上東林樹影圓逰興不愁村逕滑賞心多為渚花牽朝來擬蠟登山屐見説西峰有謫仙雪中醉眼看餘宻復踈曉風吹㪚亂如初一尊相對興不淺孤鶴伴吟行且餘橋滑可湏羸蹇度泥深同感落鴻書江梅㟁栁俱含凍六管憑誰借一噓禱雨乆祈甘雨集靈官赫赫驕陽勢轉難月馭漫曾離畢宿雷車空自繞仙壇廵簷卜潤時看礎望極占雲夜倚䦨迂腐似聞天鍳邇古來王者必求端除日次蒲汀李少宰韻建業新春入故年異鄉懐抱各凄然三千道路滄江外五十光隂素髪前名重正湏推北斗藁成應更續南銓鄰西咫尺鶯遷地守嵗同歌伐木篇元日次蒲汀二首星紀初廽日再元海風吹霧起晴暾五辛遥阻荒墳薦萬里空傷乆客魂臨水穉芳爭裊裊出林幽羽故喧喧歸田喜卜中宵夢擬辦嚢封乞主恩栢烟松火萬家同栁徑楊堤入暖風九陌管絃存舊俗六朝山水見遺宫交親隔舎追隨裏嵗序驚心感慨中且喜甕頭浮緑蟻不湏囊底覔青銅人日喜晴次蒲汀韻人日舊京雲日麗鍾山龍氣欝開祥腐儒推枕病忽去野老占年喜欲狂即起户簾通紫燕早聞宫樹囀黄鴦多情杜甫縁何事觧道他鄉勝故鄉次蒲汀二首春朝飛雪舞風廽榖日中宵起迅雷臘後不教滕六出蟄前那遣阿香來深江滿浸遺蝗種厚地潜驚律管灰借問化機誰轉斡只應天府近三台石城虎踞九關開鍾阜龍盤亦壯哉地保金湯分表裏氣通雲漢切昭囬鎬京本是文王土太乙休誇武帝臺頭白詞臣竊供奉兩京清秩去還來端午樓船不近打魚磯簫鼓中流聽者稀遥想紫宸頒制扇真慚清禁賜宮衣池亭映日榴開錦城郭籠烟栁蕩旂傳有湘江年少過蘭橈應吊屈平歸人日有懐白巖侍郎去年人日題詩處鄭氏茅堂春可憐出谷早鶯啼恰恰映風寒竹倚娟娟隨鑾並入青雲上觧珮同歸素月前此日寂寥驚旅食坐㸔庭雪撫流年正月十五城上旌旗閃夕光城邉戈甲儼龍驤郊門月上㳺塵静輦路春囬細草長千古再逢周禮樂十年曾奉舜衣裳行宮咫尺天俱逺愁見林鴉接翅翔中秋值雨冉冉游雲䕶瑣闈朧朧團月映江扉停杯已負經年約倚檻空思萬里輝花雨廣寒真亦假夣登天柱是邪非臨風謾有乘槎興欲訪銀河舊織機東村冬日同劉王諸子歩歸泱􅐯空原返照開杖藜村逕暮徘徊霜苖迸土纎纎出風葉辭林宛宛廽扶病可須重載酒住家何必更登䑓青鞋布襪滄波岸白石歌殘意轉哀至日恭聞車駕入都志喜二首八駿長驅萬里翺四方周覽一心勞星杓夜夜隨黄幄雲盖時時䕶赭袍朔野舊聞殱冐頓洪都今見破宸濠何人議賞功居首玉殿承恩醉碧桃至日連年帝逺征今年至日喜還京登歌想像聆周雅振旅傳呼列漢旌皇祚永占千嵗厯聖聰明照萬方情靈䑓舊職今誰掌不用書雲紀太平立春日多病逢春筆懶拈艸堂髙枕病垂簾故人恰送魚酒至野老不愁年嵗添冉冉雪雲虛照水暉暉晴日乍經簷啣盃自笑還成醉吏隠誰能得兩兼元日次灤江中丞伏枕驚㸔嵗又新卧聽街市響蹄輪樽無白酒元因病屋有青山不當貧向晩雲霞偏弄色得時梅栁故爭春閉門可是甘肥遯懶效東西南北人再次灤江玉座香烟䕶袞衣綵雲飛處是皇畿中朝地接千官擁北斗星懸萬國依波煖御溝春浩蕩日臨宮樹曉雲微自憐朱紱淹鄉土不拜青陽入禁扉春日王監察天宇過訪留酌二首豸冠春訪薜蘿衣晴日池䑓燕子飛心為感時偏耿耿話因談舊轉依依閒過别院題青竹却望南山指翠微欲問野夫棲隠處九槐溪上一柴扉笑我貪書日苦辛愛君風采是埋輪青驄獨繫垂楊晩白屋長廿舊業貧千里海邦開雨雪萬家山郭轉陽春囬驂却傍黄昏路蘿月纎纎喜近人寒食郊行來家疃前春可憐芳郊遲日起晴烟栁枝嫋嫋翠猶弱花蕋菲菲紅且妍荒隴嵗時還爼豆短墻兒女正鞦韆青年竹馬歡逰地華髪經過思惘然午日五月五日正陽辰四十六年衰病身天上風雲同際㑹水邉魚鳥自相親嘯歌獨得酒朋喜踈㪚屢遭官長嗔睡起竹林温雅頌緑蒲青艾晩撩人中秋述懐銀漢星稀玉宇秋夜深乘醉倚東樓天香不見雲中下槎影空傳海上浮狂有篇章酧嵗月懶無書信荅交逰羽衣歌罷蟾光冷獨送西南萬里眸九月八日漫成蕭蕭秋逕晩霜餘寂寂風簾向月踈濁酒旋沽還對客小樓翻盖且藏書雲邉露白鴻猶去棟裏巢空燕不居欲向寒花問生事為誰收巻為誰舒奉次畢司空與客對奕謝荅張侍御惠酒之作是日司空招予出城不及赴灌木隂隂曲繞塘水風如雨細生凉繡衣家醖携兼至太傅圍棋興轉長簷日晩移文石静荷樽秋泛露華香爛柯欲歩王樵武惆悵仙踪隔苑墻清明日劉黎二子携酒過訪美人常苦費招尋咫尺門庭萬里心手簡忽隨雙鯉至肩輿先造百花深霞通苑榭明春栁雨過橋山出暮岑對酒似聞清廟瑟一歌三嘆有遺音官舎勞君載酒尋病多無柰踏芳心孤亭嵗乆青松老曲徑春殘碧草深友義昔曽稱管鮑詩名今豈下髙岑黄鸝紫燕如知喜並舞雙飛接好音嵗除祫祭以病不與奉荅同寅白岩見懐之作木榻香寒篝火融暉暉殘日隠房櫳天涯風俗追隨裏嵗暮隂陽感慨中井幹不消經夜雪堦萱猶發故年叢端居最憶東朝士爼豆從容未可同冬至長陵即事千峰隠隠下朝陽複嶂層厓啓曙光觀闕昭廽森象魏河山表裏奠金湯陵門月映千年樹寢殿風飄五夜香長至祠臣竊供奉擬書雲物紀靈祥九日雨中登樓八月黄河擬泛槎為憐重九一停車登樓恰對㝠㝠雨行徑稀逢采采花蒼樹破雲秋寺逈碧山當檻暮城斜鄉園客路俱愁寂傳語逰人漫憶家元旦嵗首江南乆客身宦情寥落道情深極知佳麗非吾土且喜逢迎有故人城上雪痕經臘在水邉梅蕋覷年新呼童早蠟登山屐莫負陶家漉酒巾癸未元日泊龍江關海日蒼茫隠石城正朝雲物半隂晴暮年嵗到無親故舊國書來有甲兵青栁白梅俱在眼渚鷗沙燕亦含情同舟楚客醒相對坐待春朝百感生二月一日候朝是日予祖母夀辰燈火春城漏下遲薄羅寒透五更時鶯遷上谷聲初轉花隔東風信未知仕漢恩深慚壯業報劉心逺滯還期天街望處無端喜南極光連北斗垂萬夀節綵仗凌雲啓曙烟翠華含日俯晴川遥憐外閫稱觴地恰是西江獻㨗年鞶錫共懽恩似海凱歌齊祝夀同天微臣亦有迎鑾曲願奏君王玉几前郊祀齋居春樹扶踈夜色輕坐深齋沐軫遥情上清真氣通三界太乙祥烟接兩京雲裏珮環鳴閤道水邉星斗照䑓城江湖魏闕瞻依切欲草甘泉賦未成獨火琴張伴獨居月華遥上閤簾初懐人忽夢春塘草侑食聊烹雪苑蔬南牧烽煙時有報北來鴻鴈乆無書玉笙聲裊爐烟細懶聽仙官説歩虛少宗伯趙類菴省署行雲接禁廬戒嚴齋沐共端居簫韶恍惚聞仙樂夣寐依稀奉屬車台斗上公蒼玉珮閬風仙子碧霞裾六年嘉靖明禋禮合有淮隂太史書淮隂人坐深齋閤五更天起立梅花細雨邉自保一心惟對越敢云三禮是精專形骸已覺非前度風景猶疑似去年啼徹曉雞清不寐更呼童子爇爐烟齋居琳宮仙梵栢森森祝聖欣同海内心萬里廟堂懸念切十年侍從感恩深閒愁似雨踈還宻世事無端古又今却憶講筵供奉日已知迂拙負綸音郊興禮䑓𤣥黙戒宵眠職在寅清典訓傳深院鳥驚風起樹九衢塵静月當天箭沉宮漏泠泠水屏映鑪香細細烟孤坐擁衾聊假寐夣魂依約翠華邉中元陪祀孝陵千谿環合萬蟲吟陵邑秋囬碧草深香度石壇雲晻靄鐘流山殿氣隂森乾坤聖祖經營力霜露文孫感愴心惆悵禮䑓供奉客黑頭今已二毛侵入壇馬上樓頭鐘㪚曙煙㣲城上旗翻曉日暉雙馬共依南陌度羣鴉争入上陽飛離郊薦嵗先農事甲帳屯雲䕶帝畿三載太常無寸補敢言身跡與心違齋居候駕圜丘圍繞萬松青石磴縈紆憶舊經乘月試觀仙陛樂倚風遥聽屬車鈴力堪供奉丁年健心到齋明午夜醒欲效杜陵歌大禮書成誰為逹皇扄寄秦鳯山少司徒静依髙閤撫年芳萬里霜雲接塞長南郭雨晴山自碧北風時到菊猶黄羞將老病干明主幾對琴樽憶侍郎莫枉髙情賦招隠水東籬落未全荒奉寄白巖太宰一抛簮組别朝行四見青春日載陽敵少更無臨局苦心開惟有㸔山忙堦蘭過雨娟娟秀庭栢凌雲矯矯長龍氣夜來西貫斗冶人遥識是干將春日有懐空同李子南中數枉故人書北上蹉跎信轉踈四海酒盃形影外十年詩草夣魂餘藏身笑我同方朔作賦憐君過子虚春入吹䑓芳草徧塔雲樓月近何如㓂中丞北撫宣府雲州烽火入雲中愾敵知君乆在戎追北逺勞燕將出防秋行與漢時同天從上谷分邉界人自東山識謝公珍重廟堂柔逺意禦戎元不重竒功守邉猶得近邦畿亞相權兼大將威烏府日閒關月皎㦸門秋静塞塵稀探兵入塞無傳箭勑使臨戎有賜衣聞道六龍巡幸所至今常見五雲飛荅函山希尹吏曹清雅復誰如三載淮隂逺謫居豈謂風蓬歎流轉乆從霄漢擬遷除子平實有歸田賦公幹虚傳卧病書乘月共憐霜燕起悲鳴猶是落絃餘荅蒲汀問病曲寢眞應蟄蠖如傍人虚擬好端居走庭風葉從揺落繞榻霜英倦掃除日下紫雲徒有夣海東黄鶴乆無書玉堂知舊勞相問五十三年老病餘春日寄南曹故人白門楊栁石橋邉尚憶金陵吏隠年獨夜有懐通夣寐五雲廽首隔風烟鳯凰臺古江應繞鳷鵲樓髙月自懸省寺故人元不少南音誰附北鴻傳寄岳丈胡公雲卧東山榻已牢夣魂稀入紫宸朝誰言駟馬如髙枕未許黄封勝濁醪移艇日陪漁父坐杖藜時赴野人招滄浪歌罷康衢舞白眼青天興轉豪石橋驛逢詹進士赴京六年雲卧别京畿萬里重來舊侶稀紫陌已無塵可拂𤣥都惟有燕交飛尋芳上苑花迎珮待漏東朝月滿衣鄉土尚留司馬跡駟車他日㸔榮歸贈毛東塘豪雄氣盖三千界按部春囬幾萬家風采獨教天下想文章偏得士林誇耶溪飲興芙蓉棹閩嶠詩情荔子花應憶舊逰驚物換梁臺新栁欲藏雅八月八日太常例不習儀五鼓起坐有懐成均諸公爽氣侵簾夜轉森懐人空抱雨中心漏沉壷水彤樓逈燭映軒堦碧草深自分巢由湏屬我共傳堯舜是當今鳯凰池上明良曲林下應聞大雅音病中贈東塘先生歸驛亭春栁􅍼隂隂送客聊為黄鵠吟嵗月秪堪驚聚㪚路岐何必問升沉風行西下論兵地日鍳東周品士心醒眼未開涓滴酒病懐離緒海同深秋官劉羙之使還居接待院出訪行盡梁河與汴山杪秋南出暮春還極知風采元無比莫恠馳驅不暫閒城繞亂蛙青草路寺臨流水夕陽灣詩壇舊駕髙千尺一榻清風喜重攀王舍人招予不至坐客聫句見促馬上晩來扶醉過城西路出廽塘復渡溪座上多情重折簡社中詩好預分題青穿石逕苔新破緑轉沙堤栁欲迷痩馬未前心已到却從何處覔霜蹄奉荅白岩諸公見懐聫句瞑鳥催歸出寺門長安風色已黄昏林塘只隔水西渡溪徑故妨花外尊星列𤨏垣占聚榻月斜銀浦怯廽轅清宵咫尺懐人地海北天南未可論奉贈儲柴墟太僕閲馬山東二首龍陛香烟曉曵紳雞聲催發使車頻維揚城郭鄉心逺魯衞山川客路新天下可應無駿骨鞭頭猶見説烽塵風霜處處逢揺落誰識行䄡别有春簡命争誇出使榮離筵深坐梵堂清同憐宦客翻為主却喜山僧亦與盟荒甸曉鐘淮海夣杪秋烟樹薊門行何時相憶不相見臘月梅花二月鶯坐上奉贈白岩少卿淮隂廟前沙路微井陘口下行人歸丘園别後青松老關塞經過舊壘稀駸駸羽騎聫春甸隠隠山城啓夕扉却顧太行應嘆息十年空望白雲飛贈殷文濟幾日逢君即送君客堂巵酒不成醺途遥共説湏加飯病起誰敎却避葷驚月啼烏還繞樹向風離馬亦嘶羣同心落落京華少寄我音書莫厭勤九月十四日夜訪馬尚寳文明不值門巷隂隂暮雀飛北城燈火望熹㣲可憐明月映踈栁更喜秋風吹客衣寒露始零鴻漸少重陽却過菊猶稀子長素有登臨興何處淹留樂未歸獻吉留别初春郊甸積雪滿客子出門岐路長征車杳杳去不息關栁青青愁未央却望泰山懐故道即歸梁苑亦他鄉十年京洛交逰地日夕風烟思𣺌茫寄劉銅仁地闊天長柰爾何春風門巷少經過遥憐白髪星星短無那風塵日日多懐舊獨吟平子賦感時偏憶少陵歌江村細雨蘼蕪長是處扁舟有釣簑月下贈孫生月出東城光皎然踏歌歸去馬翩翩風塵醉别三秋暮鄉土交情十載前俠氣早聞探虎穴壯心時為舞龍泉長安九陌烟花地無事飄零又一年書懐荅吳東昌元亨興如張翰在蓴鱸愁似三閭屈大夫桑梓旋開樵父逕夣魂稀到帝王都病登山閤思黄鵠淚洒丘園掃緑蕪羣盗不休戎馬亂厭聽州郡説飛芻十月十三日髙唐㑹石峰陳提學同賦北海南雲逓𣺌茫宦情鄉思共悠長連床喜見風流在同榜猶傳姓字香栢署髙秋驚燕雀山城薄暮下牛羊如何不醉還成别孤負霜天月滿墻别後有懐石峰憶昨相逢賦夣魚古槐凉月小堂虛通家更許諸郎見得句先敎子弟書却計此行千里外定知重㑹幾年餘同官我亦司文敎事事深慙逈不如除夕卧病柬空同李子天涯卧病驚除夕河上逢人感昔逰嵗月浮生雙鳥翼風塵逺道一狐裘君還豈為鱸魚膾我出眞同雪夜舟梅蕋栁條俱動色幾時携杖並登樓贈春山李侍御徃嵗麻衣出宋中黄巾流亂太行東天王詔下軍符急御史兵來賊壘空籌䇿自同諸葛亮諫書人比息夫躬可憐回首過逢地萬井春烟裊暮風丁丑元夕宴一齋殿下所先以事歸五華楊先生賦詩見憶仰荅并酧謝一齋樓外棲禽夜不驚樓中月上霽多情庭花欲放先春色几瑟虛含太古聲興是剡溪催返棹句飛東野故逃盟燈衢醉拂流塵轉轉憶王孫殿閤清贈王汝立推府之安慶奕世簮袍襲主榮兩朝科第接家聲皐陶獨守虞廷典賈誼同歸漢史評伊父周長史也藩閤暮雲囬望地郡堂秋月坐吟情褒名喜入觀風艸不待三年政已成啇水得許廷綸詩奉報二首渉盡蠻溪與瘴灣轉因家難得身閒應憐白髪恩難報頗怪青雲興獨慳在野有時㸔射虎杖藜随處約登山泥蟠霧隠眞虚擬西北王師尚未班日射蒸途潦接灣客車何處可投閒愁中鬂髪年年别病裏篇章字字慳長憶許公兼許子却逢商水慕商山同朝故地分明記白玉墀東第二班贈臨漳陳敎諭白首談經獨可嘉學宫桃李燦春花十年鎮日甘藜藿萬里何曾問室家河甸客裝衝雪冷國門賢路入雲賖臨分未有瓊琚報愧爾殷勤贈木􅏨人日荅何李二子見懐之作夾道烟花十二樓大梁歌吹古名州當年尚憶愁中過此日那敎病裏逰司馬調髙真寡和謫仙情重若為酬青燈白髪春堂晩卧歎年華似水流何子元叅政遷秩太僕走賀二首京洛煌煌尺五天姓名今喜萬人傳中州節鉞分藩地西極風塵出塞年新職似同還典午舊逰争説是登仙河梁别意真堪畫誰起江門沈石田東風環珮促朝天苦恨離盃阻共傳一卧即今㸔累月並逰真復是何年閒情謾憶朝中舊多病難逢海上仙芳草碧山俱不惡擬從春日賦歸田柬李朝信同年古驛炎荒逺謫丞晩從䑓省見飛騰開渠實並西門豹擊水虚疑北海鵬二月夀筵雙翠栢十年官舎一清氷昨來詹尹傳消息聞説先生自此升臨潁與賈學士夜坐霽雨簾櫳暮色澄病來肢體坐難勝十年塵土餘雙鬂萬事悲懽付一燈却對渚雲瞻紫極轉懐江水説金陵玉堂本是清寒地可道官銜只似氷自感一首春堂華燭照端居自感行藏冷笑予南郡一麾聊復爾舊京三轉欲何如年華强半稀聞道月俸無多苦積書争似驂鸞向雲海馭風長曵紫霞裾寄朱士光御史建業風聲到最先路謡親聽野人傳朝端斧鉞埋輪後江表溪山攬轡前摶擊故同鵰鶚下詠逰時向薜蘿穿清尊不對芳春酒翹首三茅憶洞天寄别士光神交元在識荆先豈待瓊瑶托鴈傳終日暮雲㸔海上幾時春酒醉花前江横碧水盈盈隔栁亂黄鸝故故穿感别恨時應不少一封期入九重天再次燕泉縱道先期已後時似縁見少却稱竒使蜂媒蝶休相訝國色天香且自知暮雨懶通巫峽夣薛許昌曰常同巫峽散詩義本此朝雲嫌入義山詞李商隠曰欲書花片寄朝雲翻慙綵筆留真賞未有豪門紫玉巵韓熈載賞牡丹出五色玉巵隨花色酌客故云贈劉廉憲赴覲暫將風雨施蠻鄉早逐秋風入上陽萬里山川眞厯覧十年車馬亦匆忙烏䑓舊識氷霜面紫極重瞻日月光多少遺賢在丘壑擬從封事借明揚寄白巖太宰見説脩眉近吐毫夀徵端為息塵勞閒身比鶴飛還徤晩局如棋着更髙消日有書誰石刻采芳無夣不江臯新栽五栁開三徑未許黄花只姓陶寄南宗伯白巖神仙官府說南畿聞道春曹事更稀庭轉晝隂移樹影印封秋雨上苔衣䑓城栁暗宫前路别墅棋殘石上圍台斗位懸朋軰少與誰同賞復同歸簡石溪殷子飛歩雲霄二十年早歸鄉里共稱賢囊留白璧長捐楚䑓冷黄金不到燕跨馬日尋安石墅閉門時註子雲𤣥懐君夜對層城立月色江聲兩惘然眞州得汝温王中丞書荅寄一首兼呈近懐郭西殘臘送行車􅄵上經年始得書入陜夣魂遥不阻守邉方畧近何如朱衣却傍風塵際白髪那禁涕淚餘來使隔江難問訊暮雲春草正愁予沛縣舟中柬戴方伯子良城隅有客眺連岡城下維舟笑我忙欲駕行輿仍隔水忽㸔花樹已斜陽烟郊黯淡新亭暮石壁隂森古殿凉豪興坐闌猶不淺况隨髙歩接春觴濟寧候文鳴中丞不至却寄逺傳開府駐任城北上樓舡䟎日行梅信臘隨千里使羽書春㪚兩河兵青青凍麥侵沙吐縷縷晴雲隔浦生午夜月明虛鎻䌫倚蓬西望不勝情寄弟賦一别三年慨逺暌萍踪無定任東西望窮鄉國暮雲合夣入野塘春草萋座上可能楊子對膝前應觧老萊啼詩書羙躅還須蹈莫更頻頻索棗梨郊壇齋居有懐簡風山月岩咫尺行􅀈隔幾街髙吟何處羙人偕燕郊又屬花時感剡曲空勞雪夜懐伐木有聲鶯在谷抱琴無韻月明齋行宫朝罷親曾數屈指城西少舊儕遇方文玉為賦振旅詩旌盖風翻塞日光凱歌聲入楚雲長全功自古難平蜀元老而今又姓方四野盡銷新戰壘百城還覩舊耕桑書生筆硯尋常事幾見勲名勒太常寄呈東臺外舅一别丈人今二年徃來空有尺書傳關山望極孤雲裊霄漢同心白日懸碣石風烟通北海江陵城郭枕西川相思未卜相逢處岸草江花亦可憐沈右史歸興敢將勛業比韓休已把行藏付許由秋度碧雲悲嶺鴈晝眠寒水羡沙鷗愛閒數到郡東寺望逺時登江上樓欲訪庭闈問消息南風何日送歸舟同年侍御羅瑞卿將到京先以詩寄荅之日夕懐君剛入夣曉來傳報喜還驚雲山悵别多岐路萍海論交幾弟兄花外驛樓明豸錦草邉城巷沸蛙笙東門咫尺新晴地不厭衝泥匹馬迎何子元移住揚州巷第宅三年已四遷買鄰銷盡賣文錢極知萍梗皆身外且逐風花過眼前伏枕夜通騎鶴夣㪚衙秋㫁㸔山縁相從欲問城東社聞説郎曹本是仙寄王青門太守不見青門王右丞渚雲江草思難勝經旬漸覺人迢逺入夏真愁氣欝蒸山郡吏氓朝閤印水鄉兒女夜船燈炎風朔雪多歸鴈北信南書亦可憑紅心驛坐雨有懐臨淮吳茂宰山店蒼茫風雨辰驛樓鳴鼓駐行賔盤渦似有蛟龍闘入舎翻疑鳥雀嗔心是子牟還魏闕迹非公幹且漳濵孤吟却憶吳明府逆旅相逢意頗真寄夀陽山人有足不臨城府邉有身不到狹邪筵陶朱故托泛舟興康樂長吟登嶠篇間對菊花開夀酒静㸔椿樹數流年何時一起江門卧訪我金陵水月前寄華文逺江空月白秋千里不見山人跨鶴來梅樹長懐隴頭信菊花虚負掌中杯清川碧石三吳道老鴈長雲九日臺却對曉星傷落落客邉懐抱幾時開寄正齋俞藩叅仲春風日冷萋萋側望歸人路不迷千里紺烟新撫哺兩都青𤨏舊封題鵷鸞有翮中猶鎩桃李無言下自蹊沙舸一尊違面把素書遥寄魯門西除夕述懐奉類菴宗伯薄暮融風起凍霞五更晴靄麗年華空香裊篆爐存火苑色囬青栁放芽辭谷早鶯同命侣過江春鴈各思家物情人事端居外頗念吾生亦有涯午日觀競渡共駭羣龍水上逰不知元是木蘭舟雲旗獵獵翻青漢雷鼓嘈嘈殷碧流屈子怨魂終古在楚鄉遺俗至今留江亭暇日堪髙㑹醉諷離騷不觧愁華泉集巻五
