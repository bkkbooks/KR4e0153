body:
  text: 華泉集巻十二明邊貢撰文集誌銘明奉直大夫前軍都督府經厯毛公墓誌銘公諱琦字季温其先姓王氏臨汾人也國初諱皋者始從臨汾來居禹城娶毛氏婦而生子禎毛氏婦病且死語禎曰爾能嗣爾外王父使勿絶吾將瞑目焉於是禎又隨母氏姓而遂為禹城人矣禎仕為河間衛經厯贈文林郎又贈奉直大夫配桂氏贈孺人又贈宜人是為公之父母其贈也皆以公貴也公生二十有八年而始舉於鄉舉於鄉者凡二十年而授後軍都督府都事階文林郎為郎者又八年乃陞前軍都督府經厯階奉直大夫為大夫者纔五年則致仕歸矣歸十有七年而卒卒之日為正徳癸酉三月丙戌距其生正徳戊午四月乙卯蓋七十有六也配同邑劉氏女封宜人先公一年生又先公五年卒得壽七十有二其葬也則合窆於城西之原其日則公之卒之年九月之乙酉也邊生曰余嘗竊聞之公為兒時業能畫地為字以教其傍舎兒其長也則又能以其經教鄉人其鄉之人之以書傳鳴者皆其弟子也宜有以自異也公退然若無能焉其為舉人則㑹試者屢也皆不售焉其抑也亦極也而公不曰有司者之過也曰有命焉此其賢何如耶至於其仕也其上官者則皆武人也公事之弗陵焉亦弗隨焉其掌則居庸之與山海關也有過焉者得府帖而後啓焉又閩也廣也雲貴之逺也襲䕃之牒於是焉證也公一切剗剔吏偽無遺焉有恩徳於人焉嗚呼其亦能已𢎞治乙卯詔選民家子弟尚公主而公之子九思君在首列當是時四方之豪貴之來也駢如也有中貴人者語人曰毛氏子誠賢俊吾能軒輊之即弗賄必弗庸也人以語公公曰非吾事亦非吾子志也不為動既又求一見焉公曰屈身以求富吾不能為也卒不見中貴人中貴人怒乃卒擯棄公之子如其説弗庸始公子之在選也有貴官者見而美之㑹既擯棄即自往許婚焉公辭曰吾下吏也不敢求繫援也乃又觸貴官怒竟以逐歸人曰甚矣哉毛公之憨也自貽戚矣公笑曰是安知余哉乃後甲子鄉試而九思君竟取髙第其進也蓋炎炎然如旭也傳曰知子莫如父非公之謂耶然余又聞劉宜人之歸公也數年無所出謀於姑置庶室焉公聞而亟止焉後生九成又生九思又生諸女子謂天道無知耶而九思君則又甚賢於公之生也克事之喪也克執之葬也克舉之行也克狀之其狀之事也核其文古也類太史公焉可必傳無疑也故余於志也畧焉然則公與宜人之永也其在子矣銘曰胡爾弗愜於仕弗捷雖則弗捷駿聲則煠勢弗爾劫威弗爾讋屢步屢跲匪爾則榮爾嗣嶪嶪繩爾世業胡爾弗愜明贈文林郎藁城知縣姜公合葬墓誌銘公姓姜諱福聚字以諱行其先髙宻人也王父明逺始遷濵州王升店居焉娶觧氏生考友才友才娶杜氏生公晜弟凡七子而公行三公故在諸子中有威儀也又耿耿有介行不妄言笑里中人無不敬憚公者然公顧慈惠不刻害見弋鳥輙買放之耕牛死必埋之曰吾以報其勞也於是里中人知公長者爭要結之有事悉往聼處分公少日嘗視田行柳浦中見卧者就問之弗言苐以手指口公審其暍蹙然曰傷哉人也徒步走數十里取水救之卧者起再拜辭去不問其姓名其不責報如此乃後為賈於京師聞母病棄其貨走歸家日夜涕泣蓬垢請禱以身代及父病亦如之公篤孝不止此蓋其天性然矣乃父母殁則盡以財貨散讓諸晜弟而已獨亷取之晜弟殁又分業諸子姪使有成立諸子姪皆感恩至於今思公無不泣下也公生永樂辛丑四月二十五日卒於𢎞治辛亥三月四日年七十有一娶霑化劉氏女早卒無所出再娶王氏王氏者同郡王英女也有容徳能女紅又能事舅姑舅姑皆愛喜之不曰有子曰吾有婦焉以事姜公者又有禮焉奚不可謂克配者也生男子三人孟曰佐仲曰時季曰越越長而死時入粟為義官佐業儒乃姜公卒五年丙辰舉進士為藁城知縣勑贈公曰文林郎如其官贈劉氏封王氏皆曰太孺人矣知縣召入為御史㑹恩例公及兩孺人者將改封焉而御史乃又以直道忤貴人調安東矣貴人死佐乃起為太倉知州而王孺人卒其卒也以正徳辛未三月七日計宣徳己酉十二月十日至是八十有三年也孺人有女子二人皆適大族然又有孫男子七人孫女子四人而又有曽孫男子者三人也邊生曰余聞之濵父老言姜公有純行蓋隱君子也而王孺人則大賢方佐在藁城迎孺人養出有車馬奴妾甚貴顯矣當是時孺人二姪者綸為給事中綬為御史赫然朝著門第莫京焉孺人見人恒惴惴弗以耀此其賢奚止優於婦人而已也宜其子孫之衆多且賢而又壽也鄙諺有之曰孰種弗穫歸視爾穡孰善弗蕃歸視爾昆公夫婦之謂矣孺人卒之明年九月甲申太倉君將啓其城北之塋而合葬焉以狀乞邊生銘邊生之與太倉君者舉同鄉也又同舉進士為之銘曰父斯積也母斯廸也壽斯華斯曷爾戚也綿爾承斯𡨕𡨕者之錫也潘副使墓誌銘正徳庚午冬江西按察司提學副使潘公朝覲如京師居京師接待寺遘寒疾七日而卒是為十二月十有一日矣京師人士聞之者莫不流涕也蓋發其行李囊不盈十金焉其後事則皆其屬邑令胡椿汪頴者之經紀之也踰明年二月公之喪歸自京師過江西江西之士哭之者莫不失聲也又踰月始達於江陵江陵公故郡也公故郡宜有宅以殯公以貧故未嘗有殯於村舍則蓬屋蕭然敝矣於是江陵之人無老幼賢不肖過其門者莫不徘徊嗟悼泣下沾襟也又數月其子光祖始克舉葬事是為辛未冬十月矣葬之前一月光祖以其客覃儒士之狀來請予銘予與公相仕京師相識也且相愛也又吏於公之土其何可辭則為之志曰憲副公者諱子秀字人傑潘氏其姓也生而靜淵寡言為童子學日記千餘言鄉長老目之曰是子秀如其名也及長性復沉毅治易經得易經之隱發之於文潔靜而精微自學宫同軰以上無弗異之者則皆稱曰是人之傑也可不負其字也成化丙午湖廣鄉試中式𢎞治癸丑禮部㑹試中式賜進士出身甲寅授職方司主事職方主事能其官調文選司主事文選主事又能其官進陞員外郎蓋未幾以母李安人之憂去又未幾而遭其大人之喪矣喪畢改武庫司員外郎武庫員外能其官如其在文選職方也進陞武選司郎中尋擢今官而中道止矣嗚呼公厯官終始凡十八年出入吏兵兩部今所謂兩部者天下之要樞而所厯之司又皆兩部者之要樞也而卒之日家無以為居殮無以為具然即是可以知公之在官矣公之仕京也雖厯華要而服食澹如予鄉周進士導居與公隣嘗顧謂予曰與潘子居二年不聞其内人聲也嗚呼是可以觀公之教於家矣狀稱公孝於父母其問寢之勤也視膳之周也執喪之哀而侍疾之憂也又稱公兄弟之友也朋友之厚也是固其章章者可弗著著其閒者細者而其餘者咸由是喻矣嗚呼若公者可不謂之彬彬君子者耶遡其生天順癸未壽纔四十有八而其仕又若是止矣嗚呼公之於天抑所謂不得其恒者耶是則莫可喻也按潘氏由公而上曰志澄者任江西太和主簿以公貴封承徳郎吏部文選司主事是為公之大人曰必文曰太忠曰伯勝者皆不仕是公之髙祖曽祖祖也由公而下以光祖榮祖為子以户部郎中劉悦女為長子婦以儒生王臣龔宦馬伯福萬志髙為四女子丈夫而其子若女者皆公配張安人出也安人江陵宦族女鄉里以為端懿淑慎克稱壺徳云銘曰秘之淵如發之川如曷任弗勝曷嫮弗瀦巍巍學宗江西是崇既端其政亦美其風彼𡨕者樞嗟孰秉之有斐人斯乃弗永之永興之原厥壤斯厚厥懿孔良萬祀弗朽張勲衛妻游氏墓誌銘正徳戊辰春正月某日錦衣衛勲衛張崙妻游氏卒卒二十有六日而葬葬之前十日勲衛君來委予銘蓋君之繼母尹為吾鄉太保吏部尚書恭簡公之孫前翰林侍講舜臣之女而予仲姑實婦尹氏故勲衛君視予猶尹氏分行也銘豈可辭游氏諱芝世家淮陽祖傑為錦衣衛正千户父泰為駙馬都尉母為隆慶大長公主年十六歸勲衛君勲衛君故梁人皇明開國功臣河間忠武王之𤣥孫靖難武臣定興忠烈王之㑹孫今太師兼太子太師英國公之冢孫也父鋭娶錦衣衛指揮使孫瓚女是生勲衛君君生七年而喪母又七年而孤又八年而冠始卜游氏而委禽焉方是時兩家門閥赫然京師也游出無侈容入無怠行張氏無少長咸宜之曰吾得主婦矣歸二年遭繼祖姑許夫人之喪喪一日而生子遂以哭泣成疾宛轉牀褥間尋止尋作猶哭泣不已越四十日而竟卒卒之日索子置懐中摩拊煦煦者乆之已而不言呼之亦不應急視之死矣生𢎞治庚戌九月二十六日至是十有九歲也子名驥為之銘曰盧溝之西有連其岡土沃而臧咨淑媛兮其永藏祔於先姑兮亦孔之傷孺人張氏墓誌銘志曰孺人張氏者諱某故家厯城人也父某仕為灤州判官以子某貴封户科給事中母某氏封孺人凡生子一女三而孺人其中女也孺人生六年而聘於劉氏聘十有四年而歸歸三十年而卒卒之日為正徳戊辰十一月晦日距其生天順己卯三月某日壽五十而已矣夫曰某𢎞治壬子舉人今為髙邑知縣云知縣父某故嘗為鞏縣丞丞禄薄也然乃故清苦而其配姚氏者慈惠善施以是其致仕返也則舍蕭然也方是時孺人以隨其大人公居灤州知縣君則往娶焉禮既成孺人長跪白其大人曰兒歸矣舅姑老垂白在堂實縣朝暮望不歸無以為子與婦也兒歸矣乃卒與知縣君歸事縣丞夫婦自巵酒言笑以上惟恐弗遂其懽心也則奚但有於己者勿自私也居有間里中人稍益聞之則相告以訓曰劉氏婦可謂善事其舅姑已矣癸丑知縣君有母之喪甲子有父之喪孺人相之治葬事豐不踰禮不以委妹娣不見齒者六年里中人又嘖嘖嘆曰劉氏婦可謂善居喪矣夫孺人之於其夫也自家食以至於有官也則孰非其相之之力也乃知縣君甫至縣而孺人病矣其來也則舁之至則起起而又病然不半歲而竟不起矣嗚呼是可哀已始孺人之少也灤州公目之曰慧而重必貴也吾又不以輕許人及其見知縣君也則又大竒之曰非是子莫可貴吾女者嗚呼貴矣而不竟其享也是其可哀也已矣孺人卒之明年己巳其子舉人俊民者自髙邑與其妻挈其少妹歸孺人之喪於厯城先事又自狀其母之行事使使如京師來請銘焉予少受學於孺人弟給事之門則孺人之賢聞之素矣而俊民之妻出陳氏實予季姑女予與俊民固兄弟也是惡可以辭為之銘曰配也於灤墜也於灤往也輿之輚以還幽幽新宫固其安䰟之來歸毋忘於舊山呉處士墓誌銘鄹平象胥氏曰孫子景煇者客廣陵主於呉子鎧家呉子鎧有父之喪八閱月猶殯也因象胥氏如厯城謁野史公而請銘焉野史公之於象胥氏者友也不可辭也則問之曰主人之父也其諱云何曰瑾也曰何字曰字廷器又問其職曰以入粟為散官也問其壽曰七十有六問其先焉曰斌也其父也劉也其母也英也其大父禎也其曽大父也問其後焉曰鎧也紳也欽也鎮也鋭也其子也而相也其孫也郭子珍也陳子英也詹子盛也黄子璋也馬子翔也其五女子者之夫也問其匹焉曰王也其嫡也子三焉女子三焉楊也其庶也子女四焉皆少於王所生也問其鄉曰登之蓬萊人也戍於遼得代歸焉賈於揚其日乆其殖衍也其産膴然豐又屹然固也遂家焉問其衷曰翼翼然也秩秩然也無曠言問其行曰瞿瞿然也于于然也有長者之風焉問其忌曰正統戊午十一月二十六日為生而其卒也則正徳癸酉六月之六日也問其墓焉曰江都之西北大儀之鄉問其葬日則曰猶莫之敢諏也野史公曰古有言不知其子視其父不知其人視其友吾於鎧有徵焉處士之喪非其力弗能舉乃越千里而圖不朽焉而象胥氏又能口狀其主之父之生若見也然則鎧也者其魚鹽之雄乎是可銘也銘曰維魯之頓維陶之朱維烏氏之倮斯巧積居維登之呉壯也執殳老豐厥儲雄於具區度武校驅無乃爾其徒與魏邦奠墓誌銘志曰魏邦奠者名治邦奠字也讀書邵城西黄岡之下人稱之曰西岡魏子癸酉之秋舉鄉試第十六名於是人稱之曰魏舉人云魏子為舉人者六年再試禮部毎試人誦其文咸曰是山東佳士也當必取上第無疑顧坎坷不得第卒業太學歸厯城甫四月死矣是為正徳戊寅九月十有七日距其生𢎞治戊申四月十有一日得年三十有一而已悲哉死之日貧甚無以具棺殮也郡大夫髙子洲助焉衛大夫毛文卿助焉邑大夫池文化助焉鄉之人之為學士大夫者助焉下至閭黨親戚有識者助焉越十有一日葬於西岡之原從先兆也魏子之先本燕人曰曽祖顯者樹功文皇朝官濟南衛右所正千户祖震繼之父安母劉生魏子兄弟五人而魏子居二餘四人者漢澄清浦也妻于氏生一女纔十齡耳野史氏曰予於魏子者之死也而信天道之難忱焉人言魏子事寡母以孝稱交朋友以義稱弟䧟死刑白其寃不可得竟奔走憤欝以死而使之無後天道果可忱哉銘曰嗟魏子竟止此生孰尸死孰使竟止此嗟魏子義民鄭君合葬墓誌銘志曰此墓葬義民鄭君者也鄭君者厯城人墓在城東南二里所蓮渠之北與閔子墓對蓋鄭氏此園自處士子英始迨鄭君葬五世矣子英生處士可賢可賢生處士祥祥生處士鐸鐸生鄭君鄭君生正統戊午八月十四日卒𢎞治己未七月五日年六十二歲配于氏生正統庚申正月六日卒正徳戊寅十一月二十二日年七十九歲泰安王典膳其男郭氏王氏其婦適洛南主簿張希龍其女國子監生大綸黄池驛丞大綱里社學生大紀其孫男桂蘭蘋蘩其孫女重京添驛其㑹孫男寜其㑹孫女也己卯二月二十八日典膳君率婦子􅀈鄭君之墓合以葬焉先事來乞銘邊子邊子曰嗟孝哉予知典膳矣忍不銘鄭君哉鄭君名璟字廷璧弱冠有長者風見重于翁于翁者于祥也語人曰吾求壻乆矣無如鄭氏子賢鄭氏子長者也故于翁女歸鄭君當是時鄭君業衰微矣不敵于翁于翁女顧益敬慎執婦道事祖姑氏劉姑氏昌咸得驩心二姑者語人曰于翁女賢他日生賢子孫昌鄭氏必于翁女也廼後生典膳君典膳君生三日而處士鐸死于號痛絶七日始甦嗚呼豈不賢哉豈不賢哉鄭君既得賢内佐則業日益昌而鄭君者故又好施與也里中人婚弗娶死弗葬者恒仰鄭君于又能佐鄭君使施與之使娶使葬無吝容歲凶餓夫羣然操瓢延頸於門日給粥不厭故里人為之謠曰吹我者渠東郭之風耶活我者渠東園之翁耶嗚呼即是可以知鄭君已矣而成化癸巳之歲凶也出粟若干石以食饑民𢎞治壬子歲又凶出粟若干石以食饑民於是監司者颺於朝而天子詔曰其以鄭璟為義民爾矣冠若服比貴人焉君弗悦語人曰如有復我者則吾必在海上矣君子曰非鄭君之志也銘曰東有閔祠嵣如嵭如鄭墳在西斧如堂如厥中坎如對峙儼如湖廣右參議懲軒張夫子合葬墓誌銘正徳己卯秋九月己酉我懲軒夫子卒殯於堂踰年矣辛巳春正月戊寅王夫人卒子延壽以是年夏五月庚申為墓於城西南十里許馬家庄之祖原合以葬焉且葬門人邊貢北向稽首哭而言曰嗟慟哉傷乎此先師之墓也予小子忍銘之哉又志之哉已而曰何敢不志何敢不銘是先師之命也矧有天民狀乎天民者夫子仲姊之子吏部主事劉君也其事核其語情有足徵焉於是􅋞涕輟泣掇其梗而志曰夫子也者姓張氏名良弼字曰夢徵其先信都人也髙祖思義避元亂居厯城曽祖士謙祖禮世安於隱父進仕為直𨽻灤州判官封徵仕郎户科給事中母董氏封孺人以夫子也夫子生四歲能背誦五七言詩六歲能書大字七歲通舉子業十六歲入鄉試塲其入試也自持一巻詣御史梁澤請焉而家人未之知也御史見其文語人曰是山東英俊矣後必有聲未冠由灤州入京師受業太史王公􅎁之門太宰尹公見其文以語從子壻工部主事範曰拙者擇第巧者擇壻是齊諺有之乎主事悟以女妻焉女即王夫人也夫人性婉嫕能以事父母者事其尊章廼尊章之視夫人亦若女然由是夫子得以肆力就學於外名日翹然著矣成化丙午遂舉於鄉𢎞治癸丑舉於禮部敬皇帝親䇿之賜進士出身觀政吏部一日太宰耿公問諫於進士夫子立對累數十百言其大要有三曰上諫補世次者濟民下者要君太宰喜言於宰曰是可以為諫官已矣於是詔以夫子為户科給事中云當是時也帝憂勤勵精於政重諫官顧見夫子在班行凝重不阿豎眉而鬒鬚且黒面而又素習知其名也心竒之恒注目焉未幾勑視光禄寺及諸内藏無容私中㳙主之者遙避之聲傳禁中不與他諫官伍即他諫官有章奏入禁中者未啓封帝輙驚以問曰是張給事䟽耶張給事者謂夫子也其為主上憚如此丙辰勑勘廣東獄事至浙江以病歸丁巳病已復起己未夫子有母之喪辛酉父喪哀毀骨巉巉立幾不能生王夫人實左右之以克襄事癸亥喪已復起甲子勑視延綏邊儲有却守臣餽金之事西邊之人至今韙之乙丑陞兵科右給事中連陞禮科左給事中而先帝上賔黨禍興矣丙寅勑視宣府邊儲未反命竟坐黨事免官蓋丁卯春三月之詔也免官者又十年而歲在丁丑以太宰陸公薦起為湖廣布政使司右參議提督太嶽諸山宫觀兼撫襄鄖諸府流民居無何坐與中㳙者不合致仕以歸歸十有二日耳而卒也距其生天順壬午冬十一月甲寅得年五十有八而已夫人得年少夫子者一歲顧皆未及於下壽也傷哉傷哉是時夫人一子一女女秀適王士臣子即延壽徳府長史司典簿以山西按察司副使徐君暹女為妻少一子延慶别出邊氏少女畢别出王氏則以聘玉田縣丞君永貴之子王宦者也邊生曰易不云乎王臣蹇蹇匪躬之故其張夫子之謂乎方逆瑾扇虐時厥勢盤盤炎炎逢者焦觸者碎矣八黨之擊夫子倡焉竟亦首嬰其禍而道靡以伸也嗚呼傷哉語曰直幹易折方輪難行夫子以之矣晩暮見徵輿病而出何為哉何為哉然進不愛身退有餘樂非内主者之賢其又奚以成兹美也夫子夫人可謂恊徳者矣敬稽首再拜而為之銘曰履也者其貞乎恒也者其成乎困也者其亨乎是為夫子與夫人也嗚呼封承徳郎工部主事槐亭王公墓誌銘正徳丙子冬十一月十有九日槐亭王封君卒於家距其生正統己未九月十有六日年七十有八矣子金仕至福建按察司使朝覲如京師卒於丹徒蓋先封君二十五日而封君未之知也傷哉當是時閩石峯子陳琳齊華泉子邊貢之二人者之與按察友也同仕於梁聞訃悲焉已而按察君之子守謙將以卒之明年二月舉葬事扶杖如梁城泣而請銘於是陳子謂邊子曰嗟乎按察君之與予二人者友也予與之同仕於齊又同仕於浙按察君與予厚予請銘之請子銘封君若何於是邊子為之志曰王封君者諱相字國柱許昌臨潁人也三世祖忠仕元為行軍㫁事㫁事生合州知州睿睿生冀判官璽璽生封君封君生十五歲業舉子業即諸老生咸避匿矣無何母李夫人病即棄去舉子業歸事母夫人而與其配邢安人者治農圃焉圃故有亭封君顧時時登之讀經與史又於亭之四圍徧植槐樹居數年隂宻而葉繁人問之曰此吾家故事也問其故笑而不答已而曰夫亭吾亭也槐吾槐也君苐呼我曰槐亭子而已奚以問其故蓋自是封君以槐亭號里中矣里中諸富豪故好鬬也又好相欺詐故多訟封君遇訟者輙以佛氏善惡果報之事恐之訟者輙叩首觧去自是諸富豪遇封君輙相指曰息爭佛來矣故里中又號封君為息爭佛邑大夫聞而訪焉問之曰佛氏報也誠有之乎對曰無夫民愚耳知利害不知是非不如是罔有從已邑大夫退而嘻曰孰謂槐亭子為農圃者哉自是毎鄉飲必以正賔禮禮封君固非直為其子之貴也子之貴嘗為工部主事階承徳郎乃後封君亦受勑封主事階承徳郎又嘗為按察僉事服獬豸服乃後封君亦受詔服獬豸服至榮顯矣然封君往來親友家恒布衣野巾如未封時即逺出恒步行不乘輿若馬所居屋蓬茅蕭蕭如村舍然予試士過焉而往拜焉蓋親見之也嗚呼大盈若沖大成若缺若槐亭者豈非闇然君子者哉而其子顧若是止也往所謂故事云者信耶非耶按狀封君凡六子邢安人生按察君由按察而下曰玉曰迹曰業曰休曰言五人者為繼室潘安人出按察君之子由守謙而下有守誠守謨者二人曰守訓守讓守誨又三人則諸子子也凡六孫焉乃又有壻若髙霓若趙仲時若劉易而又有曽孫若耕也者翩如班如林如雲如夫又安知其後不有為三公者也華泉子曰予讀史記之文而有感焉使太史公不生遷斯後世靡有聞已乃予於封君也生以金之狀嘗壽之詩死又以玉之狀為之銘若志固為其狀朴直無虛誇可傳也銘曰子曰鬼伯胡爾我廹嗟嗟父垂白父曰鬼伯胡爾我廹嗟嗟子行役繄厚者土黄者泉此日何日年何年而相見焉潁城之南塚連連嗟哉此哀終彼天行狀先代州府君行狀曽祖考一誠不仕妣趙氏祖考文質不仕贈奉政大夫應天府治中妣萬氏贈太宜人考寜仕至奉政大夫應天府治中妣王氏封宜人狀曰邊氏故淮隂人諱朝用府君者我先君髙祖也至正之亂徙厯城遂家厯城冒王氏姓者三世矣乃至我大父奉政公而始復邊氏云奉政公配宜人王氏是生先君先君有二弟皆夭死獨先君存又少多疾也故父母憐愛之然先君性靈異弗以憐愛故有跅弛乃脱乳學記誦即善記誦八九歲即所記誦書諸老生弗如也既長為學官弟子愛禮記學時文即善時文學字書即又善書一時為學官弟子者亡不出先君下也然數試乃數不第為學官弟子者凡十六年而當成化丙午是年舉鄉試第九人其後又數㑹試然乃又數不第顧數試太學四方之舉人試太學者咸推服先君矣為舉人又二十年而當正徳丙寅始入選試吏部吏部列置第一矣乃授山西代州知州為知州者三年則致仕歸歸二年所病乃不起是為辛未六月乙未距其生景泰庚午四月己卯春秋才六十二也恫乎傷哉往聞之先大母王宜人言奉政公為舉人時甚拮据矣嘗厯事居京師逆旅疾九日不知人人或傳其疾至家家中人獨先大母及先君以事曽大母萬太宜人耳太宜人聞之乃下堂而啼謼曰天禍予天禍予疾九日不知人即庸知生死也家貧又亡壯男子即往視是孰可使者乎乃先君立庭下即應聲曰兒可往請使兒行當是時兩宜人者易其少且以其為戲也即陽許之明旦先君雞鳴起長跪白太宜人請治行太宜人乃大慟啼泣曰孺子日嬉膝下足不造里門然吾聞京師者逺千里也孺子豈有能耶孺子不能孺子留先君曰夫甘羅生十二為秦上卿使燕趙下三十餘城兒故不佞與之同齒矣太君其試兒何遽謂亡能邪夫至親者母與子也子與父也大人客千里未知死生兒不行是弗子也太君憐念兒不使兒行是厚於孫而薄子也為弗母皆弗可也請使兒行言已伏地泣於是曽大母大母益又慟乃婦姑相向啼且泣不能已也卒附里人張老者相之行至京師則奉政公業已愈矣夫十有二可謂少也走千里以視父可謂孝也是非其至性然邪乃後先君當卒業太學則奉政公疾也則遂左右奉政公疾不卒業太學當入選則王宜人老矣乃又遂侍王宜人老不入選以故於二親者之終也咸無有遺憾焉然自是遇忌日輙哽咽盡一日不食飲乃在郡遇美食輙號泣曰天乎奚吾親之弗逮也夫五十而慕孟子曰於舜見之乃先君在郡時幾六十矣是非其至孝耶其始至郡也郡鄉村多豪家恃强横不服役也先君召父老與之言君子野人之分上下之義使布告諸鄉村豪家於是諸鄉村豪家咸來服役自後帖帖矣又視郡中獄多繫囚以問吏吏曰此其人皆頑慢者不以時入賦不可釋釋則亡不携父子入林砦以拒官府先君按其籍則皆亡餘夫者乃榜其吏曰夫甿以孑然之軀而務菑播即拊且循猶勿有以給也顧胥靡鉗􅎂之則猶以朴召犬也愈不幾也乃釋諸繫者囚與之限列使入賦於是諸繫囚以首觸地曰父母父母皆踴躍以歸及限列賦纚纚來入矣是其為治也豈獨事聲色鞭笞者耶先君又不喜逢迎比在郡中謁者來廷掾曰故事中謁者來太守郊迎出百里蒲伏拜負弩矢前驅至則以千金壽始免辱也先君曰吾民窮國賦不能入奈何有千金也寜辱我亡苦我民卒不與中謁者金又値御史行縣邑時中官瑾肆侵牟矣御史者故秦人而又其肺腑也乃先君庭謁屏人語降色求賄金焉先君腹非之為禮不敬又不與御史金卒以是忤御史坐謬劾免官歸及御史以賄敗諸免官者咸上書復其官乃先君不欲復其官倦馳騖矣乃日共具召族人故舊賔客飲酒賦詠相娱樂醉則􅋜􅋜睡矣醒即輙又飲飲又輙醉如是者以為常不更問家事也此其度可與委𤨏刺促者道邪然予又聞郡大夫舉鄉飲將以上賔禮致先君人或誚讓之曰夫鄉飲者所以章賢也此其人以劾免奈何其賢之郡大夫曰嘻是乃邊公所以為賢者也夫逆瑾擅權厥聲猋騰山摧雷激火烈以恐喝宇内郡國之吏之不戰讋者或寡矣是孰敢嬰之也然邊公既忤中謁者又忤御史以蹈不測夫豈不自愛邪是乃邊公所以為賢者也於是卒以上賔禮致先君而先君一再往焉蓋自是病食先君脩美有容儀善口辯能汲人之善顧乃好面折人人面折之輙亦善受也故亡不憚慕焉又伉爽喜自負也不為蓄縮態即怨家以緩急赴輙亡避患害趨之即死不留怨過其門亡不臨况也故鄉人頌焉故嘗居䘮祭矣善執文公禮沒其身亡或渝乃鄉人皆化之亦執文公禮又嘗歸吾妹於王氏不論財乃鄉人又皆化之亦嫁女不論財即有論財者亡不愧弗執禮者咸惴惴焉恐先君之知也故時人為之語曰寜受縣官捶毋為老生鄙蓋指先君矣先君名節字時中别號介菴嘗自謂曰吾慕蘇子卿之為人幸他日舉進士必以漢卿易吾字於戱悲夫乃卒不獲信其志也然亦可以觀先君已矣先君配吾母董孺人白首亡媵妾乃孺人温靜篤僿亦敬事先君也故相待若賔焉孺人以𢎞治戊午不肖孤為博士封孺人故先君稱之必曰董孺人矣凡育子若女得三人焉女子一名劉既嫁而寡尋又死惟予二子在乃先君卒時不肖孤挈胡氏婦守荆州不及見見之者仲子賦與其妻趙氏在側也又所生孫男女皆殤折靡有存也此其𡨕漠者魂魄私恨寜有窮已邪不肖孤曰邊氏之先世有厚積焉然至我奉政公而始發之若作堂室奉政公其累基者也而構於予先君承之者予二子也荀卿有言譬之若山木枝葉必類本孤不肖敢不俛焉夫先君行業可誦説施於後世者豈若是已也予愳其近支曼故弗詳焉謹述其槩者著之於篇以附於學士大夫以求論譔其先君之名因不没矣夫予欲覧者之彷彿也故亡敢諱焉又甚荒迷也故弗脩焉伏冀裁擇之畧其言讀之以意則甚幸矣惟執事圖焉胡氏婦陜西按察司副使經女封孺人趙氏婦陜西按察司僉事璧女女適王氏子庭彦先君同榜舉人昌齡子為濟南府學生貢又先娶柴氏處士鳳女卒贈孺人先夫人董氏行狀正徳丁丑後十二月壬申先夫人棄代於汴不肖孤創且昡不勝喪幾殆者數矣越明年春二月始獲奉夫人喪歸濟南祔於先代州府君之墓於是覧涕茹哀序次其世行匍匐太史公門以銘請曰先夫人者諱金厯城董家女也父曰傑仕為永濟驛驛丞以義氣豪里中里中人咸尊敬之不敢名號曰董公董公與先公治中交甚驩也又甚愛先府君故許婚焉蓋是時府君才三四歲即頭角嶄然露矣一日先公大置酒㑹客府君戯立近董公董公即自抱府君坐膝上曰呼我舅府君應聲連呼曰舅舅又教曰我呼爾為甥爾應之府君又連聲應之曰唯唯毎呼若應董公顧先公輙大笑滿坐皆笑如是者三於是坐客盡起舉酒賀兩公曰天定矣乃遂結兩公衫之襟割以佩刀矢之曰今而後有不同心者有如此襟於是坐客大笑舉酒復賀兩公盡醉乃罷散去夫人之母趙夫人聞之怒董公曰嚄而女多老不售耶何自妄許與人董公笑曰是非爾所知也吾言豈醉而可食者哉乃卒許先府君以歸夫人夫人歸府君年十七耳曽大母萬太君與大母王宜人無弗愛夫人者也始廟見先公亡數百金求之不得太君曰得新婦賢奚翅千金乃遂名夫人曰金當是時也太君老喪明矣性峻急善怒即盥沐飲啜皆湏人扶舁之即他婦扶舁之弗喜也必以夫人至如烹調事出夫人手者太君必喜且多食曰是可吾口是可吾口即他婦烹調之紿出夫人手太君必厲聲曰吾無舌與鼻邪不擲即大罵矣其得祖姑意如此乃後先公病以及王宜人病夫人猶洞洞焉日事烹調飲啜盥沐一如奉萬太君弗敢以他人代也故先府君敬重焉然所以事府君者則曷有異於舅姑者也獨弗跪且拜耳非其婉嬺篤慤出於天性者能若是耶初王宜人生府君止一子已又取其弟之子城自子之夫人呼城曰吾叔也又為之娶婦夫人呼其婦曰吾娣也同居十五年無誶言及先公卒府君未仕家計中衰矣城求去有私畜數百金或以嗾夫人可發之夫人曰金可去吾姑之心不可傷也嗚呼夫人蓋嫁三小姑焉不惜財人謂夫人愛小姑不惜財由城之事觀之可以識已然夫人性固儉也雖中帬厠牏無不經六七澣者雖數澣破碎不可服亦不棄至如文綺夫人弗尚也往受孺人封有命服矣拜恩即封閉不再服有吉慶事不肖孤請服之夫人笑曰孺人卑七品耳俟爾大封我乃服之嗚呼豈誠然哉乃後府君為知州例進宜人不肖孤有今官例進恭人皆不及封而夫人卒矣顧言猶在耳也痛乎天哉不肖孤曰夫人之卒也蓋傷心焉先府君屬纊時吾弟顒然壯夫也遺言曰我未有孫焉以為恨乃府君葬一年而吾弟死矣夫人思之未嘗不泣下沾襟也及來汴言及之泣忌日泣歲日壽觴上泣凡泣必曰昔爾父之仕也痛不令爾大父母見之以為恨然爾大母猶見爾舉進士又見爾弟由今觀之吾逺不逮吾姑矣言已即又啜啜泣數行下嗚呼豈不傷哉蓋未幾而夫人病矣夫人病謂不肖孤曰吾夜者夢後庭榴始華頃之垂巨實如盎我往將摘焉爾父在側亟召我兹吉乎凶耶今爾妾幸有身而吾病吾恐不及見爾子也是天乎是天乎蓋自是憒矣既憒氣上出如炊甑不絶又殷殷如百里外靁踰日始甦既甦猶瞪目顧不肖孤曰天乎天乎吾邊氏老寡婦也何戀於世顧念爾無羽翼吾無以下報爾父及爾大父母於九原耳已又執不肖孤手呼曰天天一子者良苦矣已又連呼曰苦苦遂不復言踰四日乃卒嗚呼尚忍言哉尚忍言哉夫人卒七十有七日不肖孤乃生子告之柩前命曰羽志夫人之命也然夫人巳弗省矣嗚呼可痛已矣夫人生景泰癸酉正月乙亥少府君三歲其卒之年年六十有五也傷哉華泉集巻十二
