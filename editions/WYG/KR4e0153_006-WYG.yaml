body:
  text: 華泉集巻六明邊貢撰詩集七言律詩和㮚翁家訓四章為整菴相公作封事休將入帝宸致身安得自由身書迴梓里家無恙望重文昌國有鈞金馬乆期黄閣老碧山常對白頭親深憐問寢趨朝夢半在昏鐘半在晨宛洛分攜五見冬豈知遷轉得相逢藩垣子不慙京兆禮樂吾深愧秩宗寒宴水西開紫菊暮帆江上對青峰朝正切感當元㑹十載重聞鳳闕鐘千里正愁歸逺道一燈深喜借餘光不縁駿馬威相近豈得豺狼跡自藏橋市水雲兼上下斗城星宿接低昻南都浪說神仙府不道神仙夜亦忙金陵二水三山地白筆冬懸海日光駿骨乆知天下少豹文虚擬霧中藏蘭臺望重桓公雅藝苑名過趙子昻倚馬共推才力徤漫將官守較閒忙見素林公坐上喜雨蕭蕭靈雨夜垂空露浥葵心映燭紅忽報水侵庭礎外不知花盡漏聲中雲雷自識經綸象造化同歸燮理功我欲登堂問昭感如公真見古人風毛給舍宅話舊限韻燕歌聲接楚歌聲别恨迢迢苦未平花少共憐春色晩風多猶覺暮寒生十年奔走青山故萬里歸來白髪明倚醉不須談往事且圍殘局坐深更戲柬黄允升太常清河水西黄奉常五年身不到巖廊誅茅小築憑虚閣臨水新開注易堂已許白雲隨杖屨更招𤣥鶴伴壺觴金陵送客初停駕借問新醪㡬甕香九月朔兵憲董公召飲以腹病不獲叅侍几席相邀改期已而石汀豸史冒雨先至遂爾命觴且辱肴果之賜感念良晤談對無縁口呈奉博一笑病思何如酒思狂閉門髙卧雨浪浪兵曹恰許移芳宴驄馬先傳繫綠楊壺外矢聲翻急雨燭邊花影媚重陽知君似少金華醖不遣清尊到客堂坐上贈朱升之暫維沙舸憩蘭臯為訪金陵舊吏曹南鴈獨衝淮甸雪北風遙送海門濤尊開子夜情俱洽賦入陽春調轉髙起舞對君還照影笑看吾鬂已刁騷以詩招逺遊琅邪病不能赴荅謝夢想琅邪擬卜居入山閒過一春餘真縁病骨時相挽可是髙懐迥不如鳴雨似聞深樹鳥躍波行見碧溪魚蘇州雅調廬陵記壁上誰今敢再書汪東峰小園即事退食悠然抱逺思西園拄笏看山時春留别塢花明樹雨過閒塘水到籬官况不違丘壑想才名兼得廟堂知愛君憂樂闗天下長對蒼生擦兩眉贈都督馬惟淵斬將搴旗處處勳冠軍名姓舊曽聞班超出塞先投筆郤縠登壇且好文海泛直窮蛟蜃窟山驅深入虎狼羣年來上馬披重鎧誓靖風塵報聖君寄閒齋汪少宰望迷烟樹俯春臯人在金陵隔吏曹將折岸花愁逺道欲乘江舸畏驚濤星辰地接台垣近海岳名垂翰院髙公暇兩都應有賦不須重和屈平騷寄吕思泉太僕永陽司馬碧山居㡬度詩來重起予笻杖日隨東郭履綵毫時寫右軍書梅花癖在官先棄鸚鵡才髙世共疎吳客逺歸憑問訊九還消息近何如寄俞正齋大叅建業春殘風雨凄惠山東望海雲迷函中尺素封長恨巻裏芳洲撫舊題臨檻恰當鶯囀樹步園無奈草盈蹊江門只隔三朝路何日扁舟過水西和荅毅齋劉鴻臚見懐之作水步山行隔歳期冶城春日正遲遲深探已辦千尋綆逺望常懸萬里思乆愧禮臺稱典故早從民部接芳詞舊京林苑多嘉樹擬看遷鶯得上枝奉荅知山光祿春寺晩歸之作際曉聞君已出城晩來消息未分明尊開漫自誇清酒詩到真如食太羮雪土細穿春草綠雨簾髙捲暮雲平虚堂燭火棊枰在可惜無人坐五更荅灤江王大理棘臺春静日端居藻思𤣥情入太初茂叔故應留徑草公儀安用拔園蔬極知台鼎身須到豈獨邊闗事可書江口暮潮天際月試從消長看盈虚贈伍松月憶昔荆南逺卜居相逢曽及鴈來初山堂習隠秋看桂郡閣留懽夜剪蔬天末往来千里道篋中悲喜十年書懐君只似江城月長願清光照紫虚寄嘉定章太守六千里外闗山道十二年中風雨愁書信不隨湖鴈過夢魂空遶蜀江流纎纎凍栁含烟裊苒苒春雲向日浮多病有懐貪逺望强扶藜杖一登樓樾岡中丞登舟後有作相示荅之中丞入奏揚帆日乳燕鳴鳩月正三楓陛曉星看斗北杏花春雨别江南詩多到處堪題石駕迥何人敢並驂苦别登臺逺相望暮雲斜照酒初酣贈石溪殷子掛冠心跡與誰眀海濶天遙萬里行巖畔直松傷早伐仗前朝馬戒先鳴國恩可報身方徤家債初償事少縈莫把五湖疑范蠡古今豪傑本同情金陵早春奉懐白巖翁次致政志喜之韻晉山迢遞隔吳鄉碧樹千重鴈㡬行江上再逢新歲月篋中時檢舊篇章名叨啓事心常愧迹阻門庭夢不忘已恨兩京成逺别可堪踪跡更殊方得白巖惠書山童傳信到江鄉滿紙雲烟墨數行西洛漫誇裴相國南宫何羨米元章四朝黄髪身仍徤五嶽丹梯興未忘觀物素諳𤣥化理不須重問九還方夏日端居奉懐往歲從龍謁帝鄉步隨仙仗對分行雲中秉笏陪郊畤月裏鳴琚出建章老去江湖頭易白别來山斗思難忘芙蓉採得無因寄愁絶盈盈水一方七夕懐南垣劉司空欲問南塘早暮潮栁烟蘆月望迢遙磯頭錦鯉真難掣天外㝠鴻可易招菡萏出波還並蒂女牛經歲亦成橋懐人已恨蓬山逺何處涼風引玉簫寄遼宗室光澤王次來韻離荆一十五回春睿想猶煩及逺人愁見碧雲天際合轉憐華髪鏡中新秋堂鼓吹揮毫夜雪苑旌旗校獵辰回憶舊遊情萬結渚鱗江鴈若為申賦俞大參正齋二宜園次二泉韻小園開處弟迎兄兄未歸來弟早營堪入畫圖傳洛社不須風雨賦彭城江鴻海鴈冥冥色棣萼荆花宛宛情一出偶令成白首始憐身外是虚名知山史君園梅始開邀客過賞時乃子際赴春試因及之次韻萬蕾含胎爾獨先玉膚瓊蕋照髙天臨風時有暗香度未雪早將春思牽深厚共知培養力芳菲誰秉發生權花神夜報郎君信來歲登瀛冠列仙答殷石溪雪中見寄二首瑤華新自石溪來燭底緘封手自開銀海散花方獨眩玉山當坐忽先頽邊橋市近多春鯉傍枕瓶香有臘醅晴日杖藜堪共酌細看臺竹與江梅白晝春雲接地隂黄昏春雪覆簷深洛中逺憶袁生卧灞上真懐孟老吟江麥秀期欣可卜隴梅開興恐難禁石溪漁父能憂世一曲滄浪萬古心喜蒲汀少宰卜隣紫宸西畔白門東雞犬相聞巷陌同家逺正須君作侣病多無奈我成翁池光向月虚含凍栁意歸春弱裊風珍重雪泥鴻爪迹翻飛回首五雲中夀春劉子希尹言念故鄉有拂衣之興奉問恨别君今憶舊山感時予亦念鄉闗天涯岐路㡬回首歲暮風塵多苦顔方朔乆疎金馬詔季鷹終為玉鱸還江城紫翠羣峰霽望極春雲杳靄間寄希尹再和前韻紫霞蒼靄護春山郡閣清虚晝掩闗百里不愁淹驥足九重時夢犯龍顔心傷異域濃花吐目送中林倦羽還歸使過江憑說信有人相憶水雲間寄荅子立董兄書來休更問新銜蹇命非才乆自諳遊屐謾誇探虎窟釣竿何用狎龍潭終知展季三宜黜豈但嵇康七不堪傳語故交虚北望已看華髪住江南太僕諸僚長以見懐聮句寄示奉簡滁陽亭館秣陵槎百里山城隔浦沙心逺自知江不限日窮誰遣樹重遮松間霽月宵行圃竹裏清風晩散衙仙吏兩鄉俱不忝此中惟恨少琅琊晩坐碧栁隂沈覆古槎黄昏時見月籠沙漁梁曲曲深相䕶賈舶鱗鱗迥不遮燈影夕懸城外塔水痕晴落㟁邊衙前溪子夜歌聲裊風景依稀似若邪殷石溪遷居二首溪翁小隠城隅地窈窕松窓對竹林習静不知紅日晩避名真似碧山深臨池野鶴陪孤立破雪江花笑苦吟從此鳳凰臺畔路杖藜應許數相尋鑑湖欲並賀知章洛社何如司馬光耆舊即今新續傳達人隨處可為鄉沙溪綠蕙牽風細水榭青蘿映月長更喜欝林洲畔石歲寒相對倚氷霜和白巖二首濟上秋風兩棹開故人傳報上公來滄江虹月先占象寳匣龍泉故引盃吏部乆懸山岳望仙槎應拂斗牛迴自憐衰病還鄉客未得從容杖屨陪蓬窓誰遣一尊開報道隣船送酒來涓滴乆閒多病手勸酬虚負合懽盃坐餘秉燭更相照話接鳴鷄未擬迴一别忽今驚十載水鄉何得幸深陪再次劉希尹寄荅吾廬遙結翠微間綠篠隂隂草徑斑敢謂圖書存晩計秪應猿鶴笑塵顔漳濱卧病愁公幹隴表思歸憶子山竊忝秩宗三閱歲素飡真愧一身閒印岡羅郡伯枉臨惠示新篇荅謝次韻徑草芊芊溪水長幽居僻在水中央恰對孤雲悲故國忽傳千騎擁東方開筵宛值藤蘿月攜手同懐鴛鷺行取醉夜深還秉燭笑看顔鬂各蒼蒼劉子希尹王子孟宣許攜家醖相過草堂薄暮不至次杜子登髙韻以嘲落日孤城秋可哀碧溪縈帶紫山迴妄隨土俗登髙去豈得隣翁送酒來叢菊破霜開小苑片雲將雨過層臺藤蘿石上娟娟月誰共黄昏坐一盃是夜草堂小集呈坐客五更城角弄秋哀萬里江鴻避雪迴可但逢時嘆搖落即從抛印賦歸來情多實戀風前㡌病起虚看雨後臺華髪舊人今在㡬夜深休負菊花杯夜㑹有作呈希尹孟宣二子㡬因離别嘆秋蓬夜榻那期此坐同隣木凍花疎映月對簷孤石静含風尊前節序憂懽裏燭底親交夢寐中休倚少年貪不醉埜夫今是白頭翁九月二十四日遣興奉寄太常諸僚往歲氷銜竊奉常兹辰光寵異班行斜廊縹渺朱衣月合殿氤氲玉珮香天語獨聞當北面岳神分祀得東方如今病卧秋山裏白髪青燈感夜長再次辛字韻逺抛巵酒避芳辛静對烟空月半輪門掩綠苔真自逸案堆黄巻不全貧非才敢竊明時位多病愁看故里春詩侣釣朋俱出飲也應回憶倦遊人夢台峰同登山閣示我以舊題風雨石崖青之句覺而足之台峰將巡南郡白下城隅佳麗亭使君冠盖昔曽經吳宫晉墅悲人代虎踞龍蟠識地形新夢水烟湖栁碧舊題風雨石崖青海邦漁子春相憶夜指江天認法星聞台峰舟過清源不遂瞻奉短詩寄懐隔歲闗河音信遲美人千里惜分岐伯華寔愧祁奚舉仲父虚承鮑叔知春到水亭花發處月明山館鴈來時孤帆迤邐青驄逺西望長吟有所思賀劉希尹生子碧林春暖鳳將雛滄海宵明蚌出珠前度共占佳夢恊後來堪作小名呼犀錢色映雕盤果蓬矢香連畫壁弧我亦有兒還似子㑹看同學著潛夫新莊道中即事次章抑菴郡守韻步隨芳草愜尋幽踏遍山亭與寺樓情入暮春多感慨地過名士亦風流川長漸覺三花逺雨足因占二麥收南望嶽峰蒼翠裏到時深恐白雲留送汪監司子宿之江西彭蠡江山畫不如到時應及素秋初千峰落日帆檣外萬井寒烟甲胄餘瑣闥星辰迎帝座水鄉甘㫖近親除孝㢘門第清無比翻愧羊公壁有魚送汪少宰閒齋進賀北上皇居穆穆九闗開有客乘槎萬里來宫月夜明鳷鵲觀江雲秋繞鳳凰臺金魚待漏還通籍赤舄凌空不染苔珍重麥丘三祝意等閒休當祖筵杯送後渠崔司成致仕歸安陽盧龍山畔菊花明一片歸帆五兩輕風入暮林稀静葉月明江鴈帶離聲尊前舞袖娱親志袖裏封章報主情六館有人争詣闕願從天子乞陽城送介溪嚴太史考功北上玉亭岐路玉堂通太史文章五色虹萬里不論金馬外三年真在碧山中心如藻鑑明秋月夢逐蘭舟泝曉風我病稍開涓滴酒别筵期對一尊同奉梧山李司馬送别士重文學之都昌王府文學者司馬弟也碧殿朱門地不寒楚山蘄水足游觀尊開醴酒時應醉饌出江魚日可飡作賦豈勞傷賈誼獻書休擬學嚴安草亭身世羲皇上一榻清風竹萬竿郡王文學渡江年皁帽青山雪滿顛賓館有時來胄子講筵終日對先賢樹邊竽籟臨風聴花外丹朱滴露研三峽五湖通一水等閒休憶浣溪船李時佩坐上留别蘭葉荷花香滿庭坐來炎雨霽空㝠簾開髙棟一星出酒對故人雙眼青沙栁隂森如待折候蟲凄斷若為聴間從聚散看身世天際浮雲水上萍送丁考功秉憲之闗中鶯花如錦豸袍新建節西行及好春周禮職方分二陜漢都形勝説三秦天浮紫氣函闗動雨洗青蓮華岳真藻思還應有神助詩成先寄故鄉人送羅尹赴博羅司成氷玉公之後也海國逍遙野興深羅浮山下坐鳴琴看