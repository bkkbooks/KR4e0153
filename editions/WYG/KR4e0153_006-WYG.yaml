書樓歸耕尚想誇重慶死别那知是逺遊却對畫闌如夢裏海山何日更添籌淚盡寒宵泣未窮束茅燃火候晨鐘春暉寸草天涯夢白髪青裙畫裏容家廟又増新主一寢堂應撤舊闈重悔來閶闔陳情晩不是儒冠解誤儂何子元祖僉事公輓詩次楊栁塘韻劍化空江鶴唳亭主人長寐㡬時醒平原不降真卿雨箕尾先成傅說星嘉樹綠隂餘舊業近郊𤣥壤閟新銘鄉祠俎豆精靈在歲歲秋風黍稷馨哭同年范副使淵兼悼亡友徐博士禎卿同空同李子作五年奔走别朝班涕淚長因舊侣潸在楚早傷徐孺子遊梁今哭范君山孤魂夜繞青楓闕徐卒于京旅殯春移玉壘關范卒于蜀兩地荒墳弔何日夢迷岐路只空還殷石溪哭子和作聞君失却嬌生子老淚淋漓尺五棺情逐雨花春落寞恨隨江水夜瀰漫簾前逐鳥竿猶在紙上塗鵶墨未乾應對阿婆傷往事啼烏聲裏說更殘前身應有再來時請看東園十歲兒且喜未衰難絶望共知無益省懸思維熊夢擬重符兆談虎詩慙獨後期早晩共攜收淚酒慰君懐抱破君疑周仲禮二親輓詩雙鶴何年下碧松寢門幽寂杳仙蹤山中諫議無書上地下恩光有詔封鷺錦巧裁焚處服翟冠重補畫時容天涯客子秋來恨庭葉蕭蕭草露濃同年范君山絶筆之作次韻采芳南國早應休魂夢猶尋杜若洲不見旅旌天外返空餘詩草世間收靈均實抱湘流恨子美虚懐蜀道遊惆悵桂陽山下塚斷猿衰鶴領春秋奉迎遺詔述哀逺聞哀詔出燕關武帝仙遊去不還穆座自應歸祖廟夀觴誰與奉慈顔六龍晩駕宫門寂八駿春嘶御廏閒風裊亂花雲日慘秖疑身世夢魂間舟中江烟江霧擁江漕漫領長風入短袍倦裏一盃聊放浪病餘雙鬢轉刁騷惟應好事成非易耐爾今人論大髙自詫齊竽三百輩總然無較亦應逃坐中城頭小堞風烟古海上荒更鼓角遲潮落潮生看夜月春留春去有花枝子卿心事羝須乳太史文章鱷竟移豪傑也應無别調坐中意氣忽成詩追和元馬伯常學士無題韻四首荔子從知賁越江于今錦樹㡬幢幢漢姬燕去釵誰合葉令鳧來舄自雙露重桂香閒滿院日長蘿影冷搖窓不應又浣西谿曲何限行雲學水淙微微碧草亦生光金屋何知夜自香一遣濃春閒蝶粉㡬看新月上鴉黄簫疑雲外過王子珮似風前著女郎欲理殘機多少恨先愁寒到寄衣裳𤣥洲一向不通潮忍病還期度石橋青瑣風微簾自静紫臺天近路何遙商絃調絶饒纎指舞袖歌遲陋細腰雲雨大都容易散不如隨鳳敎吹簫何事愁生鬢脚垂嫌他不是折肱醫素紈香篋方捐日青綆銀牀欲汲時風定宫花香自送月明階樹影空移憑誰為報瑤池信好把黄金贖玉巵紀㑹二首嵗日行春早散衙忽陪驄馬到君家雪殘不用兒童掃星聚還應太史誇僻性喜看庭近竹老年徒夢筆生花步林却動鄉園感羞見枝頭反哺鴉訪舊春城白日斜相逢詞客盡名家論文聚首元非約憂國同心可是誇庭栢故留驄馬步檻風欲動海棠花徘徊不盡鶯鳴意杳杳回驂接暝鴉希尹謎詩戲荅次韻棄置常疑秋扇同招尋何敢望東風梅消花雪春方露鯉出氷河信始通終夜綵雲飛夢裏㡬時明月墮懐中西州道路誰能識為訪當年賣卜翁雨後讀三國志積雨偏能感四愁濁醪真可散千憂自憐好客過文舉敢望生兒如仲謀花塢静看朱檻暮草堂閒對碧山秋菴䕡架底黄昏月且抱青芻學飯牛八月四日定齋侍御過我小軒索觀古刻左傳及聖教序諸帖留詠次韻荅之舸屋親勞柱史登履痕新破石苔層疎簾不為看山捲曲几還留聴雨凭左傳癖成憐晉客右軍書在感唐僧停盃劇論懐千古坐對流雲思轉凝八月既望㑹飲東園次聮句韻二首吟倚巖花句亦香坐臨山石意先涼自憐乆抱烟霞疾敢擬深陪翰墨場江木暮喧收雨静禁樓寒色鎖烟長秋池水落芙蓉謝懶對清尊賦采芳露毫濃染墨花香風榭微生白苧涼狂愛雨吟憑曲相醉疑秋戰試文場山前碧栁垂垂細石上青蘿宛宛長頗恠王孫太多事鎮教園景四時芳和泛池三首􅆼窕迴塘西郭邊濯纓人上采蓮船鳥鳴花放一尊酒雲白山青萬里天晝錦堂前真宰相蓬萊頂上舊神仙極知匡輔平生力骨鯁原來不是偏聞結茅亭傍水邊㡬時同泛釣魚船酒賓詩主東南美霽月光風上下天白雪可須推郢調黄州真屢夢坡仙休嫌小隠鄰城市心逺由來地自偏輟耕常在水雲邊困即横肱飽放船夢裏羽裳來白鶴醉中簾幙是青天歸湖范老真忘世辟榖留侯假學仙為問芙蕖最深處㡬回吟對月華偏宿石橋驛自荆州奔喪回冷雨凄風十月天亂峰孤館入蒼烟門前不改還鄉路壁上猶題出守年溪水平添荒堰沒石橋横斷古槎連麻衣草坐蕭蕭暮一度懐親一泫然西征詩為洪尚書作中興天子籌邊日總制尚書建莭秋俘馘未旋雲鳥陣捷書先達鳳凰樓西南道路通三峽老穉懽聲動九州千古汗青誰似得仲淹威望子房謀奉同南坦司空通濟橋觀月美人東去忽經秋坐憶苕溪動别愁問信㡬回湖外舸看山何處水邊樓遙憐短鬢風塵暗可耐長江日夜流俯仰少年心萬里夢魂曽伴史遷遊與仰止對奕限韻望極川流日向東碧波搖漾落花紅未論岐路三春苦且喜舟航一笑同世事盡抛棊局外旅懐兼付酒盃中憑君莫守惺惺法沙㟁狂飇力正雄十年曽讀爛柯文㡬叩𤣥機思入雲水戰忽看春及暮火攻嘗到夜初分深憐詭道時乘我不分贏籌日在君欲把興亡付沈醉浹辰多病謝芳葷問史判乞奕子出洞經年敵手稀袖攜仙譜日邊歸枰留謝墅花隂静地隔商山草徑微啼樹雨鳩俄並立入簾風燕故斜飛端居苦憶王樵侣永晝雙開客寺扉四月二日對雨首夏山堂雷雨深濕雲驕靄遞層隂争飛紫燕嗔相及貪長青莎喜自禁烽火不時傳外警樓船終日倘東臨何人更奏文園賦晩暮遲徊折寸心觀桃吹韻影落西池第㡬灣種分原自海中間後天合比仙翁歲向日真同少女顔已遣石闌承靚麗更教宫栁伴清閒野夫喜見周南化坐詠桃夭帶月還夀藏碧山深處卜佳城六檟親栽萬古情籬下後身陶隠士畫中知己趙臺卿鄰翁過訪分泉飲童子迎歸拄杖行應笑紛紛學仙侣藥爐辛苦望長生送客登樓名樓遙對逺山開不是尋常避暑來座上風流渾笑語城中幽勝㡬池臺鳴蜩嘒嘒還青栁返照盈盈且綠苔共說廟堂虚席待别筵休惜共深杯上客離筵未易開請期先上假山來林收宿雨迴芳苑水抱晴雲映古臺雅望即須歸紫閣行蹤聊爾寄荒苔舟中好著千秋鑑一獻君王萬夀杯有懐春回冬去年如箭菊白梅黄又碧桃秦隴暮雲牽夢逺楚江寒月弄潮髙舟車萬里憐孤跡山水平生托醉毫遙憶石頭回建業古臺遊鳳長新毛得友人書一辭東海釣魚磯五見疎林木葉飛漳浦去留非嗜蹇子山詞賦本思歸秋深苑圃黄花在寒入關山白草菲忽有錦鱗傳尺素轉憐江表故人稀送别偶將棊㑹作離筵翠竹紅梅雪後天客抱秖知尋勝槩官階何必論遙遷極知東道心相狎頗愛西鄰地自偏深謝曲池看不厭小山尊俎興無邊又與君曽醉仲宣樓短句長歌篋裡收清讌偶同吳苑夕碧雲猶似楚江秋乾坤華髪年年改岐路青山處處幽君入帝鄉歸合早老夫行矣狎浮丘又雁去曽教達我書逢君恰值雁來初官崇自畏雲霄近一懶人疑案牘疎對月有詩懐李白感時多病恨相如年來行路真非易㟁有豺狼水鱷魚送人出都五馬翩翩百里來念君長憶賈生才離盃正苦中年對祖燕還同上客開夜市柝聲連畫角月鑪香篆剩殘灰明朝更約湖亭賞看我披蓑上釣臺又醉裏浩歌天馬來空羣誰不羨君才騰驤國市千夫避蹴踏沙場萬里開駿骨自應天廏養壯心寧為圉人灰長鳴却過燕山道惆悵黄金舊日臺和野亭韻錦袍玉帶賦歸農竹杖芒鞋伴一翁風月乾坤隨處是江湖廊廟此心同閒招海鶴堦前舞笑看晨霞水際紅争向盛時誇勇退不知身在急流中世業相承士與農共將耕讀伴而翁風塵脱灑功名外出處分明道義同月底酒觴和露白雁邊籬菊冒霜紅閒歌獨樂園中句欲把陳留當洛中曽笑樊遲學老農宦遊回首亦成翁風雲龍虎真竒遇民物乾坤本大同萬里雲開山色秀九天塵淨日光紅阿衡舊業如相問都在彌綸宇宙中送幸菴勁節清風壯此行三秦歸路及秋晴摩雲嶺暗朱旗繞控虜城髙玉劒横中使逺尋裴相宅外夷時問令公名水邊林下經行地笑對黄花賦濯纓夀賈封君綠野新開學士堂碧山雲霧接蒼茫靈椿獨秀千冬雪老鳳長栖萬仞岡肯與郡侯為地主只教兒子報君王貪書我亦同關尹遲暮親逢李伯陽賀人拜官仰瞻何啻斗山如離索無因問起居雲海漫期安舊隠橋門俄已拜新除増來白髪縁躭句消盡黄金為買書重㑹莫疑參謁少旅情元憶縱談餘挽詩䳌啼芳樹血痕鮮轉首東風又一年何日琴尊聊復爾舊時池館故依然張翰興托鱸魚外賈誼魂驚鵩鳥前同榜弟兄仍地主㡬看江月淚雙懸失題越山迢遞接吳宫問俗尋幽在在同烏府法家推漢史洪都先哲仰周公風濤不起三江静雨澤潛滋五穀豐却恐乘鸞逐茅氏紫霞何處覔仙蹤九日三首次杏東韻青鏡流年素鬢催碧山何日是歸來情知暮景駸駸到忍見秋花粲粲開逺客正深懐土念腐儒元乏濟川才登髙有興無筋力悵望西南百丈臺又江城薄暮多隂晦雲日荒涼聚復開門掩綠苔頻上鎖逕芬黄菊懶傳杯看山故有陶家興作賦元非楚客才疎鈍乆拚人棄置不驚親舊少書來又庭喧兒稚亦堪怡况值黄花爛熳期池上晩罾收凍蠏枕邊秋扇罷戎葵山亭月白眠長少水榭風清坐屢移昨夜有人東國去已教先辦買山資夀友人母成周方岳漢郎官過里親承母氏懽南國路謠聞召伯西都還議見阿丹山花照席秋仍吐海月浮觴夜不寒藥籠尚留熊膽在未忘勤苦舊時丸失題牙旌獵獵轉春晴畫舸搖搖江上行征戰乆紆天子䇿韜鈐遙識老臣名地從千里封秋塞人自三邊仰夏卿為報匈奴莫南徙邇來中國有長城奉次環山樓之作古臺荒榭晩過逢載酒同澆磊磈胸牆外水通溪一曲牖西雲接樹千重青山自合君為主白髪那知我亦翁别後有文移建業漫嘲仙吏抗塵容自述新年處處常為客志在匡時那問家民病且慙無日減主恩何敢向人誇閒來憤世心如火老去臨文眼欲花春睡忽醒扶杖起夕陽天外數歸鴉暮春病起寄懐希尹院静簾垂春日斜藥爐茶鼎寄生涯閒思舊侣空懐逺病對芳辰轉憶家簷畔落泥還燕子檻邊飛絮且楊花何時却捲圖書去一放江門萬里槎謁文山祠丞相英靈猶未消絳帷燈火䬃寒飇乾坤浩蕩身難寄道路間闗夢且遙花外子規燕市月水邊精衛浙江潮祠堂亦有西湖樹不遣南枝向北朝郊齋有作呈北寺舊僚長二首石城鐘鼓散鳴鴉坐對松雲放早衙瑤草色通西苑路玉簫聲度上清家江涵碧殿春同麗雪霽鍾山日轉華此景北都應未有品題遙向故人誇往歲春郊侍紫庭步從龍衮夜祈靈芝房窈窕行宫轉羽衛驂驔法駕停風落殿鐘流逺近霧隨壇燎上空㝠端居想像南江表佇立時看北斗星又六尺長身一瘦笻天涯隨處寄行蹤牛岡舊卧留雙穴龍脈新分定㡬峰茆舍敢來天子問布衣還許上公封獨憐叔亮千年塚漠漠青莎鳥跡重又萬里投荒未死身賈生今是老成人五經不盡青燈夜一簡空餘綵筆春何事天公偏厄道無情河伯枉稱神平生知己如君少莫恠臨風淚滿巾又浮雲天際望悠然嶺徼歸來又六年一癖已成吟更苦五窮不去守逾堅周家風月襟懐裏范老江湖涕淚前却恠别知無一字也應遺恨向重泉又百年豪氣未消磨北騎南航苦更多戀闕有懐隨口出乞祠無計奈身何山連巴蜀雲層瘴春入瀟湘水漫波最是遊魂招不得隔江愁聴楚人歌華泉集巻六
