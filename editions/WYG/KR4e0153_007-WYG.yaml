body:
  text: 華泉集巻七明邊貢撰詩集五言絶句十六夜春城燈火静華月滿天街陌上歸来晩香塵有墮釵中元見月甲子嵗坐愛清光好更深不下樓不因逢閏月今夜是中秋董啓之按滇過鄞省母夫人焚黄于父墓作難將寸草心報得三春暉十章贈之垂栁拂征鞍雨中行路難河梁一分手山疊水漫漫嵗月交心久江潭别路長手中雙白璧持贈比干将離心似明月皎皎在方寸但令光不遺道逺何足恨北堂天未晩遊子歸来早堂前一夜風開遍宜男草白髮對青芩日髙江院深豸冠階下舞好慰栢舟心荒壠薦秋蘋深恩詎能報嗟嗟死後封猶是生前誥人生重鄉邦歧路苦南北簡書限王程欲住不可得嵗嵗中臺使巡行道十三要知君厯處風土接交南萬里炎荒地經冬復厯春帝星臨柱史休祀碧雞神繍斧肅霜威澄清志不違瘴鄉人拭目驚喜見晴暉寄王昇舍人二首不見王子猷經春復厯夏有時中宵夢宛到君堂下獨把重陽酒西風白雁回江南菊花早應傍美人開送于利四首送君城南橋笑折城南栁歸来掩關坐皎月當牕牖霜下夜已久清軒調玉琴凄凉湘水曲􅆼窕白頭吟一别春城雨兩回秋月圓燈前不盡醉書札但空傳離腸似連環宛轉不可絶相送淮水秋相思燕地雪送馮侍御允中還郴離館背寒塘霜清野菊芳美人千里去明日是重陽驄馬逝駸駸蒼林蔭長陌憐君楚雲外獨作秋江客送客四首相思若連環宛轉不可絶那知汴上逢却是關西别梁苑送君處温風吹客衣盈盈春暮感不為落紅稀故人滿秦隴為寄一言拜問我今若何病多慵束帶日照昆明水雲開少華峰夢魂登覽處白髮倚青松雜畫十一首為儲柴墟題日出打魚去日斜沽酒還漁翁家不逺只隔岸西山藹藹古城暮遥遥車馬度同為城外人不識城中路北風吹大雪向夕滿空山遥見山中客懸燈草屋間雞鳴山店昏四郊風雨辰蒼茫野田際愁殺獨行人田家春酒熟野老日相過醉别衡門外山鶯啼緑蘿江水春春碧江門晝晝開荒村過客少獨自掃蒼苔道上秋雨過道傍秋樹紅采樵歸樹晩吹笛月明中閉門聴春雨開門寡行旅借問橋上翁河水深幾許征夫慕前侣杳藹出幽林欲渡溪橋去山中暮雪深鳥啼青石岡日照紅泥坂杳杳雲外鐘山僧獨歸晩上山行采薇下山行苦飢山風夕凜凜吹笠復吹衣畫上四首放舟前溪水水文白如練風吹絲裊裊驚起沙中燕烟霞變陂水山照暖楓林不聽舟中語誰知江上心月色沙上澹山雲天際浮春江萬里濶獨見一漁舟經旬不出戸忘却城南道江亭細雨過一夜生春草題孫志同侍郎扇圖青青山上松繚之以白雲雲山不可到圖畫只空聞山木各有林烈士各有心借問種松意悠悠江漢深題畫手種江頭樹成林已數秋寄言樵採客留繫木蘭舟畫三首近浦寒潮落平沙返照紅不嫌歸路晩家在板橋東旭日上東峯山人睡正濃洞門無鎖鑰長是白雲封琴罷興不盡起登江上臺水空秋萬里不見一舟来方日升雜畫雞雛不離母離母聲不休如何宦途人嵗嵗天邊遊右雞雛枇杷江外果感念主恩深長憶叨供奉朝回滿袖金右枇杷異質人所貴能令䑕窟虚如何北牕下閒卧飽溪魚右獅子貓迢迢越裳國萬里獻珍禽不覩周王化誰知姬旦心右白雉題子立扇頭江静無飛鳥亭空有落花主人何所在沽酒向漁家題賈子扇頭迴風起船頭激浪落船内生憎木蘭橈揺蕩日光碎題扇面小景四首秋樹鳥聲寂夕陽山影沈遥憐抱琴者不為訪知音獨坐草堂餘凉風水閣虚門前相訪者應有載来書罷釣歸来晩前溪水正深臨橋不敢渡誰識此翁心茅堂枕江涯種竹只九箇時有清風来還同故人坐畫竹石染湘江淚真涵太極情百年雙老眼相對兩無聲題林醫士畫冊江上春潮静舟中日似年不須生羽翼無事即神仙中秋慈恩寺登眺過崇國寺分體二首東寺復西寺朝遊還暮遊百年塵跡裏同醉幾中秋寒月出關山秋牕白如曙空流雲中影不照雲中戍西園八景朝㸔長白山暮看長白山山色有朝暮吾心常自閒清川映白石游魚止復行共有臨淵羨能無結網情月落古堤上人行春陌頭曉煙如有意長伴緑楊樓初日照園桃盈盈散霞綺主人牕中坐顔色宛相似共道農家事辛勤在一春静觀田野際多少輟耕人近浦寒煙上平沙落鴈遥行人欲歸去舟子故招招寒泉冽古井上有雙梧桐借問往来者誰知疏鑿功城外望城中朝来氣逾爽吾心浩然者入夜還能長泛南湖十首聞道南湖曲芙蓉似錦張如何一夜雨空見水茫茫水殿穿湖入風闌過雨凭微㣲夕陽外時見出林僧盈盈緑水際汎汎白鵞羣借問乗舟客何如王右軍碧樹圍青殿朱垣接紺堤王孫罕遊豫馳路草萋萋風恬湖水平畫舸月中行不見漁父處但聞漁笛聲汎汎白鷗鳥悠悠長自隨憶君何處切湖上月明時深淺元無定行舠識水頻急流天下險最好是平津嫋嫋暮風細團團秋月明沙河聞不逺起我故山情赤日亂青霞照我湖中艑来船時借問前途水深淺睡起看雲坐𤣥心入杳㝠吾將訪蓬島雙棹莫教停自泉上歸登西門樓落日照行盖凉風吹不休未消臨水興還倚對山樓集江淹句白日隠寒樹層陰萬里生歸人望烟火嵗晏返柴荆雜咏四首黄金滿歸槖白日行亦懼道左遺愛碑賊来将不去乳燕巢古堤流鶯度層閣試看白馬郎金丸向誰落東山雷殷殷南澗雨㝠㝠愛爾衡門下團團松盖青行人争渡急江黒雨鳴船戢戢中林鳥歸飛薄暮前山中雜詩下馬古寺門偶與山僧遇相對兩不言蟬聲在髙樹園果垂丹實園丁日夜看未曽供寢廟不敢獻中官無題二首楊栁三春暮沙場萬里餘紫騮何日返空有寄来書庭際何所有有萱復有芋自聞秋雨聲不種芭蕉樹冬至上陵途中雜咏八首鴉啼古城上月落古城闉城外車馬道清風飄素塵蒼蒼土門口日出逢樵叟問爾何事来山中苦無酒沙苑平如掌青青苜蓿痕昔時放馬地今作牧牛村朝從田父飯憩馬古林西村雞不知曙日髙猶自啼蜿蜿野田中白鷺静如掃停鞭問征客云是居庸道枯楊臨大堤上有鸜鵒窠春風幾日至㑹使緑陰多山中風日暖藹藹似初春亂石牛羊逕時逢掃葉人月出東陵峯照見西陵樹何事同心子山中不相遇同台峯熊侍御看花四首嫋嫋葉含雨菲菲香近人如何向陽蕋開花向陽春秀色紅翻坐濃陰緑遶堦覷花還拄杖衝雨不憐鞋借問雨中好何如晴後看錦江紅濕處應記獨憑闌室静客稀賞地偏花更清自開還自落宛似野人情題内兄子立扇頭斜日清源北浮雲岱岳東故山歸路好不得與君同七言絶句寄李顯之逆旅逢秋感倍深美人何處坐鳴琴南宫只隔西河水一夜相思萬里心集杜句贈胡三良醫此身飄泊苦西東未就丹砂愧葛洪多病所須惟藥物知君才是濟川功卿到朝廷説老翁秋来相顧尚飄蓬釣竿欲拂珊瑚樹未掣鯨魚碧海中長開箧笥擬心神巾拂香餘搗藥塵詞翰升堂為君掃已知仙客意相親㫁腸分手各風煙肺病幾時朝日邊同輦隨君侍君側自稱臣是酒中仙春日雜興集杜句二月已破三月来百年多病獨登臺支離東北風塵際懐抱何時得好開柴門空閉鎖松筠燕子銜泥兩度新不是尚書期不顧故園猶得見殘春未有涓埃荅聖朝便應華髮老漁樵東流江水西飛燕人事音書漫寂寥自從官馬送還官信有人間行路難獨在陰厓結茅屋强移棲息一枝安七月七日同侍御毛東塘渡河遇風偶然同渡不同舟風到揚帆共逆流莫謂狂瀾無砥柱嵩行千古鎮中州迎鑾曲二十首和劉希尹之作南幸三吳北幸幽乾坤開闢兩神州文儒自守髙皇訓武将誰分聖主憂金陵自古帝王都碧石清江儼畫圖五聖百年虚想像鸞輿曽到此間無滚滚飛塵千里餘驛途来徃日無虚皇心旦夕懐慈聖數遣中官問起居石頭城如銀虎盤金陵山似玉龍蟠休訝六軍停蹕久本来江左是長安緑栁陰中顯赭黄路人争説見君王只為薦新供寢廟水邊終日打魚忙孝陵重樹紫金山王氣葱葱碧漢間靈殿本無荒草入掃除霜露始應還自采民風問老農㣲行不遣近官從那知天子關天象到處雲成五色龍羽盖霓旌曉出遊紺霞紅日映江流雲中帝子三千闕海上仙人十二樓青龍山下虎蹄新𤣥武湖中躍錦鱗錯意吾皇好漁獵不知端訪後車人揚子江頭駐六師太平天子賞功時紅雲影亂黄龍艦白日光揺繡虎旗弓如滿月向江開箭揷寒潮捲浪迴水上黿鼉莫深避我皇元為射蛟来江口傳呼大駕臨順流風雨注江心風起半山羣虎嘯雨来深水一龍吟大君仁聖迥非常逺似唐宗近宋皇訪道先過趙普宅哀賢還弔魏徵喪潮落江門煙水秋雲帆八月過揚州兩京馳道三千里夾岸垂楊接御溝翩翩龍馬控琱戈白日清秋沛上過聖主守邊思猛士臨風髙詠大風歌九月南征九月迴清源黄菊趁時開何人得似行宫蕋兩度親承萬夀杯瑟瑟金風鳴玉鑾路車何日到長安官河不似江濤險只恐秋深白露寒疊鼓凝笳入禁中似聞韶樂奏南風通明殿敞秋雲碧閶闔樓開曉日紅雪殿雲墀列羽旄天王開宴賞勲勞封侯未賜将軍印歸馬先分戰士袍郊祀元居百禮先史文虚擬闕今年小臣曽讀三王紀冬至由来始祭天凱歌五首日射江流生紫氛喧喧鐃吹隔江聞江頭巨石髙千尺好勒元戎破賊勲帳前銀甲映朱旄帳外牙旗捲日髙白書紅塵飛一騎尚方新賜玉麟袍虎豹鯨魚一夜擒湖南湖北動歡心論功宜並衡山峻比徳還同漢水深秋水沈沈漾列星盤渦殷殷鬪雷霆扁舟昨夜巴陵過風起猶聞戰血腥鳳儀獸舞盡来王犬豕何知悖且狂髙壘固巢今不見麻洋灘下水湯湯秋日過西内團殿御溝東畔古松盤曾得先皇倚笑㸔龍馭不歸鸞吹杳石廊圓殿鎮秋寒雲中曲二首六軍歌舞健長征五色雲隨九仭旌傳語單于休近塞太平天子駐天城萬嵗聲懽四海聞大同新䇿破戎勲漢文可是勤邊主按轡閒過細栁營感事八首天山戎馬本天驕入貢能輕道路遥底事内兵翻作亂禍胎疑自武宗朝一自甘州殺憲臣國家綱紀似秋塵各邊聲勢元相倚緩急誰為死力人代郡城中十萬家膏粱珠翠甚繁華兵殘火烈須臾事女哭男啼亦可嗟宣府雲中五日程朱門王子白衣行回頭却向西山哭玉眷金昆知死生諸将邀勲各逞能邊軍反側寢還興撫哺休誇桂元帥綏来還有蔡中丞紫荆西望白雲山腹裏雲中指顧間好降絲綸促諸将急操兵馬備三關城中金鼓晝逄逄城上髙懸首級雙二十四家同日死自今休更説招降白日城門四不開就中情狀頗難猜乗時早定安邊計只恐春深牧馬来宫詞次陳以道韻佳麗曽矜得寵先後宫歌舞一當干那知寵極能生妬不是青娥誤少年次白巖韻甲申除夕五首前山雲接後山煙可道公歸是偶然霖雨出山知有日入山親紀甲申年北牕閒卧讀南華出處吾生信有涯五色曉雲天子宅一籬秋菊野人家黒髮勲名鏡裏看紫宸章疏早辭官閒心自愛商山曲懶聴人歌蜀道難落落朝廷醉眼中苦縁憂國願年豐老臣心事如工部只有升沈迹未同留公無計奈公何外國中朝屬望多此日同為太行賦幾時重和慶雲歌趙文昌中乙榜雨中感懐見遺走筆和荅華髮王門晩拜官齊竽聲裏獨成嘆何人為薦長沙傅一見文皇獻治安十日春無一日晴客堂沽酒莫辭傾紙牕風信棃花雨惱亂歸心是此聲撚㫁吟鬚字未安短歌聊爾代長嘆春風座上無邊景漫道儒官是冷官春歸花落鳥無聲一夜閒愁帶雨傾自古浮雲本無定漫将消息問陰晴荅灤江王中丞見懐之作院臺深處緑陰屯松下棊枰竹下尊苦憶去年歡賞地碧天如水月當門贈北山周子二首宦接鄉山事已稀謫居猶得近王畿勸君今夜且雄飲明日出城風葉飛華髮青袍不染塵宦程迴復主恩新縣人争説中都宰曽向雲霄忤貴人荅台峰侍御見候三首斜日照雨明霜臺紅花白花相映開野老愛花情太劇不須招致也能来葵花半紅山雨来不辭沾濕看花開主人莫掃花前徑恐破青陰與緑苔一尊花底思悠然落日空庭席屢前酒熟共懽遊此地花開誰與坐明年寄姜廷輔王昇店前秋草生秦皇臺畔暮蟬鳴海翁欲訪無人識何處孤舟短笛横胡菊泉惠我丈菊走筆謝荅四首菊花元自菊泉分見菊真如即對君安得對君還見菊短籬斜日坐秋薫丈菊亭亭入座新白花輝映白綸巾生来自有凌雲志可是孤髙不近人一枝分取到山家月映疎籬水映花欲把贈梅詩贈菊暗香浮動影横斜月閏逢秋菊早芳盛開還喜近重陽休憐閴寂朝臨水且看孤清晩耐霜贈王松溪四首月下山車往復回秋深歧路滿青苔不縁鄉飲邀賓坐肯向城池故故来暮春庭館見花稀黄鳥嚶嚶燕子飛堂北假山苔蘚蝕祇應偏待主人歸雨過茅屋秋草生霜凄榆塞候禽鳴閒来倚杖柴門外童子騎牛短笛横十年離思一宵同坐歇寒鐘意不窮碧草未舒湖石畔黄花争艷竹籬中次棠陵韻題黒菊贈石岡圖史春行滿客囊此中偏載晩籬香臨歧欲採寒花贈似隔盈盈水一方次白洲韻贈黄教授二首賈生只合住長沙三載江陵却寄家雲静碧天秋日午講堂吟對木樨花春日􅓺宫花正開宫前宫後錦成堆如今南郡多桃李盡是黄公種得来寄洪山人二首隠君家住白雲間不愛功名只愛閒聞説花園新更好門前流水屋中山卧牛山前春草肥華陽宫外雨霏霏主人侵曉踏青去日暮家童扶醉歸題梅贈華山人夢裏神交幾見親畫中還比夢時真嵗寒心事東風面人與梅花一様春憫雨奉答白巖光禄故鄉風景夢依然魚浦牕西兔嶺顛誰道不歸歸未得芙蕖牕下抱愁眠赤日簾櫳如火然野夫懐秋病欲顛安得海風吹霹靂九淵呼起蟄龍眠東潭甯子将赴潛山以棊几留贈荒凉棋社隔秋春世事年来著著新眼底相逢論成敗誰知當局苦心人髹几文楸光照雲僧堂長與對斜曛翻愁置我南牕下一度臨棋一憶君泊河口却寄林醫士二首杏子成林竹䕶牆傍河雲物晝蒼蒼園中似是林家屋過客時聞藥草香凶年老穉多竒病吉水仙人有妙方不用相逢問名字滿城人説是醫王孫塘秀才以芍藥二枝見贈走筆奉謝芍藥開時三月過京華五月見猶多雲栽露種元相異雨驟風狂奈爾何長安日日走塵沙春盡多時不見花蒲州公子能相送醉倒東山處士家贈楊撫軍白馬香風度落花絳桃穠李避妍華長安陌上歸来晩笑指龍樓是外家五月六日柬孔倅艾家河邊蒲葉長扁舟昨日過端陽荆南客路千餘里回首銅臺亦故鄉金陵逢方日昇燕市分攜十七春白門相見白頭新鳳凰樓畔含香侣江海飄零有幾人東園徐君送藕栽戲呈短句兼求碧桃玉藕根移玉井髙感君分贈謝君勞書生見慣秋江色且向名園問碧桃題扇寄夀春希尹淮南花雨送春還叢桂陰陰郡閣閒自是劉安有仙骨謫居猶近八公山題扇寄錢畫士睡起看圖氣未降丹青誰有筆如杠欲煩畫我茅亭下静數飛帆涉大江睡起口號戲呈黎仰止兩家兒女對船牕學語真同乳燕雙日午夢回成一莞不知身世在清江題菊贈俞國聲歸無錫次韻逺攜尊酒惠山来夢草情牽對月盃雲際忍聴雙雁别水邊愁見一帆開寄吕思泉次韻京國論交記徃年城南風景夢依然春江未卜看花地秋水空歌伐木篇次韻梧山中丞寄别東塘侍史八首宋臺梁館暮霜餘野色蒼茫擁使車馬首不隨南去鴈袖中元有北征書岸葦蕭蕭河水寒驕嘶驄馬鞴銀鞍燕山代谷飛騰過送别無歌行路難行部能教陰雨晴渡河還遣濁流清願磨中岳山頭石記取西江御史名漫懐家慶感晨昏國士須憑國士論聞道阿翁将阿母花間長日醉清樽諌草書殘驛舎燈翠華衝雪恐難勝回軺莫向春明路見説君王在白登羽盖飄颻白日臨迴光應燭小臣心願同汲黯留中闥更擬相如賦上林每逢朝客轉驚神北望長安幾側身紫禁烟花夾城栁别来今已十畨春閃閃龍旗樹五更煌煌芝火照層城當年奉引趨蹡地曽聴鈞天廣樂聲柬馬公順同年三載風塵一見難每将書札報平安梁園幸是同官地春月春花却自看顔聲寅長惠川扇蜀璽離離金錯光逺隨驄馬過秦梁奉持敢作尋常看一道清風五月霜寄何仲黙梁王臺前春草生梁王臺上鳥嚶嚶美人遥在黄金屋客子登臨空復情贈長垣宗室二首鳥語深宫白日斜彩毫濃墨散春霞王孫不學雕蟲技只寫忠花與孝花瑶室青編萬巻餘宫中誰道日閒居家臣昨夜長安去猶問君王乞秘書重贈吳國賓漢江明月照歸人萬里秋風一葉身休把客衣輕浣濯此中猶有帝京塵寄閭衛之同府二首客来君寄一雙魚客去還君一紙書欲買扁舟向東下洞庭春浪近何如江上逢君感昔年往来相見陸陵前那知宦跡如萍梗猶得相依一水邊寄京師友人同朝同寺十年情迢逓燕山隔楚城一别天涯今萬里欲從何處望春明贈阮翁三首躍馬横戈老尚堪時時遊獵過龍潭遥知此日非熊兆不在周南在漢南鶴髮虬鬚八十齡白頭長對峴山青朝来虎帳看雲坐閒課諸孫讀武經眉際生毫似髮長採苓時到白雲鄉閒来莫向桃源去恐有漁人識阮郎夜宿太常官舎懐元佐二首咫尺東曹信渺然别離何似路三千松牕月色槐陰雨一夜愁心似隔年文園消息近如何酒盞生疎藥裹多却向故山憶舊隠膏肓從古在煙蘿荅秦孟陽長史次韻長鑱秋圃自鉏荒望入髙山路渺茫不信愛蓮亭子上有人白日到羲皇塵滿紗帷舊業荒江都雲水暮蒼茫清時不用天人䇿方朔詼諧侍武皇枕上簡獻吉二首自入秋来日日晴看花看月每同行一夜六街風雨惡莫言天不解離情早凉衝曉入紗帷聴雨聴風睡起遲街西咫尺不相見却似河梁别後時諸友二首濟水源南舜井旁月明曽共坐宵長六春暌隔離江路五月相逢是帝鄉雙鴈北来河水平兩岸秋陰蘆荻生黒頭七度曽過此不似今回感别情淮浦歌三章為太僕楊敬之作淮浦泱泱淮水流月明長照浦中樓白鶴青猿好相訪主人今只在滁州清淮蒲荻晩蕭蕭浦口山明欲上潮七里正貪漁艇樂九重無耐鶴書招水蓼花紅淮浦煙晩来鷗鷺下翩翩依沙宿槳當門繫莫是揚家問字船俞國昌大㕘小松二株鬱鬱青松尺許長似看顔色有風霜何時却覩干霄勢六月濃陰覆草堂寓延津夜起天霽北望東彭太保月明風静雨初收一鶚横空萬里秋四海蒼生正翹首秀峰巖下莫遲留得同年寅之管城見寄之作酬答二首翩翩驄馬度秋涯思入風雲句意佳多病獨憐梁苑客閉門髙卧草侵堦詩来恰值酒醒餘起步秋庭病忽除喚婦不須愁夜黒老夫今日得明珠東王灤江病裏懐人掩客牕尚聞仙舸在龍江觀音閣下梅花水對雨何時倒玉缸次韻寄王光生四首屋裏琴書屋外田繞庭松樹古藤纒何時却遂東山約閒伴先生樂暮年緑陰回首代紅英客舎流光只可驚病起偶寛書簿債獨將尊酒向誰傾博得荆南五袴歌一錢囊底奈貧何匣中猶有龍泉在閒就巴江石上磨一麾江郡領塵官何似山中菽水歡梁楚板輿平似砥憑君休説路行難口號呈問龎二少府黄鶴樓前夜泊舟葦花楓葉似江州樂天本是多情客卧聴歌聲起别愁内弟文甫至清河一見而别題扇贈之逆旅相逢意惘然四年䰟夢一燈前即教乍見還分手猶勝山陰雪夜船謝東園送菊薄暮霜籬景色加名園分得嵗寒花誰知建業騷人館不是潯陽處士家寄閒齋少宰四首次白巖韻䢴江西路泝流風城郭山林道路通兄弟自為真率㑹秪應隨儉復隨豐腰褭燕臺白玉珂水亭山寺賞吟多相看已恨俱華髮更奈蒼江逺别何登臨隨處見題名想像當年載酒行山翠不遮牛首寺江流長抱石頭城竹門瀟洒對江開中有髙亭扁快哉為問亭中二仙客幾時騎鶴上蓬莱瑞卿留别以答揚舲無奈客心何暑雨平添潞水波草閣驛亭談笑别碧山回首暮雲多題白頭翁鳥圖送友人歸蜀省覲短棹長江下蜀州家中風景畫中收蒲牙出水荷錢小一笑相看兩白頭唐仁夫出使廣西四首碧衣黄簡照青春寵宴傳呼出尚珍辭罷閣門東上馬道傍羅列拜王臣樓船風景入春多鐃吹聲中故里過兩岸緑楊陰不㫁隔江知是栁州河手捧鸞書下九天恩光初到墓門前山川不改孤兒恨風木蕭蕭似往年十年知已一綈袍萬里南雲望爾勞待得明年好春日牡丹花裏候旌旄送錢水部致仕次杭秋官韻虎頭將軍圖畫竒成都待詔功名遲春風草草拂衣去投老相尋知幾時㝠鴻杳杳碧天秋虞人網羅空復求朔地苦寒江渚燠常時虚擬稻粱謀青門掛冠春欲暮白首放歌江上歸野老相逢話朝市龍飛天子正垂衣老子田園歸興豪已将功業付兒曹庭中手種梧桐樹他日朝陽看鳳毛蓮葉田田溪日曛竹竿裊裊白鷗羣水南即是長洲苑杳靄歌聲穿暮雲東觀雞號風雨㝠十年通籍綰銀青栖栖不向故山去兀兀窮愁何以醒秦州石經半埋土蘚剥苔封誰為開憑君覔取吳中本江上雲帆日往来送顧侍御出守馬湖五首露冕南征火井西東過漉水北泥溪借問鄉愁何處切千山明月子規啼五馬驕嘶錦水隈雙旌遥指劍門開巴童吹笛羌兒舞重見文翁鎮蜀来五月瀘州蕉葉黄武侯祠下水如湯行人莫惡南中熱自有㕘天古柏長古箐人稀秋草深碧松蒼檜接陰森髙樓永日彈棊暇海北天南萬里心漢家驛路止牂牁相望龍湖路幾何聞説夜郎天更逺潯陽李白亦經過送潘伯振守漢中三首石棧凌雲鳥路賒漢中城府枕三巴風林落葉猿聲滿那得行人不憶家白馬河邊春日晴黄牛山下百花明家家耒耜居民出太守来時親課耕金城戸曹張鳳翔埋玉空山宿草長天上故人驅五馬經過流涕問孤孀送蘇通判四首天涯相見地曹郎郡閣清尊夜語長休向燈前易成别江頭春水正茫茫曽並長安逐馬蹄謫居同過楚雲西他年縱有看花句休向𤣥都觀裏題去嵗秋風别省闈木樨花落雨霏霏那知此日江陵郡春草連天送客歸春風江閣喜同遊苦恨逢君不少留東去巴陵三日路幾時同上岳陽樓送張元亮二首知君元在識君先水國相逢亦偶然何日一尊還逺别暮雲春樹暗江天冉冉游雲覆短簷霏霏寒靄度重簾羇懐正苦逢春别行李何妨入夜淹送林贊賢醫士歸臨清四首送君濼源溪水濱岸桃堤栁俱鮮新黄鸝聲中白日晩又是鄉園一度春林花欲開春草生村煙漠漠午雞鳴君行落魄似阮籍休嘆路歧縱復横臘月驅車東郡来元宵今始雪中回臨清城外成林杏盡是州人為爾栽雞聲喔喔宵近庭出户忽聞春雨腥西江髙士别我去日出烟消山更青送賈廷臣司訓二首行李蕭條石逕荒賈生東去路茫茫盧龍不是長沙地莫把吾皇比漢皇卑耳溪邊秋草深裂坡山北樹陰陰西風匹馬弔孤竹一曲商歌千古心送毛東塘侍御北還後懐寄八首汴上相逢一載餘五雲回首送軺車河梁别意真堪畫行李蕭蕭幾巻書霜雲千里朔風寒豸錦貂裘獨據鞍大厦如今要梁棟憑君歸報得材難夜来風雨曉来晴萬里無塵海岳清白日共看驄馬色青天不負使君名漫談時事共傷神白首丹心許國身歸覲正逢長至節六陰行且見陽春榮親報國皆吾事孝子忠臣只此心聞説致身同養志莫分朝市與山林客牕風雨對寒燈午夜懐人思不勝梁苑宋臺秋色裏也應回首憶同登别来公署易黄昏心曲憑誰與細論宦海風波無定處相逢何日對芳樽夢回欹枕夜三更烟樹㣲茫隔衛城獨向屋梁驚落月不堪還聴雁来聲衛輝阻雨奉别幸菴彭太保宦情時事劇秋雲話到傷心不忍聞别夢迢迢似明月漢關楚塞逺隨君别湯萬戸半生湖海識君遲可奈相逢是别期扁舟獨泛秋溪水採得芙蓉欲贈誰送吕二守西征二首六月戎船上逆流書生彈鋏取封侯夜来羽檄江邊過聞説西戎破劔州巫峽瞿塘十丈波大寧鹽井火雲多賊巢散滿空山裏舊日居民有幾何客懐六首萬山深䕶一書樓此際栖遲景最幽浮海未酬當日志北歸還買洞庭舟薫風江上棣花開醉倚蘭橈首重迴孤影却隨南雁去尺書還附北鴻来水耨方閒即火耕土風遥識楚江程汀花冉冉鳬鷖色岸栁陰陰布穀聲鬢絲端為别兄皤魂夢真如道路何滇海萬峯秋雁少楚江千里月明多逺從江左入湖南姜被初分思豈堪閒算長公年紀數白頭今已六旬三望逺時從郭外遊好登江閣與山樓煙開碧樹通吳苑日落黄雲接楚丘送雷州趙太守四首蘇公樓前海日晴伏波祠畔瘴煙清茘枝垂實桄榔暗太守来時雙鶴迎詩人出守是尋常萬古心期一瓣香若道雷州非樂土請君時到十賢堂海邦雲霧晝霏霏榕樹林中孔雀飛驛騎忽傳天使到九重親賜玊環歸我在江陵望帝鄉登樓時恨楚天長憐君更隔三千里嶺樹湖煙更渺茫題竹梅黄梅緑竹兩寥寥一段清光惜浪抛看遍乾坤空老眼幾人解取嵗寒交秋海棠五首海棠盈盈開素秋雨晴斜日上簾鈎幽芳不與春風約碧榭朱闌俱暮愁海棠開日近重陽秋蝶翩翩過短墻題品要知觀物眼只須風骨不須香海棠花開秋雨霏休將遲暮怨芳菲東園桃李盈千樹昨日穠華今日稀庭下秋棠開紫綿映風含雨浄娟娟羽人自解丹丘術種得花来亦是仙梧桐葉凋金井闌芭蕉風雨怨秋殘海棠十月猶含蕋故伴青松當嵗寒向曹伯通乞白菊節過重陽菊已殘倚霜欹露不勝寒山堂正少黄金蕋試看君家白玉團王使君誨處覔猫時王有母之喪雪白狸奴尾勝金曽娛白髮戲花陰急須分乞鄰姬養莫遣空摧孝子心倫上人遺杏戲荅帶葉生英顆顆新竹藍初發齒生津清酸本是儒家味不道山僧亦戲人晩雪梅花枝上報初春濼水源頭憶故人天宇自清心自白不知何處有紅塵和蒋儒士韻題便面江樹青山歇晩秋草堂幽僻對寒流故人逺赴關西去明月蘆花繫釣舟題張秀才釣魚便面鱸魚釣得上綸鈎歸去應須與婦謀攜取一尊同客醉江風山月更何憂次正齋韻題石岡圖白石岡頭榆栁新蒼蒼茅屋掩深春山翁不註揚雲易怪底門無問字人三友圖為蔡石岡題嵗寒池館暮相依雪共心期月共輝南北宦遊三十載碧山回首故人稀題扇緑惨紅蔫春色闌枝間黄鳥任綿蠻知機自合髙飛去莫遣矰羅絆羽翰以兔圖贈王生兼附短句我来贈君玉兔圖我去留君雙湛盧月殿秋風桂花發一枝能斫寄来無題陸子引畫水榭山林向夕幽笛聲遥在木蘭舟江空處處多明月不用相尋秉燭遊題萱圖繞膝曽𤣥認不真北堂風景日長春堂前滿種宜男草一度花開一度新題美人時外舅胡觀察謝政家居寄此通慰月宫秋冷桂團團嵗嵗花開只自攀共在人間説天上不知天上憶人間題廷相兄扇頭萬里乾坤見此亭四圍山色繞闌青何當著我亭中坐閒校神農本草經毛驃騎扇頭𤣥菟城外草連天鴨緑江頭春可憐將軍飲馬臨江水東指扶桑在日邊題行南巻小結幽亭倚大江萬竿深處聴飛瀧横琴試鼓湘妃怨彷彿鳴珂過北牕題家園風景圖二首苕水羌山清更深蕭蕭蘆渚間桑林青楓樹裏三間屋十載常懸萬里心萬竹深深一徑斜草堂門巷接江沙主人遊宦不歸去時有白鷗来釣槎題墨萱華髮當年倚笑看北堂春色映朱闌披圖彷彿慈顔在零落霜風夜雨寒題天鵝海青圖雲暗霜天雪滿衣鴐鵝聲亂海青飛李陵臺下燕山北正是單于夜打圍題金憲長舜舉蓉溪書屋圖四首蓉溪主人溪上来来時亷訪去都臺共道溪花似溪主暫時揺落又還開溪水溪花相映鮮溪風時拂案頭絃輕鷗白鷺知人意雙去雙来精舎邊錦江東㑹蜀江流卜築還依江上洲十里錦雲千頃碧此中風物最宜秋秋溪明月夜經過兩岸芙蓉照緑波溪上主人元好静巴童休唱下渝歌題扇次仲仁韻月落江空萬里秋一聲長篴古槎頭漁郎此意何人解水底蛟龍水上鷗題吕叔通扇次白巖韻江草芊綿江雨霏王孫孤艇泛潮歸寂寂江亭揺落處碧雲回首雁行稀題吳隠士守墨詩冊十畝山田一舎幽草牕閒卧白雲秋行人若問墨溪主不是當年栁栁州題林東石迺兄松關圖明時不作大夫官偃盖空山老嵗寒試問𤣥都舊桃樹幾回花實幾凋殘題戴錦衣扇溟濛湖水抱村斜湖上扁舟載晩霞怪得看圖意𣺌𣺌圖中風景似儂家題靖逺侯畫菊扇頭百戰功髙舊破戎侯門却似布衣窮傲霜枝葉凌雲幹畫裏分明國士風題介溪嚴侍讀畫菊風蕋紛披霜葉清畫圖秋色笑淵明持盃只愛東籬賞未識金門大隠情題林下一人巻三首禦冦曽攄報主心野雲孤鶴伴閒吟時人若欲知名姓須向凌煙閣上尋西府頻看䇿舊勲北山常恐負移文如何九五飛龍日閒得無心出岫雲卧龍山下結茅新乞得匡時未老身此日此菴真獨幸天涯多少未歸人題史元之總戎都門别意巻十五年前别帝州早㸔風節動儒流渠陽此日新開府不數先朝定逺侯敖工部子發水亭次韻二首裊霧流雲水閣寒浴鳬飛鷺滿江干風潮莫向愁中聴雪竹還留醉裏看曲徑回廊接圃深竹牕松户晩陰陰幽花不阻三春夢明月長懸萬里心登仲宣樓蜀吳舟楫檻前經萬里鄉心杳不扄莫問興亡異時事滿川斜日下空庭觀城歌七首朱旗繡斧兩昭回南郡城池亦壯哉明月樓中堪坐嘯關山何處有塵埃睥睨連雲十二樓西南形勝數荆州已教峴首為屏繞更遣巴江作帶流江日曈曈散曉鴉湖田漠漠隠桑麻中丞本是陽春脚散得東風與萬家城廓周迴十里通遥從城上見城中不知多少王孫第萬戸樓臺一半紅古堰迢迢枕郭門城南城北萬家村行人共指豐年兆雪裏青青見麥痕大北門西擲甲山山頭古廟草斑斑中丞駐馬看遺像認得將軍舊姓關百雉城頭小隊行下聞閭里動歡聲防邊不在多戎馬只有人心是甲兵題賈園四首濼水橋西一畝宫小牕春度碧荷風老夫野性無拘束便欲移家向此中門巷沈沈草徑紆緑槐深䕶野人居鳥聲不㫁日亭午時有小童来捕魚樹繞園亭水漫池西溪風物最宜詩即教痛飲成深醉莫遣空懸别後思靡靡菰蒲傍水涯粼粼白石映青鞋今年欲此消長夏合扁君堂作我齋舟行近滄洲白雲𣺌𣺌水悠悠兩岸蘆花覆釣舟年少自知官紱在尋常不敢問滄洲湖上雜興四首雲水地臨三憲節江湖天放一漁舟虚煩倚樹看黄帽耐可乗槎漾碧流漾漾蓮舟繫古槎沈沈波影照烏紗多情最喜臺中客乗興能看水際花水岸風迴晩更凉菰蒲零亂拂衣裳扁舟莫到花深處恐礙波心片月光萬竹陰陰暑氣㣲主人迎客敞山扉翻愁使節傳呼近驚起舟前白鷺飛昌平廢縣層阿迴眺獨行行日落春山烟霧生山下荒城隠叢薄路人云是古昌平山行即事二首山逕春深滿緑苔景陵東去轉縈迴忽逢樵父驚相問言自黄花鎮裏来陵署青青生午煙山渠㶁㶁響春泉白頭宫監松林下閒説英皇北狩年草場牧馬場邊苜蓿香回龍宫外樹蒼蒼當年駿骨今何處曽被金鞍侍武皇栁塘雜興四首汲水澆花栁貫魚草堂巢燕暮春餘要知開逕誅茅意不為濃陰好讀書御溝東畔栁成林御水盈盈十里陰白馬青衫橋上客春来多少故園心琴臺書榭緑陰深杖履時時隔水尋閒過永明湖上看幾家桃李自成隂塘煙漠漠水迢迢揺蕩春風幾萬條不傍御園歌舞地只愁宮女妬纎腰泰山回馬嶺回馬嶺前春日西澗花巖樹欝萋萋上方鐘落不知處惟見白雲巖畔棲貞女祠長城在秦那在齊齊山古寺春草萋千載哭夫能變俗至今猶説杞梁妻鹿門山龎公舊隠鹿門山近在襄城漢水間石洞草荒無路入夕陽時見鳥飛還習池習家池上草萋萋流水成渠稻作畦山簡不来遊客散居人猶唱白銅鞮峴山大樹蕭蕭白日寒羊公祠下獨凭欄尋常一種青山石長使行人灑淚看望岳亭為王生作時其父戍雲中東岳名髙四海間此山之外更無山何時倚杖青雲上與爾朝登復暮攀望岳亭臨河水隈碧牕遥對孔林開誰知仰止平生意不為巖巖氣象来岱宗西與太行臨嵐翠霏㣲曉不分底是靈州狄刺史不看巖障只看雲汴上題吳國賔園林沙海原南古戰場曲池荒畎蔭堤長相逢折得芙蕖贈莫向西風笑冷香大堤大堤女兒花見羞大堤楊栁映青樓金壺滿注樊城酒醉殺狂夫不解愁梨雲軒獨坐有懐睡起僧房日未斜興来隨處即為家美人不見幽期𣺌閒對蒼黄數落花楝塘歌楝塘老人塘上遊颯颯西風吹素秋記得看花三四月滿塘紅紫映波流姚園次亭溪韻竹塢柴關破曉開石池花逕轉縈迴春深漫有尋芳興老近慚非作賦才散步零零宵露濕春堤楊栁風清曉月低童子莫愁江路滑老夫扶老有青藜觀風望雲雲浮劔閣夜英英白馬江邊踏月行傳語啼猿莫相近恐教遊子不勝情飲菊泉二首雨色巖花入牖斜城中風景似山家横琴不奏朱絃調對菊惟看白玉花十月霜庭菊正肥亭亭寒影照山扉野夫本是淵明侣可怪淹留夜不歸或曰雖有寓意然非善言故改作紅芳瘦盡緑陰肥幽鳥枝頭自在棲一日天風吹羽翮上林便作好聲啼浙人自遼囊父櫬返𦵏感其事為賦客衣零落鬢毛斑迢逓沙場負骨還三尺古碑千載恨曹娥江上水潺潺避喧二首興在桃源山水間幅巾藜杖每忘還沙田雨濕青牛卧石洞花深白鹿閒北牕無人春睡安時聞春樹鳥關關老翁元是避喧者又欲移家向别山五月五日以扇奉寄二親侑以小詩二首迢迢親舎白雲下長日登樓思有餘代谷燕山空説近經時不見一封書薰風簾幙燕翻翻庭際榴花火欲然睡起忽生千里思慈顔一别又三年示弟賦鴈門秋髙多烈風烟沙極目見雲中憐君弓馬年来慣不數翩翩塞上雄揷秧歌紅石岡頭夜雨晴湖田水滿接堤平行人欲問年豐儉試向田中聴鼓聲促梅次韻庭下梅花開未開帝孫邀月久停杯終知不入繁華夢莫遣笙歌取次催曉起口號春眠不奈鳥聲催起立荒園傍古槐怪底幽尋苦無力夢中曽上故山来聞董汝卿喪内二首草堂雙燕壘新巢坐感琴絲理㫁膠麥飯一壺香一瓣此情何處哭芳郊好學平生説仲舒絳帷常坐五更餘春来睡足三竿日應是無人唤讀書寫懐白髮蕭蕭五十春宦途猶作未歸人何時杖履柴門路風景依然逺俗塵吳竹齋惠藥品六月漳河艤客舟小牕閒卧白雲秋憐君饋藥如康子不療山翁四海憂田家栁覆崇垣水䕶門不依鄰舎自為村何縁却近山陵道日夕時聞車馬喧薛汝茂乞蓮栽薛家池中千葉蓮出波今已疊青錢分栽不為看花色要向山牕聴雨眠竹店舖候髙生不至行盡荒山更涉溪故人聞説在城西空庭日午車馬寂惟有鵓鴣深樹啼游仙詞四章夀楊母次劉五清韻翡翠衣裳雲母軿往来常在碧霄行老君臺上凌風過王母池邊看月生一寸靈光萬古心笑看烏兔兩升沉已遣夀顔同紫玉更欺仙骨比黄金冉冉霓旌覆羽仙雙雙𤣥鶴舞芳筵眼看庭樹真瓊樹不數藍田是玉田江流山色繞金堂管領年華入夀觴仙家自與人間别千嵗都来一刻長夀歌三章為松鶴翁作松裊山堂紅日開天風吹鶴下瑶臺傳書為問西王母别後蟠桃熟幾迴西園十月菊花黄花底流泉水亦香汲水採花宵釀酒曉筵傾入萬年觴八旬遐齒三齡錫四海昇平見七朝潁上漫隨巢父隠渭南還有太公招五言排律留别董三屏次韻晩照長雲合春帆細雨開别離予正苦魂夢子頻来石路齊南境風花白下臺十年今去國千里獨憐才㑹有荷裳寄應煩想像裁遊仙巖黄帝昔好道相傳駐此山至今鍊藥處猶見五雲還丹井霞空聚清池水自潺鳯笙歸寂寞龍駕絶追攀曠刼留仙跡何年啓佛關看花周法界鐘鼓隔人寰瀑響千巖應潭虛萬象閒排空雲木古夾道翠泉環澗鹿衝人返山花照酒殷寺荒翻雅淡僧老更蕭閒問法空羣妄探竒始一斑未能兼吏隠回首愧塵顔白巖太宰寄示新作兼有并刀之貺奉謝一首忽報王孫使新從相府旋下堦㤀病足開牘醒愁眠碧落仙人字黄初大雅篇空巖泣神鬼白日走雲烟䇿杖東峰外看碑北岳前依㣲穿雪竇想像俯春泉客路千餘里離心兩隔年倦遊甘散拙髙舉謝聨翩水國身猶寄山堂夢屢牽愧非清廟質虚枉佩刀傳贈張御醫九齡故居移杏圃新寵沐楓宸天馬飛黄日雲龍際㑹辰華陀初入魏扁鵲舊鳴秦術妙乾坤秘功存社稷臣東衢迎寳鏹西第擁朱輪家是華胥國人呼有脚春翻嗟縫掖士章句老風塵遊仙詞贈李羽士擬初唐四子體碧落新移牒𤣥津晩繫槎天臨北斗地人住上清家樹古金壇静花深玉洞斜靈砂飛綘雪仙醴注青霞緱嶺音書宻函關道路遐月明蒼鶴羽風度紫鸞車幾見桃成實重聞海變沙瑶牕禮星後閒坐讀南華賦得白鷺洲送柴墟儲中丞路轉長干渡洲傳白鷺名滄波去不息緑芷復叢生隠隠江田抱團團堰日明鏃沙沈壁壘牆堞隠臺城湍古晴霓下蒲深晝虎行漁人牽網迹商女踏歌聲佳麗千年恨豪華六代情經過夕臨眺誰並客舟横送金中丞赴延綏上郡防戎切中丞入陜遥隼旂明曉甸鐃吹轉春橋二月花新綴三川雪正消北門来冦凖西極使班超國仗和戎利人傳破膽謡按圖收地險堅壁阻天驕禮樂欽儒將經綸翊聖朝長城一身是詎數霍嫖姚送許中丞徳新赴甘肅暫布山東化還為隴右行中丞新受勅賤子舊知名玉露承冠劍金颷捲斾旌神羊心自直孤隼勢初横地接祈連砦星羅冒頓營未須懐破斧先喜號長城草映邊雲白沙流漢月明陜人歌召伯關吏識終生許國知公志通家是我情離筵忽隔水秋望轉盈盈送唐京兆送母還邵陽奉詔還將母南歸樂未涯日明吳苑樹風引邵陵槎萬里遥瞻闕三湘近接家望灘懐孔雀臨洞識桃花夀祝青山永書傳碧海遐趙張前史艷曽閔後人誇去值桑蠶老迎看竹馬斜却憐春别苦飛絮滿江沙送别白樓先生次郭司業韻曉騎傳中㫖春曹陟上卿樂推吳季札經許鄭康成車馬秋江出鄉邦晝錦行論交韈始結惜别盖初傾拜手雙龍闕承恩五鳳城御堦聴曵履樞宻待持衡制作登三殿聲華振八瀛新班岱嶽重舊寺雪山輕古貌看常健氷銜列自清英英伯夷志垂白轉精明繡斧西征為何輔之御史作蜀道軍容使秋風振旅還功成萬里外捷報五雲間電掃妖氛滅川流戰血殷漢兵隨指顧蕃部凛威顔曉坐轅門静宵登劍閣閒丹心懸海日繡斧照江關飲馬瞿唐峽封刀麥子山班超桓典後芳駕幾人攀題芳洲書屋為俞大㕘作見説林居勝清江繞舎流元方登瑣闥小謝隠滄洲草蒨辰占麗梧飄嵗識秋煙霞互吞吐鷗鷺接飛浮日有髙軒過時同静者遊麈揮山榻冷棋對竹牕幽寳笈通三昧牙籖富九丘側聞能尚志應不愛封侯薇省牽魂夢萸樽阻唱酬詎諳方岳寄深切廟廊憂聴吳子談吳中事吳子近南遊龍江復虎丘三分形勝地六代帝王州望月晴臨嶠聴潮夜泛舟寶珠商女得靈劍海人求去日蘼蕪緑歸来菡蓞秋逢宵話竒賞吾興亦雲浮長短句送顧華玉席上分體得三五七言送歸客送歸客東城復西苑碧草萋萋别路長蒼山厯厯愁心逺愁心逺征駕不可留去年送歸陌上雪今年送歸江上秋江上秋江雨霽返照入林光翳翳家在齊川未得歸年年送客来沙際送歸客請客聴我歌我如水中鳬君如江上波波流去不息鳬飛無逺翼迴橋轉岸君已遥薄暮徘迴此何極燒荒風怒號振城瓦塞草白朔雲赭漢兵出火掃蕩原野祝融馳炎帝下騰赤龍走朱馬雲濤沸星雨洒黄沙一望千里通魍魎書啼巢穴空敵人臨水不敢過将軍歸来閉關坐吳將軍課子大兒龍小兒虎碌碌犬與豚眼中何足數將軍回獵騎帳下斑衣舞天河東傾月西落蘭膏夜射簾珠薄庭槐烏鳥棲復驚弦誦聲髙應金柝將有法兵有機吁嗟易聞不易知長平一坑萬人死君不見邯鄲子題風木遺哀巻苫為席塊為枕憔悴孤兒墓田寢墓田樹聲蕭蕭寒濤捲空風葉飄樹不止風不息孤兒欲化田中石題趙訓夫海屋添籌巻海上屋幾千尺麗日起扶桑鱗鱗曙煙碧仙籌刻玉雲花湛海塵一飛籌一㸃借問仙翁夀幾何十屋仙籌充畫檻仙翁家住海中村平原公子宋王孫相逢欲訪桑田事雙鶴何年下海門光復堂詩巋巋光復堂湯湯嵗寒溪故家世業傳江西他園豈無木重是祖手植他地豈無土重是祖手闢物生各有主天道終好還嵐光映朝牖不改門前山堂有趾溪有涘我溪不竭堂永峙六言送客舟横㫁岸日斜鴈度空山落霞欲採芙蓉贈逺秋江何處天涯湖上二首一溪流水秋碧兩岸垂楊晝陰絶愛王家池館酒旗低拂波心田田蓮葉洲北寂寂孤亭水南恐有人来摘取淆他萬頃清潭靳庄鋪坐雨次沈休翁韻村南村北雲山亭外亭中煙景東巖過客重来蘿逕蕭蕭薄暝鳥啼千樹萬樹雲起前山後山門外青春向晩雨中遊客西還黄山店趙山家人西山半銜落日東嶺尚宿歸雲雨過荒村向暮柴門流水沄沄瓠葉翻翻雨驟竹枝裊裊風斜忽見緑檉花發猶疑春在山家流鶯百囀深樹巢燕雙飛短簾過客不慙阮籍主人只似陶潛煙中白鳥雙度草際黄牛獨還山寺暮鐘何處隨風飄落人間蔡石岡寄瓶梨綴樹同梅止渇登筵比蔗生津却憶帝爐燒賜曽分衣白山人淮北滎南接境凍姿霜色含秋如得此君萬顆豈論千户封侯不縁摘取商洛定自傳分秣陵笑殺山妻鄙俗安排慢火相蒸武帝巡遊不返文園渇病難除誰致内林一顆且成封禪之書送范侍御蘇山北上四首隼旟低拂垂栁驄馬嬌嘶落花碣石春風萬里盧溝曉月千家生憎白雲春去無奈黄鶯晝啼欲採芙蓉贈逺北湖蓮葉初齊廊廟江湖身世先憂後樂心情本是仲淹孫子怪来夷夏知名君山已歸地下燕泉却在天南落落故人如此蕭蕭短髮何堪六言近體贈錢世恩向風征馬頻嘶獨客行吟古堤百里文星斗下三年水部河西遥心浦樹煙𣺌短夢城烏曙啼記取今宵醉别雪堂燈火凄凄華泉集巻七
