body:
  text: 華泉集卷十明邊貢撰文集序謝盛德章序代田尚書作醫以業鳴代不乏人而宋清名獨在人口下至庸夫孺子稱善醫者必曰扁鵲扁鵲凡此非以子長子厚之文為之耶夫越人之術神矣至其論病則曰輕身重財不治也由是言之非好利者歟清之市藥焚劵不責報報者益廣且厚其治人固無異術也而人亦不泯焉然則術之神者固足多而輕利之大亦未可少也若今盛子則兼之矣可無傳乎四年秋八月豫中子穗病下血煩憒不飲食與寢京師業醫者以十數環視莫措曰是瘵已不可以復起矣浹辰病且殆諸鄰人走視焉曰胡售者盛道盛子至脈之笑曰無患也患在脾胃藥之得熟寢再藥之思飲與食煩憒日益脫去血止不復下不踰月起矣豫具金幣往酬焉盛子麾之曰不願也願得公之文以錫之煥煥幸托以傳則公之所以報煥者甚厚也嗚呼方穗之病也執豫手而泣曰兒不可起也醫亦曰不可起也豫行年六十有四矣境向暮前年而老妻亡去年而長子死焉而穗又病且殆當是時豫之心何如也而盛子起之豫之所以德盛子者豈其微哉乃不惟不厚責報也而且麾焉然則盛子之賢奚但異于今之醫也而顧以文責豫豫不文不足以繼太史公桞子之筆以永盛子之傳然而盛子之所以兼乎二家者則固不泯泯矣盛子名煥姑蘇人其先世嘗有為御醫者受知宣廟君子以為能世其業云夀朱母六十序三年春二月癸亥為别山朱子之母之夀之辰君子稱焉何稱乎朱母從子也何夀之喜若曰非是母不生是子也故喜之爾其喜之奈何曰朱子御史也官于朝將乞養焉母也聞之告諸朱子之父碧梧曰公不恆云乎烹熟羶香嘗而薦之非孝也養也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已衣欲養盍止之碧梧止朱子朱子恍然欷焉弗果乞出稽淮南北之戎不踰年害寢而制興時嵗侵人相食矣朱子請于朝力數若申包胥之告急於秦庭然者天王憫焉發倉廪以賑淮南北之民飲食必祝曰天茍有意于此土也必使我御史久厥時必使我御史之親康以夀罔攸懷故君子以朱子不隳其職為孝以母夫人不溺其愛為賢無異稱焉已而天王召御史曰良矣御史衣豫嘉爾績矣豫衮有闕曷歸乎補之哉御史歸道出滁陽太僕正邊子貢謂其僚汪子錫牛子鳳吳子挺劉子樽曰樂哉美乎其朱之母子耶夫御史者郎官也進而上之曰大夫焉曰卿焉曰公孤焉有餘地矣六十者下夀也進而上之曰耋焉曰耄焉曰期頥焉有餘日矣母之年有餘日則可矣永厥享子之位有餘地則可以大厥庸奚一名一夀而但已也可無頌乎于是汪子賦岷江牛子賦漢江吳子賦大别劉子賦南極邊子賦山之陽之篇命工者歌以餞焉觴於琅琊之麓朱子賦北山之章再拜而謝曰衣也歸可以夀吾母于堂下矣送彭子奉母還蜀序鶴泉彭子舉進士之明年拜吏科給事中來南都居無何以昌言激上怒禠祿者數矣海內之士相識也與弗識也罔不稱之曰彭直諫云當是時也彭子之先君奉議公沒若干年矣會大禮事進階奉政大夫而其母陳夫人者就養于官有宜人之封焉乃宜人思其鄉欲亟歸彭子請曰以身侍臣之願也上允之命下之日曰北川黃子小涇顧子者彭子之同官也偕野史氏往賀焉彭子盥沐布香几於庭向闕拜曰大哉恩乎是吾君之賜也起而登堂拜宜人曰榮哉遇乎是吾母之賜也降趨而出進二子而拜曰樂哉歸乎是吾友之賜也野史氏疑焉問彭子曰子拜賜于庭何也曰某也戅夫也干天之威震殛是虞乃優焉舍焉與之假往焉又虛位也而待之還焉非天王之仁聖有是乎哉故曰是吾君之賜也大哉恩矣又問之曰子拜賜于堂何也彭子曰子不觀于今之典乎具慶者與焉偏侍者與焉永感者戚戚矣非夫人之遐福也而先君有是哉故曰是吾母之賜也榮哉遇矣野史氏曰子之拜二子者則謂之何對曰同寅協恭聖謨存焉古人身雖外心罔不在王室也吾三子實相勉焉二子者在吾何憂乎哉故曰是吾友之賜也樂哉歸矣野史氏揖彭子而拜之曰子言三也而三善備焉敢不敬乎由前之言是曰知報由中之言是曰隆愛由後之言是曰推賢推賢者公隆愛者孝知報者忠夫忠也孝也公也天下之大善也而君也母也友也天下之大倫也子三言而三善備焉敢不敬拜寄慶屋舟翁序儒者之臨事也有經有權焉以權者通其變以經者守其常而已矣是故常可能變為難非變之難通之難也變而不失其常斯善矣惟醫亦然南人之言孔子善焉非常乎若藥不瞑眩厥疾弗瘳非變乎知斯二者能守也又能通也天下或寡矣若京口屋舟翁斯其人哉屋舟翁者姓錢氏名玉字宗玉别號屋舟今少傳邃菴楊公戚也𢎞治庚申間公居北都官奉常豫從逰焉知翁名踰二紀矣乃嘉靖甲申夏豫來南都即病腫肢攣痛更數醫弗已也尋復作書以告公公戚然閔語翁曰門士也盍往視乎翁至視焉即啓囊出藥脈數甚否且變矣不可以守經也為之吐焉下焉已又汗焉不越旬而豫起然則翁也非所謂善通其變者乎乙酉翁夀七十春二月夀期屆矣當是時也西北邊有大警持久靡平詔起少傳楊公總制兵事刻期以往往之日夀之旦也少傳公以慶焉公世家之詳醫學之𢎞與夀考之道罔有遺矣其鄉之學士大夫尹德亨輩要豫以言豫復何言哉獨竊有深感焉夫不為良相必為良醫翁固弗斯沗也而世有用兵如用藥者非少傅公孰其當之公文武並兼經權相濟儒者之能事畢矣有醫若翁俾司御醫淑諸人而傳焉則惠之所臨豈不廣也乃祕焉韜焉蔭庇一鄉無其知之者寡乎哉無其忌之者多乎哉豫竊有深感焉傳語翁曰醫國者上醫可亟治裝行且有舉之者矣太倉公長桑君幸勿多讓是月二十八日某人書賀談御史考績序未菴談君興國州人也為武陟令者三年徴拜南京貴州道監察御史為御史者三年考其績於御史大夫與天官卿御史大夫天官卿合辭書上考將獻於天子其同官者澶西王君時齋孟君輩徴豫文以賀焉豫往在正德丁丒間視學中州有來自武陟者述談牧民之狀豫曰是循良之政也必有去思又述談君馭吏之狀豫曰是剛大之才也他日必為御史今上改元壬午之夏豫承乏奉常則君已御史久矣蓋相聞也相知也凡五六年而始見焉既相見則君乃磊砢慷慨人也有大志才調逸發事到即了然判去不足以盡巡西城又巡上江豪姦屏迹論者謂其風裁威望一時鮮倫蓋雖小試不足以盡其才譬之昆吾湛盧剸以一堅鋩創立見不必虎豹犀象而後然也則夫天官卿與御史大夫之上考也其孰曰非宜哉夫天下之事言之者弗得行諫官是也行之弗得言宰相是也御史兼之豫於君有賀矣是故百僚之臧否得言焉四方之利病得言焉庶政之得失得言焉不徒言而激之揚之興之革之次第畢舉所謂才之不足以盡焉者將于是乎盡也顯丕績垂休聲寧止防一江視一城之可以稱述也哉豫昔料君之牧民曰必有去思今武陟四鄉塑像而享祀之者八祠而又聞君之過其地也老幼男女爭以趨泣以拜如赤子得慈母于久失之餘斯豈聲音笑貌之能為也不亦中耶又嘗料君之馭吏矣曰必為御史而今果然不竒中耶乃心獨喜自負以為知人且自信其料于後者必如前之料于今者之能中也雖然且有告焉古之君子之受知於人也必求以副之而圖厥終夷考其知人又必德望隆厚斯足以重所知之人薄如豫也庳如豫也而求副于君不已妄耶顧君之所以自立者有不假人以見而豫也因得以冒知人之知耳君其往哉豫同官曰何柏齋者太史公也嘗紀君武陟之政播諸中州豫不佞尚願為君請傳以繼攬轡之後不知可不可也君其往哉贈王君惠序君惠名天祿安東衛萬户侯某之子也甫弱冠來逰京師如湛盧出匣霜硎差差如火齊在盤光熖霍霍京師之人逆者目旋聽者耳屬皆以此竒之然亦以此疑之也一日以鄉土之故來見豫於奉常邸舍與之坐而語焉有不終食知其為國士矣又一日客裝戎服遇諸都亭豫驚問其以君惠曰天祿繼先廕將歸安東蓋自是别矣遂與下馬坐亭上命執箠者解佩刀質斗酒來為君惠酌酒且酣視君惠之容充然而其口隱然也豫愕焉以問不對再酌再問君惠曰天祿兒時強志盛氣好大而見竒讀史家書見賈誼求試屬國請繫單于之頸而制其命終軍使越欲得長纓羈其王而致之闕下常竊慕之乃今蕭關以西雲中以北士未解甲餉不稅驂思欲當一校之隊突刃觸鋒乘危躡險一效須臾之捷以快其平生願而未之得也金紫照庭牙纛就列暮酣絲竹曉獵川原荷上位沗重祿榮其軀以豐其體視天祿之心何如哉豫以為取善于人以淑其身君惠之志大矣然世有吳廷尉而誼之名始得聞于朝為之君者無武帝之賢恐終軍亦不得以成其美也以豫君惠萬里之行基于此矣君惠歸而益深其所養以待之雖自貴且重不以效軍之求通然他日天子有問豫固君惠之廷尉也君惠喜而起揖且謝曰行矣行矣時惠季弟之婦翁鄭聘君和者追送至亭聞豫二人言謂不可無紀也遂書以為贈送張允升序髠者寢不脫冠刖者行不跣足內之不足故也內不足故外物能動之否則千金之寶視如泥沙車馬文繡充楹照庭而目無留盼矣爵祿名第國之所以榮辱士士不可以有欣戚于其間而自榮辱其身可也傳稱孔子其厄于陳蔡也有吾道非耶之嘆攝魯相而喜吾以為此好事者之談非君子事也觀其言曰道之將行也與命也道之將廢也與命也夫道在我命在天行廢在命何以欣戚為哉此戰國好名嗜利者之為非毋固必之意也吾固知非君子事也世之以士名者莫不曰孔子吾師也至考其行則合于孔子者幾希矣孔子之道豈徒言哉知而不信信而不行者衆也始豫幼時見允升于鄉序間樂羣敬業貧無困色目識而心竒之後豫試吏水部使江南過家而再見焉雖戰藝屢北之餘挺拔偉烈不少挫折如鄉序之見之也未幾豫官奉常允升亦領薦卒業于成均習政于內監升名于天官而將仕焉居三載如過家之見之也今之人有得杯羮以自慶失一錢而面赤不食者非不欲強飭其情內之不足雖欲偽為而不能也家食之于賔興賔興之于入官亦已殊矣然抑之而不悲庸之而不喜允為君子之士也吾固知足于內者也合于孔子之道知而信信而能行之者也夀支廷璽序昔齊桓公伐孤竹還而迷用管仲計簡老馬脫其羈而隨之遂得道夫以蹺騰蹴踏一日千里成功行陳之間老馬不能也至于達險夷辨岐路則馬之壯有力者弗與焉無他諳故也惟將亦然搴旗斬將恆存乎少勇之人而審勢識機乃在于老成之士秦穆公之襲鄭也不聽百里奚之諫取敗于殽始皇伐荆之役輕任李信倒戈于城父方二君之始意未嘗不以奚為淺知而笑翦之老怯也然茅津之誓頻陽之謝則固已顔汗肉慚無以自見而心服其神矣易曰師貞丈人吉詎不信哉左軍都督府都督僉事支公廷璽自百户起家出入三朝以至今日折禦衝侮勞勳茂著年八十健武如少壯人內典禁兵外督營務親甲胄冒風雨不以一日少休蓋庶幾所謂丈人者而報上之心未已也太史公與公同事既嘉其久且諳又喜其夀率所親繪圖賦詩以慶謂貢儒生也宜序而祝之夫以公門第之顯恩渥之隆賔從之華子孫之衆福祉之光詩圖備矣敢喻以馬而進之奚翦之事若未有以為公祝者是乃所以大祝之也公其無曰儒生之言瀆以迂哉頤晦林子詩集序客有問於林子者曰孰使子身之晦也非行之獨乎曰然又問之曰孰使子名之顯也非詩之工乎林子謝不敢當已而曰固所好也客又問曰晦子之名顯子之身奚若林子不應則又問曰名且顯而身日晦已奈何林子笑曰終且晦何病焉有傳斯語於野史氏者且曰是莆之髙士也野史氏以問石峰陳子陳子曰然誠有之其人也中退如也外儼如也其守確如其少也業舉子文蔚如矣一再試不偶輒棄去徜徉歌吟于山水之間其詩也鏗乎其聲而淡乎其味也有孟襄陽之風焉幽情遐致間逺蕭散有魏仲先之風焉行且來矣今年秋林子果携其少子者逰金陵委禽陳子之門明日偕訪于野史氏出其稿示焉野史氏讀之曰信哉其間且逺也蕭且散也其致遐其情幽其味沃然淡而其聲鏗然和也考其人蓋有陳子言所未之盡者野史氏心醉焉謂林子曰擬人者必以其倫尚友者必同其志陳子擬子於浩然仲先倫乎否耶之二子者兩逸人耳同在宋者有欽若氏焉同在唐者有林甫氏焉皆赫赫髙位者也子擇所安易地而友於此乎於彼乎林子拂袖而起行且歌曰腐鼠飢鳶彼勢若權我章我篇廣樂鈞天寧玉而毁不瓦而全明日林子復訪于野史氏止而飲之酒且謂之曰嗟哉林子子之工亦至矣雖然子之晦亦久矣抑古有言詩能窮人子不求晦之脫而顧安之養之子之晦何時已耶然則晦子之身者即顯子之名者也奚止一獨行哉子曷安焉林子名嘉績汝儀其字頥晦其號見素公之猶子也君子以為恬雅夷曠不愧其世業云刻其詩者嘉興守蕭君若愚石峰子門人也贈福建右方伯鄒公序正德癸酉春正月甲申山東左參政鄒公時鳴以吏部薦為福建右布政使命下而遂行行之日曰錫山秦公者公之同年也又同官於濟於是合藩臬諸公詩以送之而以序委豫豫昔在戊辰己巳間為太常丞而公為户科都給事中都給事中之與太常丞者班序相連也數望見顔色焉以晚進不敢親獨時時與周給事子庚者私瞰公曰淵哉若人其抱𢎞以深其質凝以逺也是公輔之器也未幾公為保定知府豫往見焉退而又謂周子庚曰淵哉若人測之而益深也窮之而益逺也是其為郡也必有聞也居無何豫亦出守不見公者踰年獨聞之道路之人言曰保定守賢甚他郡無能及之也其至郡也民安之其在郡也民歌之其去郡也民留之而其既去也民思之不忘保定守賢甚他郡何能及之也再踰年豫以家難歸則公已參政久矣豫再見焉退而思曰給事之官上與天子可否事而下與宰執相賔主他人處之易矜且溢而郡守者有簿書之勞有趨拜之辱部寺之吏或耻合焉而况于以都給事而行也然進之而參政則辭勞而逸辭辱而榮可喜矣而公且休休焉于于焉一視之無所與焉其賢於人何如也繼而有今命夫誰曰不宜哉且參政佐職也視今命為不專郡守専矣或齟齬于上吏不得盡給事得言之而不得行之之權視今命何如也公往矣譬之岷山之江道瀘踰巴越涪萬厯灧澦委委盤盤東注于夔峽又東出于夷陵其洶湧汗漫澎湃之勢恆抑遏不得肆又東至于江陵又東至于漢陽而後抑者舒遏者平沛然而東之于海矣古語曰不止不渟不蓄不流非公之謂與公荆人也豫又為荆守皆知江者故請以江喻書以贈公又將别書以遺子庚庶他日公政之成位之崇幸再見焉必以豫言為有徴也贈章與充省兄歸嘉州序居者之安也出百里以為逺也自河北盜興則東西村之相望而弗敢過也乃章子與充者自嘉州以其大人公訥菴封君之命道夔峽越荆峴浮襄厯鄧涉宋衛曹薛之郊以達于濟南冒風露之苦犯白刃之險以省其伯氏者我郡侯先生也先生自戊午卒業京師壬戌舉進士官留都來守濟南蓋不見其親者餘十五年乃下車恆圉圉焉若有求然而弗之獲也若有望然而弗之及也乃與充一旦至則相與飲焉連榻共被凡封君動若息與其母劉宜人之所以偕夀而並娛者靡弗言也則變而圉圉者為怡怡也為愈愈也而郡侯之隱憂一旦去矣居三月與充歸我濟南學士大夫相與餞于城西之圃則謂之曰賢哉章子其來也以伯氏而其亟歸也以封君也伯氏慰矣封君其有問焉曰伯氏之吏也則謂之何於是章子者憮然莫之對也華泉子曰芘民曰德厲民曰賊士鞅不云乎武子之德在民如周人之思召公焉伯氏之謂矣比出野聞百姓歌曰賊來勿走我有章守雖有蝗蟲猶有稻㫪夫道充者我郡侯之字也章子歸而歌以侑封君之觴有弗欣然者吾弗信也諸學士大夫聞之咸曰是可以慰封君也已矣于是書之以贈章子焉贈商氏二子序商氏二子者同生子也傳稱同生子為孿子曰孿子之相似惟其母知之乃商氏二子者之相似也即其母亦弗能知也是其所以為同者乃甚異也人見其同者之甚異也則相與期之曰二子者將靡適弗有同也乃既長而其業異焉其伯氏則從掾也而治刑書也其仲氏則治尚書而為學官弟子也正德壬申學官弟子試上列有餼廪之入其掾也則亦登仕籍有冠服之加焉人見其冠服之加也餼廪之入也則皆曰是升名之漸也而又同焉則是二子者終其身將靡適弗有同也則相與喜焉又相與賀焉而告豫曰二子者其生同也其貌同也其升名之漸又同也而業異焉他日者之就也其亦將有同乎否也豫曰固也其終同也夫曰掾曰弟子云者其名爾也而所謂刑書與尚書者固相通也尚書以具治天下之道刑書以具治天下之法法與道無二焉其理同也國朝用人無方祖宗以來由掾而致八座固有之矣而股肱之任台輔之地則學官弟子者滔滔是也吾見二子之終同也即不同而名與爵者有崇卑焉然而道足以為化也法足以為政也則亦不害其為同也吾見二子之終同也語載八士曰伯達伯適仲突仲忽叔夜叔夏季隨季騧夫八士者之傳也以其賢以其同生不以其名與爵之同也二子勉之其亦無負于同生者而後可也二子者伯曰經仲曰書經曰子正書曰子中子中者豫友也豫喜其升名之漸將有以贈之乃其同舍生李君輩則相與徴文焉豫固不能他有所告于二子也二子勉之慶夀詩序慶夀詩者濟南諸士夫之所作也然則焉所作夀張母而作也張母居青城其子為尹青城違我濟南又出百里外諸士夫不其子之識也焉夀其母耶曰是其邑之人賈子者之為之也賈子居濟南交于士夫諸士夫無不善賈子者賈子者之言曰我青城有賢尹能惠于民我民戴我張侯綣綣焉若赤子之戀慈母也乃其母彭夫人既賢且康又臨于九帙侯之心實樂焉夫侯之樂我青城人之所同我青城人之樂固恂之所同也敢再拜請以言夀於是諸士夫之詩作焉君子是以知張尹之為尹也施政之樂也得衆之深也賈子之仁也其懷惠也能勿私也諸士夫之賢也其稱人也能弗諛也語曰樂多賢友賈子有焉樂道人之善諸士夫有焉詩曰魯侯燕喜令妻夀母張子有焉夫如是亦足以傳也已矣於是作慶夀詩序夀都御史劉公序都察院右副都御史友山劉公致其仕之五年夀登七十七月二十一日其誕辰也前四日欽差鎮守山東總兵官劉公來謂貢曰豫之在部伍也實無所能焉而公奬進之以示于衆曰是國之干城也今日豫有是是則公之賜也子為我夀之可乎貢對曰唯唯明日欽差巡按山東監察御史李公來謂貢曰豫之在弟子員也實無所能焉而公奬進之以示于衆曰是國之梁棟也今豫也有是是則公之賜也子為我夀之可乎貢對曰唯唯又明日欽差巡撫山東都察院右僉都御史趙公來謂貢曰劉公之于子也則鄉人焉雖然亦豫之鄉人也今兹之夀不可以無賀也豫願子之文以夀之若何于是貢作而言曰公之在遼陽之與雲中也霜露之所蒙焉風霾之所侵焉勞心殫慮髮且就種種矣今之居於家也得無樂乎昔者邊儲匱竭外侮紛至狼煙突如羽檄交橫當是時九重東北顧之憂何如也而公以一身任焉其經畫斡轉之機殷富安攘之功公固已收之矣雖進之而為列卿也何愧焉然且聞之古之大臣以知人為貴公拔劉于部伍識李於弟子員中雖進之而為兵部可也又進之而為吏部亦可也乃不惟不可又從而聽其歸焉是果何為者耶方公之歸也浩然如釋重負一身之外淡然無所為謂之曰不樂焉不可也然又聞之功髙而不賞未滿而先退與德盛而不報之三者有一焉皆夀之道也况兼而有之耶公之歸也結廬明湖之濵據山東之勝日以觀夫天地隂陽之運煙雲草木之變消息盈虛之數而思昔之在遼陽之與雲中也如走太行如涉巫峽險阻備厯而一旦歸焉與家人閭里歡笑以逰是烏可無樂耶夫樂斯安安斯夀矣然則公之享有明湖如東山可也貢不敏獲從大夫之後而適歸于鄉幸公之登斯夀且有斯樂也敢因三公者之命而書之以畢私願且以為公慶焉若乃公履厯之詳勛業之盛所以重中國而風四夷者固人人知之矣贈山西左方伯胡公序襄陽胡子仕梁為右轄者一年晉山西左於是梁左轄南犍童子臺察豫章陳子率藩臬寮友賀焉當是時石峰陳子麻城汪子平谷王子華泉邊子渠陽蔡子皆及席之客也觴行華泉子問焉曰藩臬者之缺也天官卿薦之奚必具二人名客有對者曰弗專哉又重選也華泉子曰藩臬者之選也孰有重于左轄者乎天官卿薦之奚乃一人爾也是奚謂弗專也客曰職均爾也華泉子曰夫左轄者豈右者倫哉竊聞之志者立政者也權者行志者也時者達權者也左轄備焉奚謂均客曰胡子嘗為邑宰矣溧人懷之何弗政也嘗為給舍矣天下之弊靡勿言也何弗權也嘗為藩佐矣威行而惠流宛業和焉何弗時也三者備矣華泉子曰夫宰有司府焉厥志靡伸政弗立矣佐有長吏焉厥權靡綜志弗行矣給事言焉行之者存乎人也厥時靡乘權弗達矣而左轄也者時我乘也權我綜也志我伸也三者備焉彼右轄者則猶藩佐云耳故曰左轄者非右者倫也童子陳子越坐聞之謂華泉子曰斯不可以贈胡子已乎華泉子曰未也夫時者難值而易變也權者難恃而易移也政者難成而易隳也書曰慎厥終惟其始斯近之哉詩曰庶幾夙夜以永終譽在此往矣是恆志之道也於是胡子喜而起浮白以酌華泉子曰敬聞教敬聞教請如故事命學官弟子書之以左右焉庶人知斯席也者不徒言笑宴好已也涉封君挽詩序序曰挽詩也者古虞殯之歌也後之人咸祖焉其變也如誄又如懷古之詩其甚也如詠物之詩斯極矣今之挽詩是詠物之詩之流也夫人之生也而吾交焉死也而吾見焉而歌以殯之夫是以其音也哀而其言有情也故如誄焉未交其生也未見其死也而其人美焉過于其里而吊諸其墓而賦焉讀之者可以觀聞之者可以興也則懷古之詩焉其生也未交也其死也未見也未過其里未吊其墓也美惡朦焉徒據其需之者之文而賦之其言弗情也其音弗哀也其讀之者弗可觀也其聞之者弗可興也嗟乎是詠物而已矣今之為挽詩者類焉故曰是詠物之詩之流也是故虞殯之歌之不傳也久矣其變也亦極矣不得已而思其次焉誄可也又其次焉則懷古亦可也廣陵涉仲翁氏嘗以其子之貴封監察御史又以其子為提刑為按察副使也嘗就飬于梁梁之為宣政為提刑為軍師為學士大夫者咸見焉當是時翁之年已七十有八矣久而思其鄉乃歸歸一年而卒凡梁之見翁者咸賦焉畀其子歌以殯翁其言情其音哀也君子曰為此詩者其幾于古乎夫見其生也則不必見其死交于子也則不交于父且其事母之孝事兄之弟教子之誼居鄉之仁見於命辭者四美昭焉與需之者異也可無興乎固逾于過其里而吊諸其墓者矣送王獻可西歸序秦王子仕于梁有母之喪既斂梁諸大夫吊焉王子被髮徒跣拜稽顙而哭曰天乎罪在不肖乃弗之殛以禍于母安人母安人奚罪也夫諸君子乃胡肖不肖也而臨誨也敢不拜辱厥明諸大夫贈玄三纁二王子斬然哀焉降而受委于殯東拜哭稽顙曰哀哉敢重辱諸君子臨然有襚焉是愛其親以及人之親者歟雖然哀吊備矣是知生之義也敢不拜德返之日布輤輲車素錦以為幄而行諸大夫咸引焉聚而曰孝哉王子可謂知禮矣夫虞殯有歌焉古之道也魯臧子不賦愍憂乎越陳子不賦風木乎晉文子不賦南山有莪乎於戲斯古之道也諸大夫繼焉紼者歌焉出諸鄭門之野渢渢乎若有望而弗之見漻焉若求而罔得焉王子倚杖而泣稽顙而辭曰仁哉夫子於母安人者至矣詩云凡民有喪匍匐救之其諸君之謂乎誨也敢不重拜華泉集卷十
