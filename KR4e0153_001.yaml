body:
  text: 華泉集卷一明邊貢撰詩集一四言古體顯陵五章送嚴介溪宗伯於穆獻考睿哲維則宅兹郢方以蒞王國篤生我后膺符受厯奕世丕承下土是式滔滔江漢翼軫之墟我后龍翔奄正中區誕基駿命聿紹鴻圗赫赫明明肇闡徽謨帝念孝思繼序不忘位號既崇復我天常有嚴新廟祠禴蒸嘗是典是彞誕告多方乃命司空伐石京師鬱鬱我陵大建厥規載經載營竹花卜釐立極考度備物多儀帝屬其文經緯七曜貞觀崇封勒我純孝億萬斯年湯孫是詔天人肅肅衛兹隧道隰栁壽林母也隰則有栁原則有杻顯允林侯母德且壽母壽維何七秩是望母德維何嫓古敬姜殷殷其雷在山之陽侯政有聲聞于東方匪維東方四國是揚母心則閒母體則康體之康矣剃之黃矣我侯燕喜家之慶矣於百斯年鍚福之無疆矣二章章八句一章章六句朝涉篇朝涉美孝子也陳大夫仕為御史贈其親感而悲焉風人美之故作是詩朝涉洪流夕步江臯凱風吹衣游子心勞岸則有藻江則有魚我釣我採薦之中厨昔曳里布以獻以舞今也則亡敢曜斯組繄祭五鼎厥養乃三祿不逮存哀哀孰堪上冢爇黃下冢回首嗟嗟游子行役已久曖曖暮光蕭蕭白楊永懷二人曷也可忘六章章四句圃田詩有序洪隱君者歷下人也有用世之才而不樂於仕仕且及曰吾弗仕也戢居山東習治圃焉豫之不見者十年矣日往來於懷思一見之而竟不得也今年春有客自山中來至京師至京師未久也乃歸山中曰洪子之懷子也甚甚於吾子之懷之也吾歸矣子盍有言乎豫曰有是哉洪子之為移文調我也則幸矣作圃田詩以美之圃有田田田兮宜我碩實連連兮圃之中兮有田可宫我構斯崇維柏維桐曷以弗永終圃之周兮翼翼盈我疇兮疇有秋兮曷其求兮一章章三句二章章五句三章章四句泉之濵哀隱士也泉之濵兮白石磷兮以飲以濯育吾真兮泉之滸兮錫之土兮載濬載渠溉之溥兮人之墜矣泉之匱矣瞻言跂兮衆之喟兮三章章四句山之陽送朱子宜歸省三章山之陽兮有春者暉草之華矣將子言歸山有泉兮㶁㶁其流子之歸矣誰與我晤遊子之歸矣登堂壽母何以贈子曰有春酒五言古體次韻題豫齊扇適意無多言一笑成莞爾我心寒沙月君心古潭水莫作江上波隨風夜中起送别台峰皎皎中庭月照此離客顔月沈㑹有升客去何當還采采園中瓜裊裊不可攀草木本無知枝蔓相鈎環如何宦遊子岐路長間關散如蓬逐風聚如雲在山聚散本莫期毋嗟涕潺潺茗嶼湑湑海氣白楚楚衣冠聚誰開髙奧靈太尉體光貯緬仰世則公樂兹清茗嶼盤谷佳氣何盤盤松柏叢林壑上有大宗祠棠棣華繁鄂始自一人身分此千萬絡宗㑹廟廟貌儼生存妥靈綏後祿水木有本源十輻同一轂四百餘年來因之序昭穆時思堂蒼涼海日曙堂下森蘭玉願言永孝思俎豆差繁縟歲歲薦蒸嘗采蘋清澗曲環翠樓樓前冢纍纍隴上麥青青島霧開逺岫海霞明空庭夜半松聲作凄其不忍聽延月軒松上有海鶴松下有泉石軒中几格明軒外狐兔跡延覽興遐情半窗山月白望雲亭觱沸此檻泉脈自龍湫來飛出兩白龍劃然丹壁開倚亭望長雲從天噴風雷世祀田朝耕髙奧田莫耕髙奧田粢盛戒清酤伏臘擊肥鮮良哉古人意以此奉周旋觀蘇門山圗昔豫祇皇役弭節蘇門山展眺孫登祠薄暮松扉關凄風振林木颯颯流區寰如聆長嘯音來彼白雲間又如見青簑囊琴弄潺湲緬懷沈冥志上與沮溺班一别期再遊欲往途路艱臨圗起遐想延佇久忘還再遊石門洞蒼然郭東山百丈縈青碧石門忽中斷窈窕開仙宅遙窺日月深却轉煙霧隔中天屹樓居星斗掛几席芳巖眩綺繡叢巘圍蒼壁山鬼不避人驚猿嘯窺客披榛上孤亭奇觀壯心魄窮崖倚天懸瀑水半空射髙流橫雜珮直下垂匹帛分作四山喧散為千頃澤初冬天未寒晨曦映嵐赫重來意彌眷獨往任所適信美愜心期胡為老行役終然脫塵網髙舉凌風翮送王內使敬夫歸省以尊甫詩燈花開赤焰喜鵲報清音為韻歸驂慕鄉土欲止不可能朝發華陰祠日夕過灞陵風林散輕雨山店明春燈忽憶舊時路别來如更增蠨蛸綴簷牙遊子行到家鄰里登牆頭顧望紛且譁堂前列車馬堂上生光華何以為親壽宫衣明繡花草堂近終南采蘭日往來兄弟各相勉行歌咏南陔親心日以恱親顔日以開閒時語家慶笑指庭中槐春潭水烟青春岸杏花赤宛轉沙上徑依依記行跡濯纓清淺流還坐舊苔石鷗鷺了不驚遙應識歸客春分酒初熟香滿青門店匹馬隨雙童穿林復經塹夜窗清夢裏花筆生彩焰好是南山靈相尋索詩缺我思何所在乃在樊川沚斜月照虛梁微風動芳芷悠悠抱沈念脉脉感前喜尺練難重持春冰限雙鯉君陂水多魚我湖山有鵲一飛與一潛各自相娛樂同遊京輦下十載鎮如昨昨夜問君行朝來宦情薄君才比天馬髙躅不可蹈我心實亡羊多岐賴君導關山一為别輪軫何時到感激木瓜篇瓊琚愧相報枕書卧南窗月黑燈不明遙夜無近夢深交有遐情鳴琴寫幽懷調苦絃亦清曲罷不成寢髙林啼曙鶯秣馬西送君行行古城陰長亭短亭路千里萬里心春緑變山草連連岡與岑歸林渺烟光倣佛聞車音送陳文鳴鬱鬱深澗松冬夏不改青濯濯江栁花隨波化流萍羡彼五陵客終朝宴芳腥三楚多秀士皓首窮六經誰為尺一書薦之升王廷達人㣘髙義立志不茍同長嘯六合表傲睨一世中君看今日顔不及昨日紅乘運各努力揚休樹德風頽年儻相值跨鶴蓬萊東次何遜落日泛江贈魚司馬之作奉送劉美之相投已盍簪相贈還留帶昨暮長安西今朝苑城外誰言車馬地復得須㬰會會君心暫恱去君心轉切秋岐蔓寒草隱隱烟不絶歸鴈影聮翩墜葉聲騷屑端居尚興感况乃萬里别桂舸泝江湘何時到蠻汭蠻水夜悠悠月明登郡樓幽蘭翠縈渚紫蘅香繞洲應歌楚人詞坐惜勛名浮美之席上限韻送别二首惻惻重惻惻當歌忽成默客車駕雙輪欲挽不可得華燈粲宵焰殷勤照行色月轉庭榭光風起簷樹黑誰能理朱絲為鼓長相憶悠悠清川波矯矯風林翼翼飛邈難止波去何時息憐君萬里行莽莽天南北罹紛有孤操涉逺無近力不見寒松枝歲晚青更直賦得將有事於西疇送王中丞致仕發春驚蟄始土脉動淵泉時雨宵既零浮陽藹平阡夙興飾耒耜驅牛登廣原竭兹畎畝力感彼農父言穡事依東作天時易流愆南鄰有逸夫日晏髙枕眠四體茍不勤何以窮歲年送王叔武使河南便道省覲二首黃河三尺雪冰厚不可解使君白馬來青雲見風采蕭蕭梁園竹秀色遙相待鄒生與枚叟借問今安在日暮登吹臺含情向千載奕奕明農堂修楣耀晴彩堂前春草緑堂上春雲靉遊子日下還宫衣試新綵夕膳飪鮮鱗晨羞薦芳􅉅何以祝親壽如山復如海章氏園餞别升之分得木字中園飛雨過逍遙散遐矚青雲蔭華榱回飈撤炎燠百卉何葳蕤芳菲鮮如沐駕言贈逺人采采溝中緑遲回未終極陽景沉西陸歸驥嘶長林翔禽鳴髙木感物多所思褰裳以躑躅躑躅不可留何以慰衷曲送王盛朝辭雙闕下暮抵三河宿古戍早鴻稀荒城寒草緑上官山吏拜行縣村童逐冉冉松間亭何人伴幽獨秋郊别意為汝南孟翁補作二首驅車循廣術言返故鄉縣晨光一何綺熹微散秋甸宛宛墟曲中盈盈露華泫因之感遊寓物候倐已變豈薄骨肉情遙重桑梓戀桑梓在何許藹藹汝南村緑叢帶長薄清川映柴門言别上春時當秋始來還禾黍一已穫膴膴見髙原落日樵牧歸涼風散雞豚登堂見鄰叟呼兒具盤飱依依丘中情欵欵醉後言即爾足為樂安用乘華軒别劉子二章文車駕四牡迤邐度層阿伊人秉朝憲結綬辭承華飛龍御宸極期運亨以嘉甘霖雨九天皇澤被幽遐顧念囹圄子纍纍誠可嗟憲章茍不渝殱戮豈在多行哉布天惠庶以和邦家昔我二三子弱冠登皇朝並跡協蘭芳聮翩振華鑣朝出長楊苑日夕憩平臯逝矣終遐月綢繆以逍遙顧子邁南江劉侯踰上郊嘉好一乖别馳光倐飄颻臨川睇浮雲結思如回潮次韻贈李子行之如陳迢迢阻歡宴戚戚傷離居離居結中懷鬱鬱慘不舒若人美無度貞抱沖以虛朝為同朝客夕暮隔林墟林墟積秋霖流潦不可除四野晦蒼蒼行行安所如驅馬臨大道瞻顧空踟躇奉送大司馬華容劉公致仕二首藹藹東山雲覆彼山下堂乘時播皇澤從龍彌八荒八荒遼且邈下上以翺翔龍逝鼎湖隂雲歸故山陽何以慰蒸庶私衷鬱倣徨草堂何所有有蘭復有芝采采山之側飛仙相與期寄傲雲霞問可望不可追抗手謝城市去去從此辭徒遺髙世風永繫來哲思為楊子賦别母詩青驪載華轂宛轉度秋坂母氏逺别離客子心繾綣行行采芳蕙緣陔復循畹山風夕飄颻吹我車上幰車行不可返母去日以逺何以保黃髮對子加餐飯追送宗之憲副不及臥疴起恆晏出户客已行征車揚素塵窈窕踰層城行行遵故轍阡術縱以橫望望不見君悠悠傷我情清川回白日可以鑒中誠送沈仁甫歸省二章瞻夕臨廣郊歡宴良須㬰之子駕言返髙登鬱踟躇不惜形影濶所悲歲月踰三江曠綿邈悠悠限東隅征途慎所須願保千金軀品服耀有輝班裳以裼之桑梓誠可戀道路安足辭馨羞潔甘㫖爰以隆孝思徘徊膝下歡婉孌及良時修齡欲有祝永與南山期元夕致仁宅詠燈送别佳辰逼元夕宴語春雪餘梁燈一何豔流光照離袪燈燼可復燃袪解難重拿盈盈江上心感念成欷歔相看已不極相憶當何如贈王文熙五首陽鳥流歸音空堂春風早居人結逺夢行子就長道雞鳴東方白整駕何草草歎息素冠詩繁憂滿中抱總轡城東門綣綣行子輈郊原茂時卉林薄鳴春鳩登髙眺連岡川途邈且修俯睇川上波泛泛鳬與鷗一為離群感淚下不能收昔子往恆山倉卒不我辭朅從恆山至鞶絰何纍纍素室曜朱火哀哀讀喪儀一讀一長號再讀聲轉悲咄嗟荼苦心逝者寧見知逝者為何人實惟子先公往昔涖吾土藹藹多仁風土人至今思譬若考與宗梁木一朝毀傷哉吾道窮對子攬長涕誰謂出無從平居恨迢逺卜舍依我廬如何别我去三載天一隅留之歎無因欲往路崎嶇形影隔參商托彼雲中書不如斯須立暫得話踟蹰再送文熙二首夜久河漢橫春堂别燈黯風凄鳥初動露重花猶斂明發不在兹重關為誰掩離言不可聽離怨不可書一日比三秋兹言良非虛江深雲木逺去去將焉如送縣令代劉永寧作南邦有佳士淳朴君子風登朝十年餘墨綬猶在躬維昔治莆日化與由也同監司匪宣尼誰哉賞其功再命涖恆山冰心晚彌篤豫慚舊令尹有政不可告驅車薊門外把酒燕臺曲大道坦且直一試千里足贈何邦彥花林霽宵雨柔碧光離離美人駕行車迤邐雙輪遲輪遲無終極親愛從此辭何以結綢繆玉瓶金屈巵浮雲暗長路奄忽天一涯窮谷多狼豺水蟄虺與螭客子戒逺道行行欲安之行行欲安之肅肅持邦刑藉藉于公譽峩峩髙漢廷君心如列宿照野何晶熒又如日在空皎皎懸丹扃豈令囹圄子惻惻歸沈冥别熊子三章驅馬陟前阪惆悵送子歸良晤未及終車徒忽已違陰風蔽天地砂礫慘陽暉葵霍不自謀衆禽相與飛五里一反顧十里一徘徊徘徊不可見淚下沾我衣車徒去彌逺言駐澧水陽婉孌諧二親春暉麗髙堂堂下班馬鳴意氣何揚揚暮甘復朝㫖為樂良未央嗟彼時役牽關途遲翺翔翺翔適嶺海路衢悠以長車前建隼旟車後擁干將擊獸須擊虎刈蕭無及芳丈夫志萬里遐逺安足傷顒顒霄漢姿皎皎冰蘖腸勗哉保終譽慰我親故望别湯子五章關途鬱迢逺卉草青已發驄馬何駉駉向風嗚不歇廣隰流春霏層岑翳圎月遲回去不忍引領望京闕京闕邈難覩萋萋蒼樹林沈沈天宇夕靄靄浮雲隂丈夫萬里志烈士千古心鳳鳥久不鳴誰哉繼其音彈子匣中琴寫我心曲悲我悲良自諳子琴知者誰不惜去日早但恨來日遲何當假羽翼送子川之湄驅車井陘谷揚斾汾水流翺翔覽四極迢遰陟崇丘遐陬歷巖巘幽訪浹原疇勗哉利爾涉風湍寡行舟喬木多徑柯直流無反波哲人秉孤操孰云光可和嗟彼黃雀吟感此卿雲歌悠悠向原隰惋惋將如何吳將軍巡關圗戎馬歲南牧漢軍勞北防軍情異主將冷暖須共嘗朝出潮河川暮過古北口邊烽傳羽箭朔氣嚴刁斗月下黑山晴分明見列營霜欺征袖薄石報獵蹄鳴三軍晏然睡我亦倚吾枕天子不可驚長懷亞夫寢清白傳家卷為劉安之題清如渭川水白如太白山邈爾清白人遙在山水間至清不可淆至白不可涅傳子復傳孫一心如一轍山同今古色水同今古流清白茍不變山水同悠悠題白巖畫松圗古松何童童獨立難可羣歲暮倚冰壑偃蹇凌蒼雲修標有逺蔭直幹無曲文匠氏茍不遺寧避斧與斤題楊氏所藏畫翩翩水禽飛灼灼水花亂柔艷雜幽聲紛紛滿芳甸悠悠畫中意潑潑天機新倣佛曽遊處江南二月春題畫空江夕烟斂日色沙上明輕漣漾蘭楫嫋嫋秋風生白雲滿層阿林光帶髙城姬文去已逺詎辨垂綸情題放鶴圗集陶句野外罕人事靈府長獨閒登陟千里餘晨夕看山川山川一何曠亭亭月將圎雲鶴有奇翼一盼周九天但使願無違甘以辭華軒念之動中懷放意樂餘年吁嗟身後名百世誰當傳答顧華玊見懷之作離腸如車輪萬轉不計程咫尺阻言宴何殊在山城閒曹事稽纂文墨紛相縈不見馬上人空聞馬蹄聲攬衣步幽闥脉脉牽遙情屋上春鳩啼樹杪浮雲行坐惜韶景暮江臯芳杜生贈徐子丹棗何纍纍朝日耀其光上有同林鳥飛飛鳴且翔行子逺于役攜手登河梁舊京渺安之江永衢路長戚戚里中語依依川上情駕言往相逐無舟何以航乖離去則已但使心無忘贈友春陽初獻歲芳樹日以青送逺及近郊何由申我情我情方鬱紆君駕不可停瞻彼飛鴻翼聮翩共遐征奕奕雲中河爛爛川上星中願渺難遂佇立以屏營醉中呈時大親丈憶昔别丈人倐忽八九春往年雖暫逢契濶無由伸寒冬陰氣固微陽照廣津送送不及逺千里空勞神今來芳草時言作上國賔青袍耀垂楊移家住京塵吾親適試吏相過無昏晨見母復見姑此樂難具陳佳辰展良宴味寡情則真相顧各躊躇何以序情親醉别勿草草揮手天涯人逆旅中㑹同年杜子廷獻因懷其弟廷陳省元凄然增感月缺還復盈木枯還復榮如何泉下客一死無重生芳筵列時彥栖栖見遺兄昔同賔薦來雙璧價連城今為失侣鴈徘徊哀且鳴存亡一興感四座盡沾纓孤墳背山郭宿草萋以縈死者亦何知綣兹骨肉情長歌欲相慰彌使心怦怦維洛美劉子也劉子仕洛為大夫作室以奉母君子名之曰榮養風人美之故作是詩焉維洛有崇堂宛與伊闕京層構何崔峩仰觀浮太清青雲結懸牗丹霞麗飛甍雞鳴事甘㫖爰以隆孝情定省日在兹致美良匪盈嗟嗟宦遊子百世以為榮榮名本天爵匪直耀圭組之子仕京洛膏澤被遐土膏澤被遐土皇鑒亦孔昭烜烜循吏稱洋洋流漢朝實維慰母心居處良逍遙逍遙復容與降陟在斯堂萱草雜杜衡羅生前後廂循基撫嬰孺登俎挹華觴俯睇洛川流顧瞻嵩與邙優哉樂相樂千春壽未央奉贈少司徒華容王公致仕大谷霽長霖回雲媚山澤流潦豈不廣孰云泥吾軛朝謝司農卿夕為嶽陽客皇眷良在兹行止各有適有適非盤敖眷言反初役解彼府中綬歸我湖上宅葺宇依清漣躋山憩𤣥石幽棲謝生慮靜便終日夕矯矯雲際鴻誰能制其翮贈閻允中郊月隱寒樹喔喔霜雞鳴翩翩隨陽鳥悠悠憚遐征客車履晨發迤邐踰層城清川帶長薄緑蕪萋以榮江路東南馳行子慕修程金陵帝王宅佳麗夙遺名吳觀靄岹嶢晉丘亦崢嶸憑軒一回眺千載有餘情伯川子仕為地官大夫能其官且有顯陟矣一旦思其母夫人解印綬去豫知其必有以也取六義之比賦有兔詩二章以美之有兔何爰爰宅我中谷阿中谷一何邃山石鬱嵯峩修篁蔭清風秋鞠揚其華于偃復于息為樂將如何月明流夕光零露白湛湛飢食野田草困息山石隂物性有固然衛生良已深不見虞人罝肅肅施中林答石峯見懷之作斗柄當西南河漢東北傾零零露華白晶晶天宇晴微風度廣陰熠耀時復明卉木日已黃秋氣日已清念子理素瑟苦調多離聲嗷嗷失侣鴈泛泛隨波萍會合固有期此際難為情露井梧桐凋杳杳秋夜涼眷言懷美人展轉何能當纎月掛西牗微明照我床皎皎瓊樹姿寤寐如在傍近離已不堪况乃途路長誰其縶子馬慰我心倣徨寄弟賦憶爾别我時日照河邊栁痛哭别我去上馬猶回首知爾愛我心不殊足與手徘徊望行塵佇立沙上久弱弟復多病相思傷我神爾須為孝子吾已愧忠臣膝下三春夢湖南萬里身晨昏甘㫖暇休對說烽塵戲簡王臨安同年候子虎溪渡送子龍陂橋出城不相見征蓋倐已遙百金買江魚千金買春酒期子會宜城飄忽過潼口追子漢江曲望子峴山頭子有室家好豈知途路愁暮投城外寺急雨響髙屋安得與子同長歌對銀燭子程勿早發吾駕亦早留風塵莽南北一别動經秋右揆鄒公由齊入閩齊人有華泉子者與公友抱病不獲出餞作詩以遺之懊惱復懊惱雞鳴一何早病夫掩關臥遊子就長道姢姢窗中月照見窗下草室邇人遂遐離憂坐堪老黃鸝鳴樹顛嚶嚶求友聲佳人逺言邁牽我幽思情思情何綿綿綿綿復縈縈出門望軒蓋道阻不可征靄靄山氣浮晶晶川雲平鴻鴈方北飛誰哉達中誠華輈耀朱斾宛轉凌春山朝辭鄒魯鄉暮過梁宋間美哉南邦化夢寐開心顔丈夫四方志車馬胡暫閒綣綣東人懷何時復來還榮恩介壽詩為陳矩菴中丞乃翁作中年謝簪組將以遺世榮晚歲沐崇恩封誥來承明金章既輝霍豸冠亦崢嶸升拜天子光閭里咸震驚悠哉顯揚志爰畢遊子情白雲何飄飄覆彼白下門遊子限江郭登望窮朝昏孰云三品崇能報罔極恩休光燭遐土膏澤被元元庶以立修譽永播乾與坤乾坤蕩無極客子日行邁永懷將父吟陟岵發潛慨閒登楚丘望長川皓如帶髙榭鳴涼蟬秋風起江介煙中樹如薺隱隱見吳會吳會有髙樓上切星與斗北牗臨𤣥湖南窗對鍾阜樓上一老翁皤皤垂白首服食皆烟霞圗書是賔友雖為中丞父何異商山叟誰歌難老篇願以祝眉壽貞壽詩水上雙鴛鴦一失無再偶良人棄妾去白髮閨中守竹老有古節松老無柔枝峩峩青山石萬古色不移誰為貞壽歌請君歌此詞賦鶴翎扇壽江翁白羽白且鮮製如秋月圎青雲相與媚皓雪避其妍出入仙翁手逍遙以蹁躚招彼蓬山侣乘風下芝田萬壽同所歸飛飛凌紫烟劉克柔迎養二親乞詩為壽以人生七十古來稀七字為韻人生有良願莫如翁姥健生兒無令名雖壽安足榮七歲燕山道重來見秋草十月到官衙蟹肥霜菊華古稱逺遊苦今知逺遊樂來去何翩翩雲中度雙鶴稀年具慶稀勿輕萊子衣西臺遺恨為吳克學御史作晏眺當沈暉南山正巍巍孤子天涯心邈與哀鴈飛鴈飛各有止孤子心無依念彼堂上親喬年鄰古稀經時客梁宋苦恨溫凊違何知變故來繡服更麻衣整駕返初轍灑淚臨江圻人去秋堂空凄風吹繐幃嗟嗟宦遊苦不似前時歸稽勳馮子佩歸治祖墓油油上谷路颯颯秋風起落日客子歸寒烟滿墟里墟里夕燈明臨堂哀淚橫無復報劉日空陳李密情攜兒負畚鍤自闢山中土坎坎徹下泉雙棺閉幽户幽户不重開向山髙築臺他時華表上應見鶴飛來城東尼寺哭妹三首佛居峻且𤣥中有嘉樹林驚飈隕其芳柔葉垂廣陰青陽詎能幾朱夏奄相臨一為生死哀感我涕盈襟生為同胞親死為異域魂魂升不知返親斷有餘恩列几陳羞飯芳醪湛空尊陰風吹薄帷慘慘白日昏徘徊復何見惻愴難具論平生處閨闥不識門與逵孤魂蕩幽邈廣野將疇依舊國踰山河反葬路逶遲寥寥禪宇空亹亹芳序移死去長已矣徒令生者悲次東卿韻挽北村秋官昔我師事公公以我為友長安車馬地相從十年久如何永潛翳冥卧西山畝敢謂涕無從離離滿衣袖喔喔雞亂啼皎皎月在牆立馬古城下長歌盡餘觴咄嗟霄漢姿今返冥漠鄉公昔較我藝弱冠舉於鄉公子復青年探花冠羣芳浩蕩雲中衢接羽相翺翔思公不可見斷絶我中腸我才踈以拙應答多後時長懷隴頭吟負公十景詩公今卧泉壤隴樹生新枝何意述德篇翻為斷腸詞昔公謝病居坐卧釋子牀藥物雖見親書帙猶在傍中宵激昂志江漢相與長哀哀七尺墳漠漠春蕪荒經西湖皇圍寂修夜馳路直且長𤣥湖貫其北流水何湯湯孟冬寒氣交原野下微霜衆芳各以萎鴻鴈哀南翔俯視清川波仰看明月光涼風吹我衣俯首思故鄉故鄉不可返攬轡止倣徨天壽山行石門凌旦啓馳路直且長青山白雲合四顧鬱茫茫蘋藻秀空澗黍稷亦登場哲王敦孝理陵邑事秋嘗豫本草野士謬職參奉常敢云俎豆嫻亦已閲星霜縈回度墟曲宛轉厯岩岡蒸嵐侵我肌零露沾衣裳沾裳詎足惜鴻私難可忘入罐石口四首濯足秋澗水水寒清見沙凌兢不可渡碎石如狼牙童子欣暮晴笑指東峰霞穿林復渡河佳興未能盡每當路窮處更著祠官引山女何處來石上洗秋菌西登罐石口鳥道不盈尺連山樹如繡雲中日將夕不聞樵采音但見虎行跡睥睨接崇嶺白處生浮嵐上有百尺崖下有千尺潭爾非豢龍子那敢窮幽探庭臯清露下庭臯蘭缸照虛牗幽人已復醉更酌尊中酒登登髙城柝深巷鳴雞狗夜久不成眠倚䦨看北斗西軒詩為襄垣府將軍作朝光麗朱邸夕雨明緑芳陽休一何嘉顧眺臨西堂西堂鬱以邃杳杳塵務絶右圗復左史回翔盡髦哲宛轉膝上琴窈窕鄴中吟吟以詠我懷琴以宣我心淮南建黃屋梁王闢東苑侈縱匪不娛終以冒皇憲皇憲不可冒侈縱不可延美矣王孫德永兹黃髮年七言古詩分韻得嶽字送邢侍御出按秦中函谷關頭雞喔喔驄馬凌秋向西嶽嶽前石子何犖確繡衣侍者斧在握冠上神羊峩一角西抵龍荒北幽朔百二河山眼中邈渭水清清涇水濁須君激揚無憚數贈陸文質歸雲間橋西落日橋東虹碧烟黯黯秋正中九峰仙客泛槎去鶴氅虬髯吹晚風槎頭乞藥人如市共說神方能起死海上傳來語不虛青蛇本是龍宫子月光星影動銀灣河鼓天孫指顧間長安亦有君平肆莫避雲濤隔歲還題程時昭所藏畫鶴圗程侯手持雙鶴圗索我為作雙鶴篇髙堂展玩羽翮動碧落青丘如眼前丹青爾何人天機入幽渺斷霞殷殷江日曉雙鶴如人立松杪跂者自跂鳴者鳴華亭遼邈緱山杳宛轉如思珠樹林蒼茫誰識九臯心吳王郭裏秋塵滿漢帝壇前春草深西山玉臺不可見東溟金竈已難尋吾想丹青人前身恐兹物華表歸來氣紆鬱五里徘徊月中宿不然形神安倣佛程侯程侯霄漢姿三春作郡楚江湄休令怨唳分行去化履升雲會有時贈張氏汝吉汝誠兄弟魯川何迢迢太行亦蒼蒼行人躍馬出門去何異飛鶴東西翔愛君此行飲君酒君家弟兄古未有夕郎清迥雕鶚姿秋曹盤礴雷霆手朝論同歸攬轡年家聲况是埋輪後青春衣繡下中臺山東山西花欲開休嗟羽翼經年别早喜陽和及草萊送欹湖赴湖南提學征旗帶落日出門君已遙層城不隔夢夜度盧溝橋盧溝橋邊山簇簇故人卻在城南宿誰令相見轉多情翻恨遲行不如速江漢風烟遲早春關山雨雪暗邊塵臨岐莫動殊方感豫亦東西南北人遊三巖洞括蒼山叢紛阻修我來處處歸冥搜南明雙屐始著地探奇又作三巖遊三巖三洞神仙府重門窈窕煙霞古山鬼終天護祕文巨靈何代煩神斧鸞驂鶴駕不可尋飛蘿懸蔦自陰陰揮杯獨酌巖中水一片清冰澄我心丹丘碧海尋常是嘆息終年在城市便擬稽生著絶交長向山中訪松子題髙軨畫竹武陵豪士仙中人清和灑落無纎塵平生富貴不足道筆挽造化回陽春坡真可妙最堪惜老息森嚴露形迹鷗波亭外寂無人五雲山氣凌秋碧山氣凌秋勢薄天凝雲挾霧快騰騫巉巖峭壁幾千仞此士直欲窮其巔從來能事不受迫醉裏蘭亭難再得東君此幅何自來千金寶劒連城璧枝幹依稀叢葉同天機妙解却難工就中一片飛白雨爛然琢玉寒玲瓏蹇豫最好瀟湘景見畫令人發深省曲處疑聞爽籟生深中似覺陰風冷半窗疏影和醉眠斑管春寒詩思牽玉蟬冷吸鷓鴣露文綃細簇玻璃烟却思鄉國頻相見自謂相求當不厭嗚呼豪士不可追何時為掃鵝溪絹送董生歸四明昔年見子黃浦上義手向人持禮讓石麟天馬驚殊相今年見子披雲樓珠樹凌空劍倚秋乘槎歸作廣寒遊杏花香裏櫻桃宴草色羅袍碧於澱明年此地重相見送秦用中文學玉真臺下三間屋屋後有松前有竹廣文先生雙鬢秃長對青藜夜深讀有時不巾亦不服獨跨瘦驢攜短僕五老峰前看秋瀑有時芒鞋步江澳月落詩成江鬼哭石底流泉手親掬歸來煮茗窗下宿清夢蘧蘧謝粱肉鳥聲墮枕猿掛木紅日三竿睡初熟食罷曉盤歌苜蓿為剪溪雲封尺牘長安故人勞逺目送錢士宏監稅杭州城頭旭光翻早鴉水部使者驅行車行車悠悠向何處未到行曹先到家行曹去家餘百里檇李西來岸如砥吳岫雲連越岫雲西湖水接東湖水鄂王廟前春草青蘇公堤上花冥冥炎州逐客應相别想見鴒原萬里情孺子宅送程南昌豫章城南髙士眠豫章太守榻常懸漢廷使者召不起土室蓬門江水邊江水悠悠朝市改故國荒涼宅安在墟里遙看變夕烟墓田誰為羞春􅉅使君五馬雙朱輪露冕乘春意氣新下車先問南州客恐有當時下榻人醉中贈王少尹陽城少尹才且賢佐邑三載名流傳相逢盡道是青天惡少豪徒不敢前松庭人靜春草芊邑中老幼髙枕眠政成奏績來日邊聲光赫赫誰能先冢宰見之呼少連大書上考朝廷宣長安雪梅開早年手捧尺檄别我還城館寒燈開夕筵銀河掛窗山月偏欲醉不醉心茫然天明一笑上馬去他日重逢赤黻懸贈尚子意氣憑凌一當百關西儒生五陵客少年學書復學劒老大蹉跎雙鬢白門下諸生半賜麻閨中小婦猶炊麥布衣東來謁天子春日醉卧長安陌陌頭花絮夕紛紛瓊閣如天隔紫雲浩歌翩然却歸去眼底誰是平原君壽許太宰明公昔乘御史驄問俗直過東山東海底鯨鯢失巢窟草間狐兔無留踪明公今曳尚書履手握星樞正天紀詔草親勞主上裁蒲輪特為蒼生起白首兼持將相權中朝五福幾人全威加朔漠三千里身繫安危四十年明明衮職誰能補籍籍人稱仲山甫不獨芝蘭滿徑庭盡看桃李填門户桃李陰陰壽域開帝垣西畔接蓬萊朝回欲致長生祝笑對南山歌有臺挽聽竹山人江雨夜合涼雲秋江翁騎龍上天遊玉棺沈沈土門閉江翁只葬江頭地江頭苦篁風葉老下有巾車往來道相逢啼殺感恩人淚濕斑花愁不掃斑花自濕人自哀江翁一去何時來烟波冥冥渺千里空托招魂賦湘水吳將軍轅門夜宴圗營門花發春酒香濃㸃駝酥炙黃羊美人嬌歌健兒舞蠟鳳啼風月當午髙簾飛幕絲吹騰觴波櫛櫛梁雲凝主人醉眠客不醒探兵枕戈戍煙靜華泉集卷一
