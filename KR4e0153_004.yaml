body:
  text: 華泉集巻四明邊貢撰詩集五言律詩送李司務思善二首可怪皇華使相逢九日過地偏秋鴈少天逈莫雲多北渚青簾舫南山白玉珂未能同一醉離别思如何蘇門形勝地往嵗憶經過書院青山近仙潭赤鯉多月中攀古樹雪裏並逰珂六載重携手清尊柰爾何送殷近夫謝病歸夀張二首論交方恨晩為别更匆匆風雨深期阻山川幽恨同杏田淄水北草閣汶陽東鄉路元相近清宵有夢通並居城下陌經嵗往來踈薄宦惟多病窮愁有著書春山懐紫蕨夕浦悵紅蕖去去仙蹤𣺌何人伴索居送徐德章乃翁春㸔燕市花秋返晉陵槎水樹侵沙濶江雲隠驛斜夢依南國近書寄北關賖坐惜薇郎苦遥心附海霞送于時宜行子對新月臨堂酣且歌客衣寒未減鄉夢日應多魯甸封春草淮川𣺌夕波芳音托囬鴈迢逓柰情何留别王生天際隂風起浮雲似馬行飛揚亦何意離别秪關情古岸垂楊合長河暮色清何時畫舸背樽酒說平生送王演之二首送逺臨河涘蒼蒼夕景微雲山望不極書札到應稀磧暗風沙起春長旅鴈歸秦關百二阻何處换征衣驅車度宛洛歸路及春深杳杳還家夢悠悠去國心青山臨古渡白日下豐林憔悴逢漁父應為澤畔吟送矩菴中丞荆楚連年旱今冬雨雪頻膏融厚土徹緑迸早禾新烽火千山息謳歌萬室春中丞調爕手争道㨗如神别伯玉君行不相見卧病對春風世事浮沉外交親感慨中古臺燕郭暮流水晉祠空他日歌招隠青山有桂叢送友十里黄岡道萋萋露草繁青驪將客子白日過鄉園水國春先到雲程鳯獨騫行㸔魯儒化流澤被元元贈别寗子風度與桓典勲勞更伏波明珠騰謗巧驄馬避人多白日就長道清秋凌大河非關燕趙别相送一悲歌送劉希尹入髙邑省親朝夕夢親顔驅車西出關青雲深魏闕白日照恒山麥秀城池古人居井邑閒秋風扇枕暇璧水遅君還送伯川子歸吳二首東門嘶馬去幽志幾人同問寢歸吳苑含香别漢宫關山雙寳鋏江海一秋蓬欲覔南州信時㸔西北風舊國江村外清川繞舎流空聞賦招隐不得泛同舟雨暗膠山寺花明愛日樓遥憐相憶處落葉薊門秋送陶良伯使魯府天馬玉花驄騎來天廐中言經汶陽道却過魯王宫岱嶽浮雲外蓬萊碧海東飄飄鸞鶴侣仙駕與誰同送楊純夫天府通新籍毘陵返故居三春辭北闕幾日過南徐岸栁隂隂接汀花冉冉踈江流日東下何處覔雙魚送趙體仁侍御改官問子今何適時危路且艱豺狼潜未及驄馬去難攀暝野雲藏日秋林水接灣病夫門不出心度萬重山七夕夜雨送父囬家感而有作感懐逢七夕况是别翁時天上夫妻㑹人間父子離夢疑青鳥下心逐白雲馳幾陣芭蕉雨蕭然鬂欲絲送張仲齊侍御還京二首上國埋輪後東山攬轡初世方驚豸角吾已識龍顱古栢凌蒼漢清氷照玉壷千秋桓典駕驅逐有人無繡斧明霜日川原指顧中才真堪作雨名不愧觀風狡兎移山窟𤣥狐隠棘叢城隅一片石他日比羊公送張廣漢中丞觀軍留都二首聞説狼山下江波帶血流中原初息戰諸將各封侯草緑西興渡雲生北固樓經過弔陳迹春日暫停舟二月金陵道中丞擁節還日光揺組甲春色映江關國壯軍容整時平武畧閒坐㸔龍虎氣長繞鳯凰山送陳國充内弟赴京師卒業千里携書劒觀光入上京外親無我厚宅相有君成細雨官河暗垂楊客路平承家仲氏在休戀倚門情送韓石泉赴德州兑運細雨空城暮㳺雲㪚薄隂落花春晩色芳草病餘心夢接官曹近秋生國計深林中與水次誰伴獨行吟留别柴子相憶恨長道相逢驚白頭又為千里别還作幾年愁故舊天涯少勛名世上浮不堪風雨夜虚舘對新秋留别張西盤大叅二首苦戀三秋别還為十日留江湖宋玉感風雨杜陵愁墜葉鳴沙岸寒雲抱驛樓河梁阻携手誰與賦同舟滿酌豈辭醉未行先憶君山城稀見菊關樹不開雲地入河源𣺌天連塞日曛那堪北來鴈偏向别時聞贈張生下第還金齒三章逆旅嗟同病相逢罷舉杯别期驚嵗月壯志感風雷路險三湘隔心遥一鴈催可憐蘇季子還着敝裘囬北風吹獨騎萬里向西南沅水三秋雨偏橋十月嵐蘚碑懐蜀相花筆夢江淹好把山中屋重題捫蝨庵聞道棲遲地苔香澗户幽嶺猿相旦暮山月自春秋詩畫稱三絶圖書富九流秪應嵇阮軰與爾得同㳺送王子兵備江西二首舊隠辭函谷新章出漢闈碧山留豈得芳草怨相違簡㧞皇心注升沉士論歸傳聞拜恩日猶著賞功衣盖拂匡廬過㠶飛蠡澤深三秋持斧日萬里渡江心虎豹潜移窟牛羊廣出林秪應臺栢下端坐聽鳴禽送翟給事廷獻冊封周世子還朝兼赴昌邑省覲三首冊命臨中土恩華接上台雪明朱閤麗風引翠簾開漢使鳴環入王孫露冕來星槎曙嫋嫋欣傍早春廽登髙逢嵗晩把酒悵多違塔日霜逾静巗花雪且肥家從東海過天向北辰歸可道親心悅宫袍是舞衣諫客劉栖楚詞人陸務觀舌存應不慮盟在可須寒賦頌名天下封章草夜䦨稿成湏寄我歸向魯門㸔送楊希顔省墓還聞喜兼柬秦長史劒裝喧皷吹春日過鄉閭夢繞松楸逺心傷雨露餘里門妨躍馬宮錦煥飛魚若見秦淮海應傳寄别書送楊文紳司訓玉田東郭漁陽路南風幾日程客氊春草色僧寺晩鐘聲山認盤龍狀州傳種玉名關西舊衣鉢留取付諸生送王景暘長史還周府駟馬薫風裏中州路不賖雨深梁苑竹春老汴宫花親榻分羹美玉筵設醴嘉五雲廽首地不似賈長沙送楊伯玉子南歸孤舟風雨凉江客下江鄉嵗月吟邉晩烟霞夢裏長釣溪開蘚石書架拂芸香霜落南垓冷何人共采芳送周司業祭掃還臨海二首客夢驚霜露鄉程入𣺌𡨕地連霞嶠赤天接海門青澗藻充新鼎碑苔蝕舊銘秋墟滿狐兎何處築思亭赤䦨橋上路千載一青衫家說編修里人驚樂正銜聽泉過萬竹㸔月歩雙岩寂寞成均地春風早掛㠶送匡敬夫按貴州嵗晩神京别何時到鬼方雪迷山驛冷雲接海關長去住新驄馬封題舊皂囊遥懐征戰地幾處有耕桑送趙叔鳴監稅德州二首蕭蕭征馬嘶送客過前溪故里别來久家書空復題青山鬲津道平楚衛河堤它夜幽尋處應知夢不迷東赴海陵倉移家别帝鄉政繁輸轉地官古度攴郎問寢椿庭近廽舟蓼岸香秋來客愁少風景似維揚送董舅氏暑雨曉初晴山泉落澗清一杯燕市酒千載渭陽情隴月牽遥夢江花伴獨行亂蟬無意緒争向别時鳴東阿留别無涯孟子逆旅相逢地春殘花事稀同憐在逺道且復换征衣碧草連村暗青山四郭圍欲旋歸去馬還逐使君歸送鄭雪齋秋官歸閩中識面沉憂裏重逢旅病間應縁著書癖且作泛舟還雨色含青栁江流繞碧山東門一尊酒咫尺杳難攀送客怪爾湖南使風江晩繫舟遥經十載别剛得寸時留素月明寒浦蒼山隠暮流水鷗嗟未及雙泛寡離憂趙麗卿豸史座留别限韻聽雨罷彈棊蒼茫生逺思遥應白門栁飄蕩緑烟絲旅跡江花笑歸心海燕知倚酣方戀别休誦渭城詩别周子賢僉憲身是外臺佐心蟠中秘書杜陵元自許桓典或能如夢結三湘外神交十載餘同舟忽判袂愁絶廣川墟送吳學正之留都武學振鐸敷文教遷階得武庠講筵環胄子官舍接宫墻樹隠臺城古江連石埭長相期共臨眺嘉候及重陽送别菊泉胡子寒聲下木杪送子一酸辛白日川原浄髙秋皷角振來㸔南苑雪歸憶上都春懶聽陽烏發嗷嗷青石闉廣川舟中與東橋酌别次韻三首汴上一為别漂揺十二秋那期衛川涘得並李膺舟月映青山出波涵碧樹流接宵歡逹曙不為酒尊留共脫風前㡌還披月下襟乾坤萬里别江海十年心越鳥枝難共湘魚帛易沉相逢畏相失延滯緑溪隂愧我蒹葭質倚君瓊樹姿遥憐共飄泊且復笑栖遲秀句推先逹髙言戒獨危江蘺照雪月秋谷有深期卧疾柬别孫性甫二首杳杳關河客盈盈一水間那因各抱病遂阻共開顔雨入青簾細雲移碧樹閒含情送遥矚時見瞑鴉還舊典司畨禮新乘郡守車問名俱不沗遷秩定何如父老㸔行盖君王想諌書徴黄㑹有詔早晩下宸居張秋官元德席上留别春日江陵去烟花萬里途山川留故郢舟楫帯三吳樹影湘流轉猿聲峽月孤郡樓登望夕天北是皇都送曽世亭兵備赴蜀聞道霜臺使親承岳牧恩山川増氣色草木藉生存拂暑辭東郡先秋過楚門江皐有芳杜作意待王孫鸚鵡珍鳥來清夏芙蕖避緑衣苦遭鴉並嚇羞與燕同飛整翮身仍阻能言意且違何當即開鎻放爾隴山歸東塢為李户部貢卿賦舊塢濃花發新春旅夢懸醉吟朝雨後醒坐夕陽前摩詰才堪比右丞輞川有辛夷塢随州句可憐劉長卿有花塢夕陽遲之句山禽傍精舎來往正翩翩雪菴大雪乾坤閉開窓且静觀偶然同卲子不是學袁安數在梅花得春從太極㸔憑將畫前易一問㶚橋鞍昌平舘寒食煙花暮傷歸復旅逰芳尊不相對華舘坐悠悠月細光疑晦山空響似秋老親垂短髪計日向西州公舘即事呈彦卿赤日下庭角白雲生晝隂彌因吏喧屏轉覺道情深樹䕃依鄰借蟲聲隔水尋廽驂淹薄瞑相遅在同心李月輝方丈二首雞犬不聞音仙家巷陌深洞簫吹赤玉丹竈化黄金庭逈秋花寂堦寒夕雨沉願傳方外秘勿使嵗華侵秋林積雨晦晏坐失朝曛地似通勾漏人疑是少君依依歸洞鶴冉冉度窓雲預恐重來日花源杳不分雨中憇雙泉寺野寺臨官路山門俯近郊閤虚鐘梵寂院静薜蘿交宻雨沉蛛網閒雲擁鶴巢故人詩在壁惆悵隔衡茅壁間李子題詩十六日再至寺十日重來此登臨興轉幽老僧烹石耳留客坐山頭隂洞生雲霧陽坡㪚馬牛翻嗟出城晩不值菊花秋静海寺窈窕城連寺巉岩石抱亭洞虛雲氣白厓斷草痕青寳匣封宸翰珠花絡藏經廽翔不覺晩歸馬傍春星倫上人院晩坐次白湖韻過雨禪房寂松筠一逕遮梵筵青瑣珮香竈碧山茶鶴静欹寒水僧閒數落花詩人類迂僻乘興即為家九日登千佛山寺五首南山空崒嵂野老倦登臨城郭千年迹雲霄萬里心夕隂涵積水風葉下長林短髪新來白黄花不可簮亭午客先集憐予遅出城吏當青塔候僧下碧山迎奕譜傳新勢騷壇講舊盟洞泉秋不冷好共濯塵纓石壁青含雨松臺逈入烟悶隨天上客閒訪洞中仙菊采芬芳蕋詩留酩酊篇重逢倘萬一携手話茲年窈窈寺門敞蒼蒼山徑微風輕不落㡌雲近忽凝衣背領丹楓直垂岩紫菊肥晩途喧葆吹輿醉出林霏半巖風且急衝雨下山難醉後還騎馬狂來不正冠隂隂南國暝淰淰暮秋寒預想茅簷際迎門稚子懽十月六日逰千佛山寺亭午登山寺淹留夕未歸凉風起髙樹落葉滿僧衣城郭寒烟聚樓臺暮景微京華十年客愁絶賞心違入寺共邀黄鶴侶來問野狐禪日出山中寺風鳴樹裏泉落花空色相啼鳥伴幽𤣥莫叩輪廽事吾生自有縁出寺雞鳴春日曉鐘落上方幽樹濕雲猶住山空翠欲流酒床隨客去詩草付僧收虚羡岩栖子塵鑣不可留夀孫萬户母嵗嵗稱觴處將軍此舊庭玉函開寵誥紗幔叩遺經徑茁宜男草簷垂婺女星白頭真入畫長對曉山青夀程良用父雅尚陶洪景風流顧辟疆名傳天北極家住水中央晩日明花宴春雲護草堂髯郎歸節美衣繡出明光夀文孔暘夀域開梁苑韶華逼艶辰月臨春舘静花簇夜筵新鶴信傳西母鸞簫樂上賔轉憐多病客髙枕獨懐人何圌樵夀五月十五日勝地三茅北嘉辰九夏中夀尊浮海月樵唱落天風席近紅榴艶庭深緑桂叢遥憐爛柯者仙籍㑹相通題秦國聲為廼翁卑牧夀巻二首江門閒起坐白髪照秋山花擁宜人珮蘭分稚子班天恩來鎖闥星信報銀灣笑㸔東林鶴傳書海上還池舘山中舊風光畫裏新澗松同雨露江草自冬春犬吠當林塢花明隔水濵遥疑姓秦者莫是武陵人夀康對山母垂栁䕃香車西園春雨餘夀多從入老身徤欲凌虗紫鳯雲中誥青鸞海上書近臣兼色飬何必賦閒