body:
  text: 華泉集卷三明邊貢撰詩集五言律詩吳節婦風雨屋蕭然孤燈四十年家聲越國後心事紀姬前行入先皇録名垂太史篇溪清石不轉寒影照娟娟送周判官一官成晚嵗共惜子雲才驅馬國門路北風聲正哀山形橫塞起邉色映空來感慨登臨處殘陽照古臺送張進士孔昭赴南刑部春風揚子渡江上雪初消草色連三月山名記六朝白雲官舍近紅日帝鄉遙欲寄西來信秦淮有落潮送鄭徴之還濟南晝錦人爭羡居官不離鄉地親王子貴衙對佛山長珂馬春情逺稱觴午夢香相思有南鴈瑶草寄新芳送康狀元乃叔上舍生還武功武功山路渺西去雪巉巉里布儒生服郵車使者銜上堂修典册登隴拜松杉記取龍頭事鄉人問阿咸闕題久客便醒卧逢君一舉杯后山元苦節同父舊多才雨映三更燭春飄二月梅重來話相訪好記鳯凰臺二往往風雩下行歌大雅篇青春逢此地白髮感流年岸栁村村合江花處處妍到官多暇日一訪謝公泉和張內翰見寄韻爾向家山去休歌蜀道難乘車真得意戲綵足承歡劍閣留詩草亭溪把釣竿玉堂回首處夢繞五雲端馮吕梁惠詩率爾酬贈兼謝藥草之惠髙情馮水部相見示新篇鐘磬懸清廟瓊瓌落九天色流湖岸荇香襲楚臯煙更謝金光草扶豫衰病年臨清舟中寄蘇三泉水國逢君壽秋花蕩客船河流動顔色鄉土接風煙天地青尊外光隂素髮前吾愁隨日長叨祿漫多年送曾世亨兵備赴蜀九秋三峽道萬里一舟孤夜渡劍門月波光搖湛盧詩論青冢恨恩返緑林逋嵗晚東來使梅花肯寄無夜中不寐登樓有懷逺漏連踈柝山空夜寂寥地看鄉土隔書寄美人遙海氣含春色江雲入斗杓濼源橋上栁應有拂闌條送黃北川赴京黃子黃門客青春上國行風塵遙入望邉塞獨關情捧日雙龍闕看雲五鳯城懷中有短疏知欲請長纓夜訪朱應辰啓閣懸燈坐霜天夜轉幽居然剡溪興何異竹林逰水落江鴻去城孤海月流重逢好相憶紅蓼白門秋寄弔松江周翁不見南溪老蒼茫二十秋浦雲空北望江水自東流已化遼陽鶴猶疑海畔鷗存亡一掬淚何日灑林丘解印後病中書懷二首留别南都諸同逰勑放青山去恩同碧海深靜居諧始願孤往恝冥心已破槐南夢何須澤畔吟我鄉多水竹蒼翠想森森二一别齊川路兩年今始歸久知麋鹿侣遙待薜蘿衣洞古龍還在林深鳥不飛入山城市隔從此迹應稀過吕梁解纜洪流樹侵星過吕梁風雲猶帝里山水即吾鄉硯拂秋嵐濕衣沾曉露涼長年欣暑退伊軋棹歌長澤國新秋爽玄雲起北溟衣冠逢水部風雨謝山靈雅意堪留滯清詞足典刑夕舟兼曉榻談坐憶蒲汀送王分司因過白塔寺飲九日登髙興三秋悵别情重携一尊酒此地共君傾塔湧浮雲暗山銜落日明還將紅樹色遙送海東行登南明山石磴抱雲回髙髙積翠開蒼藤昏古殿碧樹隱仙臺鐘鼓三天下風煙萬壑來不知千載後誰憶此銜杯二地僻無人賞靈山逈獨看石梁橫險絶巖洞倚髙寒靜已忘塵世狂猶繫冗官長歌送西日野色上虗闌南都送道士自君辭白下靈悟入玄冥始信虗無外元來别有經乾坤寄水火離坎走雷霆兀兀眼前事真如江上萍春雪怪爾陽春日凄凄晝雪寒情知飛絮假還當落梅看向日偏縈户隨風故繞闌同雲幕千里吟坐憶長安分賦春雨得時字為愛西堂雨黃昏坐不辭礎䀶移榻處池漲捲簾時瑞紀農官頌題分水部詩客車何日返真長故山芝九日白日寒城暮清秋畫角哀地偏妨采菊鄉逺怕登臺鴻鴈天邉去風雲塞上來故交零落盡巵酒向誰開次陳靜齋九日二首山水留佳賞登臨夙有期却憐重九日空讀汴臺詩卧雨情無那停雲思欲癡夜深還秉燭間對菊花枝九日逢連雨賓朋屢費邀實孤黃菊盞虗想緑雲簫蟋蟀聲逾近梧桐葉盡飄喜聞歸不逺旌節候來朝九日登吹臺次毛侍御韻對酒重陽雨登樓萬里心異花開晚節羣木秀寒林鼓角連天暮風雲接塞隂王師捷何日傾耳北來音春暮骨肉俱零落還家不似歸自傷真塊處誰更遣花飛雨揠春苖病風摧旅鴈稀飄飄木蘭楫吾欲泛東沂頥痾清源中秋罹雨宵分言霽短音寓懷隔嵗鄉關月中秋想一看真愁白髮顯翻隱碧雲端桂影流煙濕金波映浦寒雞鳴興不淺吟酌細憑闌正月七日飲敖水部分司歸即事結舍臨江岸傳觴感嵗華偶同人日酒翻滯使星槎水凍仍餘雪林寒且未花醉歸燒短燭髙枕聽昏鴉寶應元夕飲朱升之舍望望平安驛春行路不遙故人還此地芳序且元宵水近潮通閣燈寒月過橋計程拚取醉佳賞更須招供事長陵爼豆薦春芳東陵晝漏長偃松盤古榭靈草秀虗堂日月皇輿逺江河聖厯昌因山昭儉德千載頌文皇望陵二首徙倚東峯下西陵望鬱然玄宫深閟日玉座逈浮煙風雨清明候乾坤正德年攀龍無處所空有淚潺湲憶在先朝日曾沾侍從恩鸞輿歸寂寞鳯質儼生存夕日昏阡樹春風長澗蘩祠官如可乞長奉泰陵園過夀陵故址景帝臨馭時自建尋毁之玉體今何所遺墟夕靄凝寶衣銷野磷碧瓦蔓溝藤成戾崩年諡恭仁葬後稱千秋同一毁不獨漢唐陵西陵訪王給事汝溫不遇時汝溫督工泰陵狂夫多野性春到每思家却訪山中客還逢水際花薄雲隂古殿鳴鳥聚連沙迤邐回溪晚西陵月正斜逰玄福宮福地盤青甸香臺倚紺雲材分龍藏寶功就羽林軍洞客修丹籙山靈護敕文願資玄教力千載翊明君泰陵供事述感五章陵墓三年道重來七月期山河不改色霜露只增悲世想欽明德人傳顧命辭九齡如帝與端可致雍熙恭已班虞舜求賢越武丁心猶在邉徼夢已隔泉扄永作千秋别虗傳七日醒夕廬齋沐所倣佛見遺形象設徒虗傋龍逰竟不還勳華留率土精爽寄空山石錮金泉黝雲棲碧殿間寢園如種竹應有淚成斑皇寢居庸近山深地轉饒雄關三鎮鎖幽府百靈朝堡堠烽全息屯兵甲半銷帝心遙可識終古絶天驕午夜祠鐘發千官集廣墟遂看除禫服那復見宸裾長隧通玄壤明樓瞰紫虗松阡回望裏風雨泣漣如下陵二首露行踰十里夜黑四巖隂不辨雲霞色惟聞鐘磬音塹鴉翻列火山鬼嘯空林欲下西陵路前溝水正深窈窈山徑僻喧喧徒御歸馬逢危石住燈入古林稀樹密全妨蓋雲寒半濕衣紅門知不逺秋角聽依微望孝宗陵泰陵今在目突起茂阡西宮殿青霄逈松杉白日凄坤墟符帝宅山壽與天齊黍稷明年祀重來路不迷郊壇夜步晚步凌髙榭春空月正明星辰臨漢畤樓觀俯秦京靜夜松飈響豐年榖日晴同心隔城市相望轉盈盈候駕遙聞葆吹聲仙仗下通明地轉蒼龍道天臨白玉京瑞光同逺近雲物半隂晴隱隱行宮啓重關虎豹盈承聞詔迎聖母太妃還宮兆啓封邦日圖開繼統春漢南王化逺天下母儀新侍寢隨宮眷留行聚國人嗣皇敦孝理瞻望黼衣頻濟水朝京甸燕關鎮海流九重迎聖母千里會諸侯日月開黃道河山列素秋禮文同扈蹕元不為宸逰上陵卧病長夏晚出門秋草生聊因上陵日一寄看山情野水侵平道寒雲覆古城聖君方用武羣盜敢縱橫五月七日陪李劉二侍御逰宴尹亭不到北湖久重來蓮葉青水香還落照山色自孤亭竹隱尚書榻窗懸柱史星回舟忽已晚波上月冥𡨕沙河放馬野田草路廽登古原雞鳴桑下屋牛卧雨中村薄日浮山影長橋下水䀶煌煌中使出束帛向陵園九月望日同大陽有臺二使君泛湖出郭二首野眺鄰幽曠移舟出水關上卿雙蓋逈漁父一簑間墜葉紛飄座廽汀曲抱山芳尊對搖落不醉可須還候火射波光中流見女墻觀樓增突兀雲月遞微茫岸接青山近舟搴緑芷香興酣忘夜久歌吹繞林塘村舍村舍孤煙起山中朝雨寒丁夫荷鋤去稚子出門看早稼登場圃秋瓜蔓井闌居然羡間逸趨府欲辭官泛湖此日秋風起移舟向浦煙客心隨地逺人語隔花田古寺踈林外孤亭落照前十年塵土夢回首一茫然山行兩山開一徑杳杳入雲煙仄磴樵人下危峰野衲禪斷鴻愁返照歸馬識斜川井邑干戈後凋零異昔年御帳坪次王伯安韻白日天門近青山御帳空亭虗從眺覽樹古自登封過鳥層雲上鳴泉萬壑中翠華春不返惆悵昔人蹤題清樂亭老木隱江亭幽居對錦城榻懸西嶺雪墻度浣溪鶯地僻人稀到心間夢亦清窮通身外事何必問君平重陽後三日登雨花臺一片金陵月荒臺對酒看水雲霏冉冉江日隱團團鴈早那堪聽花遲未可餐憑軒望鄉國西北近長安與平崖林豸史泛湖北抵華不注山夜從陸歸二首浮舟出近郭落日半溪隂水濶蒹葭淨山寒煙霧深壷觴不盡興絲竹有餘音獨恨黃花少猶煩隔浦尋黃昏過别業却見舊山僧客駕聊云息鄉愁轉更增水光浮夜月林影散秋燈隔苑聞寒犬髙軒醉懶乘後三日登龍洞山二首海嶠煙霞滿登臨愛積隂緑苔穿嶺滑黃葉綴巖深宛宛鹿麋徑泠泠泉澗音髙人或住此精舍杳難尋寺古猶存佛山深少見僧遲徊意不極去住感偏增樹隱青林店龕明白石燈峭峰吾欲上未有鶴堪乘宋駙馬園亭訪東石談子遇雨却訪故人處遙來公主園濕雲蒸錦樹鳴雨過華軒檻近浮鷗接庭深乳雀喧將求卜居意相對已忘言贈周文都君乘别駕車南征千里餘豫為燕市客嵗杪意何如日隱川原暮江涵雲水虗新春見廽鴈知有秣陵書寄華山人山人歸薜蘿迢遞兩年過道逺情無那秋來興若何隰霜收早稻江日曝寒簑不見雲中鵠空傳招隱歌贈何子元二首飲馬長城窟西風隴水鳴旌旗連朔氣笳吹咽邉聲鹿塞秋霜白龍沙漢月明共嗟班定逺身是一書生萬里窮邉使三秋出井陘金鞍裝寶絡斑管代青萍吏識終軍貌人瞻博望星歸來市駿馬持節報明廷行子行子到京舍故人消息傳釣魚吹臺下築室黃河邉插架餘千帙傾囊有一錢古來賢逹者往往在林泉彥卿垂示省署述懷之作次韻奉答寂寂荒園午庭虗不下簾墨池經雨潤厨火隔宵熸壁溜侵湘簟窗風動越縑灌花親汲水童子睡初甜官間仍地僻賓從少經過睡起看山立詩成對竹哦小塘雲影亂深樹鳥聲多坐數秋期近雙星欲渡河過雙泉寺馬文明别業懷寄却過雙泉寺因懷馬舍人托交空有日為别動經旬古澤蓼花亂髙原禾黍新秋風吹獨馬望爾一傷神山中懷白巖二首珂馬長安道趨陪幾見秋那知遷轉地翻動别離愁光祿詩名逺容臺禮數優空山中夕夢長繞鳯凰樓昔奉山陵使曾同虞殯吟鼇翻滄海變龍去鼎湖深紫極瞻雲地清霄望月心蒼蒼松柏裏懷往益沾襟懷昌榖大理二首孺子南州彥詞華早擅場共憐廷尉府秪益簿書忙寶縼愁鸚鵡鹽車困驌驦何時一艇去與爾泛滄浪齋房隱薜蘿野外少人過向月復誰語看山空自歌城孤戍火亂地逈北風多惆悵離居夕相思奈爾何白巖將赴北山供祀奉呈賦客貪岩壑登臨思渺然出城看落日驅馬入秋煙蘚綴陵門棨蘋香寢廟籩别來曾見説重補華山篇張侍御過訪不值謝答有客騎驄馬徘徊戀友生虗煩過茅屋實已隔山城野僻蓬蒿滿園荒蟋蟀鳴空村中夕夢相憶倍含情雪後尹亭小集有懷張侍御仲齊樽酒故相約燕逰翻不同亭深寒雪在橋斷夕煙通白日行歌裏青山别恨中夜闌車馬寂愁聽竹林風尹亭夜集憶共尚書飲蘭舟漾渚風芙蓉開月下簫管入雲中鶴唳煙沙逺螢流水閣通重來值搖落無復往時同晃晃水上月稜稜沙際風寒星動木杪逺火露煙中城郭千峰對園林一水通興移還野酌留賞夜深同將赴靈巖午憩黃山店示同逰諸子感時愁不極出野興仍髙墟野當紅藥園林過碧桃水行沙路軟雲卧石床牢更喜山翁朴忘形對爾曹出黃山村遇霍子聞郡守章栁菴將至靈巖喜而有作路轉黃山店人逢霍茂才傳呼寺僧出五馬欲東來野水村村響岩芳樹樹開浪逰雙屐齒沾濕破蒼苔由張夏村赴靳庒望同逰諸子落日過張夏黃昏投靳庒嶺牛將犢下沙鶴避人翔石徑盤青靄柴門閉緑楊同逰忽不見孤眺轉蒼茫靳莊山館即事次張侍御仲齊韻野館千峯對登臨日載陽山川氣紆鬱天地色凄涼未卜三秋稼先傳二月蝗古村兵燹後搖落見空墻出靳村望靈巖寺福地靈山表來逰春已深情知百里道虗抱十年心野樹猶含色鳴禽欲變音花宮瞻望處煙霧繞青岑遲賢亭有懷白泉王子詔蓋與余同逰泰山而余先王子歸也樹杪逰雲白風前落絮輕行蝸上壁篆鬪雀墮簷楹客駕聊言息仙蹤不可明懷人望東麓邐邐曙煙橫春日卧病寄劉子希尹王子孟宣我濟富山水人稱名士鄉兩生俱俊傑吾道豈荒涼紫禁煙花地青雲翰墨場應須得髙步書札報滄浪老病東山客青春意颯然祗因愁不去翻與醉相牽草檄懷公幹登樓憶仲宣幾時蓮葉裏重放北湖船假村候成之僉憲客子復迎客黃昏行古林短墻登吠犬列火動栖禽對雪三年夢維舟半夜心他時重相見佳話比山隂柬河內使粹夫憶爾曽金馬豫官亦瑣闈驚風一以振落羽遂分飛東郡身仍屈西河信每稀傳經與抗疏心事兩相違移榻卧榻便幽賞虛廊接瞑移樹雲低繞棟階雨下通池病間琴相得心勞硯獨知商歌激流楚惆悵北山期贈蕭醫士覽鏡嘆華髮出門鄉路遙客裝侵暮雨歸楫渡春潮草緑河隂細鶯啼苑外嬌荷鋤行采藥還似赤城樵贈方山鄭子二首江東有狂士結屋本深山為客風塵外馳聲梁楚間才聆捫虱語忽作釣鼇還豫亦悠悠者相逢愧爾間好酒恥儒素談兵靖塞塵深憐宋中客宛似晉時人到處不諧俗一生長任真因君感交態多少白頭新贈伍文定太守移吉安鞏洛移官日荆襄過里年郡符分舊虎江樹聽新蟬河內人虛借關東政久傳行經五栁宅一為吊先賢元旦上日冥冥雨中宵且未休薄逰雙劍在羇宦一身留養鶴憐初志屠龍悔壯謀著書聊假日元不坐窮愁寄無錫管尹吾愛管明府理民如昔賢靜看申浦月清飲慧山泉惠化表三異和聲流五絃春風阻携手相憶思悠然答松月伍中丞見寄開閣俯江城懷人獨繫情碧雲空舊色黃鳥又新聲劍在終相合舟間且自橫鳯凰臺上月孤負一春晴舟泊清江有懷交逰諸公二首未暖金陵席還趨玉陛行漢儀欣再覩虞秩愧惟清雨雪江南曲關山嵗暮程臨分約歸候春服早須成日射江流紫煙沙凍欲開臘從梅蕊破春傍雪濤回北斗瞻星入東風應律催鵷鸞隔朝省不共上元杯柬朱柱史子宜有美中臺彥聞名自國都豈知多難日識面在江湖地入王畿逺星分客棹孤霜威倘可借一為保前途齋居同月岩夜坐寂寂槐廳晚端居感嵗時雪消山色在寒退井痕知白戰懷蘇老清齋伴子期坐來情轉逸華月照方池賀承菴侍史省親還績溪上疏天門北驅車海嶠東去留真自得心迹許誰同詩入杜陵室官追桓典風夀筵家慶好花對白頭翁汶上寄王工部舜夫二首真擬湖邉會言從汶上過嵗時鳴鳥變岐路轉蓬多樹色連東嶽川流匯北河相思阻歡覯瞻望恨如何幸不逢顔色真愁吐肺肝祗因哭子瘦豈是别家難雨麥虛看秀風梅實抱酸病懷兼逆旅誰與一盤桓寄陳石峯中丞一别梁園雨五看秋草踈君為烏府客我向白門居髮短風塵裏心長老病餘江流日東下何處覓雙魚出郭將訪希凖郡伯懼暮而返却寄駕言江口出却至水西還逺道空回首重門欲上關斷雲低白鴈斜日近青山欲採瑤華贈仙舟不可攀和答胡可泉郡伯籍籍胡安慶新聲滿舊都詎知金馬客翻領玉麟符退食還經史登樓即畫圖昔賢憂樂地元只在江湖溪翁未覿溪翁面中宵夢已先關山非逆旅舟楫是登仙鴈語驚霜别鶯啼候谷遷煙波夕渺渺留恨滿江田贈李都閫好武將軍獨能文更愛君異勛江左䇿名閥隴西聞散帙臨秋水投壷過夕曛長懷醉别處簫吹遏溪雲奉答王載卿方伯菊蕊南山屐荷華北渚船勝逢無節序佳句有雲煙列郡謳歌裏滄溟覽眺前故鄉誰地主回首憶當年寫懷欲逃中夏暑暫上上江船夜卧對松月曉行披水煙佳期渺天末良覯阻尊前相問各華髮遙悲青鏡年再贈載卿賓堂瞰水滸沙栁繫行船裊裊緑蘿月𡨕𡨕芳浦煙鄉關百里外世事一尊前記取相逢地清河旅食年戲贈張守公薦蜀郡留工部任城卧謫仙古人多逆旅地主幾稱賢嵗月青尊裏鄉關白鴈前知章與嚴武君不愧當年近聞石翟子駐節河口喜而有贈二首近聞臨駐處陌上草萋萋碧水春風外青山晚月西君車建髙節旅舸繫平堤豈料漳河飲同聞絡緯啼棲棘誠堪惜崇遷且汴臺不因盤錯試誰辨鏌鎁才赤日昭天鑒黃河殷地雷凌秋泛槎去知向斗邉回柬王美卿萬户見説君家圃新開夜合花暝雲含洞石炎雨淨溪沙想像王郎劍遲徊漢使槎一尊虛舊約惆悵坐昏鴉旅寓清源有懷故鄉親友雨過雙松午雲隂覆閣長栁蜩迎日嘒芹燕落泥香碧水通官舍青山接故鄉懷人不可見歸思轉蒼茫贈宋醫施藥漳河口髙齡鬢未華地疑京兆市人即宋清家石壁垂金草丹爐起玉花願傳玄牝訣交臂入青霞雨中卧病谷來許以詩來問答之爾本遊揚侶吾慙程氏門遙憐雪盈尺何似雨翻盆久病拋書卷長齋閉酒尊草堂霞色晚好過一相論重陽冷二守過訪留酌九日逢知己開尊傍水涯壯懷餘白首幽賞有黃花日隱郊臺暮雲連浦樹斜未須論去住乘興即為家徐園夜坐有懷避暑將軍府青青竹滿園坐看臺上月吟憶水西軒螢火流煙度蚊雷接暮喧美人漳浦卧何日奉清言贈環峰王總戎西征開府馳聲舊轅門授鉞頻日華承蓋轉江色映袍新去作鄖山雨來經蜀道春軍中人盡説籌䇿妙如神答羅兗州我抱文園渴君淹曲阜城中年俱抱屈異地各懸情永夜孤蟾色新秋旅鴈聲况聞吳楚變漢帝且南征寄胡文甫不見胡文甫七回明月圓家林且如此宦海益堪憐碧栁秦臺馬紅蕖濟水船往來餘百里同醉是何年午日卧病有懷張王二子棲遲仍舊國愁病且端陽白髮能相妬清尊漫自香壁虛懸艾好溪逈入舟妨苦憶青驄客盈盈水一方贈鄭少尹我正雪中卧君從天上還節髙元自苦才大可能間淅瀝聽踈竹蒼茫對逺山夜深拚一醉休當剡溪灣贈劉希容籍籍劉京兆還家尚黑頭無心戀簮組有子紹箕裘月夜樓中坐花時郭外逰不堪相訪地醒眼話離愁懷王生世棄君平久狂踈老更添絶人吾豈好嗜酒子應嫌荷葉翠出水榴花紅入簾晚當西牖坐山日映書籖夜訪德宣不值坡陀古堤上往來傷獨逰相違豈在逺一見已無由水宿厭棲泊暮行多凛憂瓊枝不可即腸斷衛川流寄徐進甫城東徐孺子不見已三年鴻鴈幾時至音書誰與傳釣魚寒澗曲注易古林邉遙想府中榻常因髙士懸過汴呈獻吉兩年京郭居空望故人書五月梁園道來乘長史車川流赴海急隰日漾沙虛欲訪漁樵徑蓬蒿不可除夜泊漢陽却望武昌有懷矩菴對岸武昌郭清宵回望頻離心繫舟逺旅夢涉江新積水明疑晝浮煙靄似春樓空黃鶴杳延佇獨勞神白泉王子居山相近爾能耽野趣吾亦愛村居白屋情偏好蒼山畫不如桑麻通雪徑雞犬接煙墟嵗晚青藜在相過且校書同王白泉步過北村訪孫胡二子少日同門客山居晚共依孤村一相訪深樹鳥聲稀面水心逾靜班荆願不違蒼蒼平野際還望瞑煙歸谷子訪豫别業谷生憐我獨相訪到山家碧水孤村抱垂楊一徑斜野人共白酒稚子飯胡麻坐愛殘陽裏庭槐吐細花懷三屏子北郭雨冥冥東山雲霧青三屏不我對九栁自吾亭短髮嗟同病長歌笑獨醒臨溪撫身世百載一浮萍送都玄敬二首才髙憐晚達十載尚為郎書買黃金盡愁生白髮長夏曹分武庫秋殿别文昌木脫霜臯冷何人共采芳驅馬别君處秋隂當暮生林柯無靜葉江鴈有歸聲緑水閶門道青山建業城未能同理楫延佇獨含情送陸子引世業機雲後聲光慱望前使星連禹服卿月渺吳天岸逈山回枕泥香燕拂船壯逰應不負隨處有詩篇送唐仁夫象闕指龍洲天南海北頭島夷隨使節山鬼避行舟墓采秋蘋奠鄉看晝錦逰歸期定何日瑶草思悠悠送施克和樓敞壁燈懸歸心夜不眠袖中懷楚玉江口泛吳船興寄風人外名收國士前秋來消息好知向鹿鳴傳送劉氏叔姪赴舉雙馬飲溪流溪邉雨乍收方趨棘圍戰不比竹林逰禮學傳三世家聲動九州太行山上月幾日桂花秋送徐德章兼寄杭世卿吏部迢遞延陵路新乘使者車國風收外史廟號布中書海色宵征裏薇花午夢餘相逢杭吏部歸楫問何如送范掾尉仁和入仕得親歡舟行且問安青山越州路黃綬漢時官暑服裁江練名花薦渚蘭六橋三塔景公暇幾回看送劉博之參政南陽二首薊北才能會聲華早見收道髙傳吏部詩好入隨州别宴當梅雨官程過麥秋江湖憂正切休上望京樓津橋南渡頭落日片帆收冠蓋新方嶽河山古豫州樹深燕市晚雲冷爵臺秋兩地分千里懷人各倚樓送黃端州春水泛桃花飄飄海上槎官崇先領郡親老一還家石抱溪雲紫煙含嶺樹斜夜深登望處北斗是京華送王秉衡歸省津樹隱春艭林花集暮江天涯歸客逺堂上老親雙捧日心常切看雲夢未降間來書諫草誰與坐山窗送曹元孝監河之徐州二首水部移舟楫臨津問所須離心漢宮栁幽夢楚垓蕪鴈逈雲重覆花寒地一隅吟詩坐東閣誰與鑒氷壷石閣延春望洪舠送酒須斷蛇荒澤徙戲馬舊臺蕪碧樹通江徼蒼煙接海隅三山不可見休更問蓬壷再寄其子毅之相尋空繾綣相别太斯須一去青門道幾回生緑蕪文章傳海內消息阻天隅嵗晚登髙憶勞歌缺唾壷藏六軒夜别東卿到寺鐘初寂髙城夕漏遲閣雲昏冉冉庭雨凍絲絲留客燈前席懷人海上詩樹鴉啼不斷嵗杪怨相離贈周豫庚使遼左翩翩鳴玉珂千里渡遼河爾本詩書客寧聞鐃吹歌立朝同汲黯出使比蕭何莫厭貂裘敝霜風塞上多簡别華文光同年朔野北風起沙蓬飛不休端居念行客明發動歸舟古堞鳴禽暮虛堂落木秋重來不相見離夢轉悠悠送華文逺早蟬鳴樹頭歸棹渡江秋孝子祠重建徴君傳已修淚痕雙苧袖身世一弓裘不學龍門客逢人説逺逰送董汝淳太守之楚雄二首詩人重出守萬里一朱轓苦節留三郡英聲振五言山深夜郎道花亂武陵源月下勞相憶清秋幾處猿井鬼占星地滇雲問路時嶺暄秋瘴濕江逺暮帆遲竹弩迎津吏氊裘拜島夷課耕還吊古應到孔明祠别顧華玉同年四首問訊金陵客南歸近有期馬行沾雨慢蟬響入秋遲水稻供慈膳江綃製夀帷間居賦成後曾見幾人為落日長干渡西風短棹過故人歸後少秋草望中多謝墅荒碑碣吳宮閟綺羅趨庭休浣外臨眺意如何官署依鄉土幽求滿素心窗臨逸少帖墻挂宓生琴種藥開春徑看雲坐晚林避名名轉出休愛碧山深逹人氛垢逺流品自應殊駿櫪分天廄鸞巢托省梧葛洪勾漏尹阮籍步兵厨未識圖南志相逢説著書送秦用中邑博得鹽字殘溜滴崇簷離杯雨夜添儒官歸鄭老詩客去髙蟾調發囊琴古光􅉼匣劒銛昔賢身未逹多少在魚鹽芮令尹之興寧萬里惠州去旅情應獨傷暮雲牛嶺暗秋草鴈池荒古迹懷蘇老清吟和李綱遙憐蠻聚落從此識甘棠贈别三首相逢不忍别相送思悠悠風雨一宵話關山千里愁暮潮通極浦寒燕逐行舟短髮年年白重看是幾秋早葉半辭林晚蟾初罷吟入秋鄉國夢垂老故人心道在寧須祿官清尚有琴城隅分手處惆悵水雲深獨持文字印遙泛木蘭舟古驛尋京口寒城過石頭誦聲分館夜吟思捲簾秋欲問前朝迹青山是蔣州送孫志同經略居庸二首寶劒青驄馬秋髙出塞行田公新受律武子舊傳兵鼓角邉雲慘旌旗海日明穹廬莫南徙中國有長城馬出燕關道人如定逺侯眼空沙漠氣心繫廟堂憂絶塞蒼煙暮荒山白草秋軍都城下過懷古一登樓送朱文表關河積雨晴千里一舟行庾廪司農計山川故國情古碑尋盻子芳草識聊城想見登臨處遙心覽八瀛送楊生相見十年外相尋千里餘青襟子老大白髮我何如涕淚丘園草風塵故舊書别情那可憶雲月曉窗虛送王載卿萬里雲霄使三秋澤國船氷霜消嶺瘴旌蓋麗江煙國賦徴求裏民風奏記前獨憐詩社冷一别又經年送李僉憲維之北上桓典乘驄日相如卧病春傷心一杯酒回首十年人雪暗關山色風飄驛路塵郭西慵出餞愁見栁條新送王君寵主潼津驛潼津佳勝地驛舍近潼關立馬看河水開窗對華山客懷登覽際官守送迎間倘見三秦友傳豫鬢已斑送劉文振宰驛華山兼寄汝公太守我抱逰秦志君今先我行一杯同出廓千里獨含情雨入新豐晚雲移少華晴寄言桑郡守天子近知名華泉集卷三
