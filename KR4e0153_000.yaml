body:
  text: 華泉集别集類五明提要臣等謹案華泉集十四巻明邊貢撰貢字廷寔華泉其號也厯城人𢎞治丙辰進士官至南京户部尚書是集凡詩八巻文六巻魯中立海岳靈秀集曰華泉之作雖不逮何李然平淡和粹孝廟以前海岱之才無其倫比胡應麟詩藪曰世人獨推李何為當代第一余以為空同關中人氣稍過勁未免失之怒張大復之亮節俊語出于天性亦自難到但工於文句而乏意外之趣獨邊華泉興象飄逸而語尤清圓故當共推此人陳子龍明詩選則曰尚書才情甚富能于沉稳處見其流麗聲價在昌穀之下君采之上今考其詩才力雄健不及李夢陽何景明善于用長意境清逺不及徐禎卿薛蕙善于用短而夷猶于諸人之間以不戰為勝無慿陵一世之名而時過事移日久論定亦不甚受後人之排擊三人所論當以子龍為持平矣昔薛蕙于嚴嵩為同年頗相唱和及嵩柄國蕙即謝絶往還併削去舊作不留一字至今為論者所稱是集乃取送嵩之作列為壓巻不免見疑于清議然詩集為貢沒之後其里人劉天民所編時當嘉靖戊戌正嵩權熾盛之日或天民無識趨附時局以為榮非貢本志歟其文集亦大名魏允孚所續刋自明以來談萟家置而不論今核其品格實逺遜有韻之詞盖才有偏長物不両大附詩以行視為琬琰之藉可矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀華泉集原序余讀華泉先生集葢有世道之感焉昔者孔子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進文勝之敝人至以先進為野人此其已溺而不可返孔子豈不知之而猶力為之辨曰吾從先進云云聖人固以為文質彬彬吾志誠在斯焉已且安知斯人之果不吾從也我明當孝廟之世皇運熙宏人文樸茂學古之士並軫而翔闗西則李獻吉汝南則何仲黙吳中則徐昌穀歴下則邊庭實庭實先生字也獻吉之詞雄仲黙之詞逸昌穀之詞蒼先生之詞温然粹然即人自為家究之緣情示志體物敘倫動軌自然不殊也雖其人已往間嘗諷其詞猶足以想見其人與夫當時政治風俗之盛今之學士大夫文非左國遷固雄向則亡稱詩非丕植明逺靈運甫白則亡稱然其氣飄忽迅激驟而睹之色驚稍扣之汩汨乎無餘味焉何者數先生一於鑱古人之精而世學士大夫猶未免掇古人之華也鑱精者盛世之文掇華者季世之文今之文吾何敢以季世待之然其視盛世何如哉故曰余讀華泉先生集而有世道之感焉先生集舊有本歲久而蝕又遺所為文不載余理濟之明年從先生仲子搜得數十篇因敘入集中為重鋟之匪徒不朽於先生之詞且俾論世者有所考鑑庶幾慨然而興先進之思云大名魏允孚序
