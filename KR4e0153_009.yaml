body:
  text: 華泉集卷九明邊貢撰文集封事言邊患封事具官某謹題為急處邊患事近該大同鎮守等官題稱邊患復熾等因奉聖旨這所報兵部看了來説欽此欽遵除抄行外臣看得一本之內五日之間共計五十七次事勢異常誠有如聖慮之所及者臣惟將士無功責在主兵今日之事不暇逺舉請以太監苖逵保國公朱暉右都御史史琳節次奏報之詞論之其捷音本內開稱官軍對敵計出萬全現在已邊境寧謐為萬萬年無疆之休矣今旋軍一日而大同即化為戰場臣不知所謂萬全之計無疆之休者何在也其旋軍本內開稱議留總兵等官吳江等十餘員於大同各路分布周密防備戰守苖逵等復回宣府節制隨宜調度今敵入如蹈無人之境臣不知防備戰守隨宜調度者何在也及查前項聲息本內有殺人者有傷人者有搶人者有剽掠頭畜者有蹂奪田禾者有四散駐劄拆我邊墻者總而計之四十餘處而往來出沒者不與焉然此特所知者耳其知而不報報而不盡者又不知其有幾矣臣愚竊料彼先因小捷誇張過實故為虛詞以遮飾耳若果將領分布周密何至貽患耶臣又查得先次吳江劉祥部下千户戴賢等所獲賊首一顆苖逵等即稱係彼議調夾攻𠞰殺之數夫官旗之績既可以坐收則地方之患當誰任其咎耶况賞罰者主兵之大權賞罰不明號令不行苖逵等一獲微功各領家人子姪苖翥史鶴朱天麟報捷希寵其軍門之賞罰臣不悉知以是觀之無怪乎將士之解體也伏望陛下上計社稷下憫生靈特敕多官會議將苖逵等取回治其欺妄失事之罪以懲後人别推內外文武大臣素有猷望者數員列名上請簡命三員前往二鎮以代其事惟須將領京營人馬就擇彼處堪任將官管領尅期𠞰殺務在成功則雖失之于前猶可收之于後也若再今日寫敕明日切責臣恐秋髙馬肥敵勢益熾人民漸空城堡難守意外之患豈惟不敢言而亦不忍言矣此事先該户科右給事中張𢎞至具題于時聖意將從其請臣之愚昧亦嘗論之已而因有捷報未賜施行臣蓄憂于心不敢再瀆今大同殘破果至如此蓋被髮纓冠往救垂涕泣而道之秋也故不敢輒避讐怨復以上陳惟陛下少垂聽焉則社稷幸甚生靈幸甚緣係急處邊患事理未敢擅便謹題請旨疏乞終養致仕疏河南按察司提學副使臣邊某謹奏為乞恩致仕以便養母事臣見年四十二嵗山東濟南府厯城縣人由進士厯升今職臣父止生臣并臣弟賦二人正德六年臣父病故後二年臣弟又復病故臣與臣弟俱未生有子女臣上有老母不止臣身內無所托後無所承零丁孤單宦心銷減但臣年力未衰不敢遽甘丘壑以此奉母就官強勉供職豈期臣體綿命薄到官數日痔瘡遂發久卧床褥備嘗痛苦醫更十餘藥百劑病雖小愈根竟未除又兼考校生徒坐必盡日前病遇勞則發遇發則眠去年科舉取試士觸暑冒濕風雨靡停積勞成虛積虛成損臣痰火舊疾遂致併作怔忡眩暈寢食兩妨臣母見臣孤身多病亦遂憂畏成疾臣欲日在膝下奉寬母懷則有瘝官廢事之誚臣欲嵗厯境內盡心王事則有倚門噬指之嗟臣之進退實為兩難兢愓所迫前病愈深春徂夏交病形轉劇尅期考巡屢發屢止是臣上無以報國下無以娛母是愒日竊祿而久妨賢路也臣曩誦匪躬之爻味四牡之詠以為回車九坂不若捧檄動色蓋子有以忠為孝親有以離為樂者臣今所遭實出其變離不足以揚名顯親病不能以移孝為忠則何益矣况臣踰強無子宗祀如線勢至孤危如蒙矜憫乞敕該部放臣致仕歸里調理前病奉侍老母以終餘齡則未死之年皆感恩之日也為此轉某人謹具奏聞患病乞休疏南京刑部右侍郎臣邊貢謹奏為自陳患病自劾不職乞恩休致事臣東鄙野人粗習章句濫竽科第厯轉今官於嘉靖七年十二月十九日陛辭南行途中因感風寒舊患痰火胃痛偶爾大作沿途訪醫服藥不效只得兼程便道抵家即請德府候缺良醫胡嗣亷登州府蓬萊縣醫士毛翔議方調治比因為急於赴任過用涼劑以致元氣大傷脾胃虛損飲食日減病勢日增腰足酸軟頭目虛眩四月以來水瀉不止五月以來轉成痢疾卧床日久未能起步臣思一身之眇諸疾交攻未老先衰浸成殘痼方欲具本奏乞致仕五月二十五日準吏部咨文該吏科給事中劉世揚等具題為催促南京法司堂官赴任修舉政務事節該奉聖旨你每説的是南京法司係是問刑緊要衙門近日推補堂上官員往往便道抵家不行作急赴任以致推鞫無統獄囚淹滯好生有負委托且不查究邊某著吏部行文催促上緊赴任等因欽此備咨到臣臣惟言官論列區畫周詳可謂深事宜仰上心者矣荷蒙聖德包容不即加誅止令該部移文催促真如古人所謂舍罪責功者明君之舉矜愚愛能者慈父之恩也殞身粉骨何以為報臣今五十四嵗入仕三十四年虛受國恩涓埃未補陛下龍飛之始拔臣草野之中七年之間五遷華秩何才何能堪以收録重以明命赫嚴湛恩汪濊正臣鞠躬盡瘁竭力圖報之秋也但以刑部者邦禁之地侍郎者參佐之官即使洞知法典明習條章之人尚有差忽如臣瞀昏而多病必至僨事以干誅伏望皇鑒俯賜垂憐悃愊特敕該部查照近日南京都察院右都御史張琮等災異自陳放回事例容臣致仕俾得專意調養以延殘喘則臣雖沒齒敢忘天地之至仁哉臣觸犯威嚴不勝恐怖待罪之至緣係自陳患病自劾不職乞恩休致事理為此具本專令義男某抱齎謹具奏聞序同年會别詩序𢎞治乙卯秋八月山東之士之舉于其鄉者七十有五人焉曰張子行恕其最長者也既宴鹿鳴因語于衆曰士之同舉也四海之廣有兄弟之義焉是惡可無講也矧吾黨之士同兹土也耶乃始卜會于濟城西僧舍中觥斚有容少長秩秩陶然其為樂也丙辰會試禮部再會于京師逆旅舍中其觥斚有容也少長秩秩也陶然之樂猶之在濟城也己未再會壬戌乙丑又會而是七十五人者之中有為部者為寺者為衛參軍者為學職為御史者為中書進士舉人者出處遷變錯然莫齊而其為樂則固未嘗不陶然也戊辰春三月其舉人就選于吏部者十有三人則皆美才也而顧皆領縣焉踰旬持檄將仕于四方凡我同年之在京師者九人醵酒殽以會别于逆旅舍中且卒爵張子行恕又以語衆曰吾黨之愛也猶兄弟然然故是友朋也語曰朋友切切偲偲兄弟怡怡今諸君仕矣可直陶然為樂已耶願為之詩以宣其志然毋忘于針也于是衆皆賦詩而以其最少者一人序而送之送者某子某某地人今為某地令尹序之者某官某地某人也雲衢履厯後序雲衢履厯圖者掌太常寺事禮部尚書正菴崔公之所自為也公嘗以告豫曰吾少孱且病奉老氏教蓋將終身焉而幸通仕籍事四朝今且老矣每念吾身所以生之成之食之者恐其耄而遂忘之也爰自童子以至于今衰其事之可紀者二十四條圖且名之而疏其事于下其圖屬乎親者六屬乎師者一屬乎君者十有七他不與焉吾將朝于斯夕于斯觀乎吾親則不忘身之生觀乎吾師則不忘身之成觀乎吾君則不忘食之所自又將教吾之宗人與吾之為弟子者孝以事其親忠以事其君全恩義以事其師也然是圖也白洲公題之石齋公序之子其謂何豫揖而進曰卓矣哉公之見也夫民生有三事之如一自上世以來未之有改焉而忠孝恩義云者乃孔氏之所以為教也公不居老氏而自附於孔門卓矣哉公之見也且老氏者孔子蓋嘗與之逰而問禮焉則其道固相近而公篤于是三者之倫亦可謂善學老氏而不囿于其教者矣宜二公之有取也豫不敏退書所對于末簡以記嵗月若公履厯之詳見于自敘者兹不贅云登樓拱夀圗詩序登樓賦者我巡撫大都憲矩菴先生之所作也何名乎拱夀志孝也曷志曰先生之仕四方也以别其大人公幾年矣是故董學於山東參佐於江西而旬宣于湖南登髙望逺則莫不有思焉而亦莫不有所志焉至是巡撫之命下則先生祿益厚爵益尊而所謂思者日益深矣乃於庚午之冬十一月某日南巡至於嶽陽至之明日實惟大人公懸弧之辰其邦之賢曰中丞栁先生者知先生篤於孝固不能無思也設供張具紙筆觴先生於其樓而登焉是日同雲布虛雪霰交下先生攬洞庭眺吳會舉酒酹江百拜稽首真若承大人之顔而親介其夀也于是登樓之賦作焉越明日放舟遡江而西巡於江陵客有以君山圖獻者發而視之又若指授登樓之事而為之者也于是藩府諸王曰長垣曰光澤曰肅寧以及我巡按先生咸異其事為之歌以咏之而以序屬貢貢不敏又弗文也樂先生有以悅大人之心樂大人公有以享先生之報樂諸王公之有以善頌而善禱也謹再拜而志之榮恩介夀詩序正德庚午冬我矩菴先生巡撫湖陽則既為登樓之賦以夀其大人公矣比至荆而適有詔至既開讀則我皇上上徽號兩宫推恩臣下凡兩京未及考三載績者其親之階得與子同於是大人公之階由天官郎進而之中丞矣荆之藩王自長垣光澤而下聚而言曰維是中丞既德且文用惠于楚之人而其大人則又躬受其封而口食其祿也此不為異數耶于是繪圖為册大書其卷之端曰榮恩介夀又各為之詩以歌之時我巡按清戎二執法先生者各以事至荆則皆曰是盛美也不可以弗傳也乃相繼而歌之繼而藩臬諸公有與者有不與者聞之則皆曰維先生撫兹土也憂衆人之憂今兹之榮恩而介夀也是先生之樂亦吾衆人之樂也則相繼而歌之下至縉紳士以及于吏民商工則歌之雖里言巷謡不盡以獻而樂先生之樂者固百口一詞也於戲盛哉維貢之先大父昔官南都于先生有一日之雅而貢之出守又得為屬郡吏幸莫大焉故不敢竊自鄙逺以其册之題分為四韻為短詩四章以歌之蓋貢之受愛於先生也有年而領教于坐右者亦親且久知先生之所以夀于大人公不獨于名位之間而已也故於篇中少見意焉不然則是僣矣送虞部郎中唐仁夫序豫往嵗為黃門郎給事兵科監十庫之入凡十庫之藏者得縱觀焉其金玉鐵沙石丹鉛齒角革羽之物楩楠豫章桐柏之材弓矢甲胄刀劍戈矛盾之器積之山如也就而閲之則伊威之與居蝘蜓之與親文鼠巢之網塵羅焉其實者蠧堅者脆利者鈍而光者晦矣而于其中見所謂金若玉者拭之瑩然扣之鏘然也豫有感焉夫鐵也沙也石也丹鉛也齒角革羽毛也楩楠豫章桐柏也弓矢甲胄刀劍戈矛盾也其始進未嘗不精且良也而久之不試則從而變焉究其所遭雖有幸有不幸然獨司藏者之咎耶其為體則固亦有弗貞者也士之仕也何異于是養于家教于學簡拔于有司而進之于天子之庭固以為精且良其幸焉者為鏞為琮為棟為梁為國之武器以禦侮于四疆其不幸而伊威之與居蝘蜓之與親文鼠巢之網塵羅焉者不少矣求其不蠧不脆不鈍不晦者幾人也豫有感焉唐子仁夫自進士拜官行人司副轉為司正凡十二年于兹矣再轉而為南京虞部郎中虞部之掌者山林川澤之禁鳥獸之賦而所謂金玉沙石丹鉛齒角革羽毛之物楩楠豫章桐柏之材弓矢甲胄刀劍戈矛盾之器皆其所有事也于其行豫有感焉故以是告之夫仁夫者是固能貞其體者也詩曰有斐君子如金如錫如圭如璧仁夫之謂歟送皞齋先生序皞齋先生既拜胙城訓導行有日間語某曰吾弗偶于世栖栖至今命也吾居鄉五十年鄉之人且不吾知他又何求也吾行且逺去子矣子奈之何先生娶于貢之姑恆子視貢而貢視先生亦若父然夫安能已於言也先生少質直不茍屈然貧也而安於貧先大父竒之故以婚媾先生治尚書能通其隱又能傳之人人以不昏昏也在學宫嘗與其同舍生四人者飲一人醉暮偕寢學宫時天大寒御火中夜火灼醉者之履煙㶿㶿滿舍至使人氣不得達也先生覺而起裭置水中反以水沃火火弗得延比旦醉者醒求履弗得顧見在水中乃大怒詈曰吾醉也而寐也而非死也而何至火灼履弗覺也是必四人者之為之也償吾值則已否則訟先生卒與三人者償其直弗言也踰三年醉者將仕如京師别于先生先生曰子且仕矣昔學宫之醉也吾拯若焚而又償若履也子弗知也子仕矣茍若是民有弗寃者乎醉者驚愧以謝曰長者長者故凡鄉之人率以先生質直不屈為憚而不知其中有容如此而其達于政又如此也胙之風俗古稱重義鄉學彬彬有文得先生為之師吾知後之數良師良弟子云者必自胙始而先生且有聞矣豈終弗偶者邪朝之諸大夫鄉之士舊與先生識與因貢以識先生者皆欲有以贈先生謂貢猶子也宜有以言嗚呼貢固不能已于言也送董蘭序縣之有令也昉于周官而其有丞也自秦始也丞之下有尉有主簿主簿尉雜起秦漢間然皆有分職而丞則二于令者舉縣之事蓋無所不當問也國家財賦之辦倚于江南而馬政寄之江北故丞之設在北者多典馬而在南者多司糧丞有分職則自國朝始也太學生董君孔猗者故涿鹿人既選來謁豫豫見其體充充也而其容斂焉若有戒心者問其官曰丞也問其地曰蘇之吳江也問其職曰司其糧者也又磬折以請曰蘭得附于名公之門而有瓜葛也實惟有榮焉是往也亦惟弗職以辱名公是愳願有以誨蘭蘭將佩焉豫應之曰今之仕者之為仕也得大縣以為喜其得江南也則尤喜也夫縣大則民多而江南則民富其喜之也將以利之也若曰才可以有為而以其地足以施布之者上也民多而賦易就以不勞其躬者中也利其有而取之者下也則未有不敗焉者也蘇州為府甲天下而吳江又其屬縣之大者孔猗之往也宜大喜而乃愳焉其容斂焉若有戒心焉則吾知其必有成已孔猗才雋而器宏端雅藻飾足宜于民家業裕不利其有又年甫強仕其進而之通顯也有餘地則吾知其必有成也已孔猗勉哉送柴少尹還無錫序少尹初仕無錫也豫嘗為丞説贈之丞之説無他辭蓋所以處其民與令尹之道也少尹仕無錫一年所錫之令尹甚安之以語人必曰吾良佐二良佐二今年五月受太守召督運來京師錫之諸大夫仕京師者則又亟稱之曰是吾良有司也吾鄉人莫不言也於戲若少尹可謂不豫負已常州故江南大府其統縣凡五輸運之粟嵗凡若干萬而錫又最大且繁少尹之來也實兼其四縣之運而總之乃不勞而事集也于是司徒公進之于庭而嘉賞之以勵其衆曰是錫之丞也是能總其他縣之運者也而又不勞而事集也是可式也今夫尹安之也諸大夫亟稱之也司徒進之庭而嘉賞之以勵于衆也是三者之譽也得其一人以為難而少尹何以有是耶曰勤而靜順而道惠而慤而已矣順非道則諛惠非慤則偽勤非靜則瑣瑣者事弗集偽者人弗孚諛者君子弗説也少尹反是是以有三者之譽也雖然則既有譽矣而弗終猶勿有也諺曰人而無恆不可以作巫醫故勤也順也惠也少尹之所能也而弗恆則慤者變而偽靜者變而瑣而順者變而諛也可無愳乎詩云庶幾夙夜以永終譽在是行矣送楊氏子入武學序宗人府儀賔楊侯天德之子曰承業者敏而習于文甚鋭也正德丁卯年十七出而就鄉試試于御史御史竒之曰是他日之英也列之上列已而試弗偶踰二年侯命之入武學見司馬大夫司馬大夫試其文則又竒之曰是他日之英也從之卜日以入入之前一日乃偕其伯兄承祖者來謁豫承祖者豫姨兄錦衣衛千户天章君之子先承業一年入武學蓋亦嘗見竒于司馬大夫者也請于豫曰惟豫二子之父也與叔氏為昆弟則猶骨肉然叔氏視豫二子則猶子也夫然則何以教我使旦暮勵乎豫曰然微是請豫且將有以告也則問之曰武學之業也幾何曰有二文事也武備也文以文武以射曰射有道乎曰有曰習之乎曰習之曰射何上曰中的為上曰何謂的曰鵠為的曰何以中曰內志正也外體直也持弓矢審且固也曰然則內志不正也外體不直也持弓矢不審且固也其亦有中者乎曰未有能中者也即有之則觀者譁然以譟曰幸也非正也豫曰然子之習于文亦猶是矣夫文亦有的焉曰道也者文之的也六經者道之的也晰于理以正其志放于文以真其體參之史以驗之博之諸子以貫之夫如是有不審固者乎有不百發百中者乎即弗中則觀者固將曰非正也命也孟軻氏之言曰羿之教人射必至于彀學者亦必至于彀又曰中道而立能者從之是二子之所嘗誦也可無法乎夫二子者固上之人之所悅而竒之者也吾見子之中于的也雖然中不中無患也患無失其道而已矣于是二子出户充然相對以喜俯而拜仰而謝曰敬聞命矣送忽子歸斛陽山中序正德庚午七月斛陽山人來通判荆州至則病于履凡起若步皆需于人也居數日以其病之狀請于布政分司布政分司曰是視事未久也奈之何去下其狀不受明日以請于按察分司按察分司曰是尚未衰可以有為也奈之何去下其狀亦不受又明日山人庭謁免冠請益力于是二分司知其志不可敓也乃以其狀各上于其長其長以上于中丞御史中丞御史上于天官天官上于天子天子允之是為辛未正月命既下而山人之病脫然去矣乃即日束裝歸歸之日荆之縉紳士與府僚佐以及于屬之吏民皆莫不嘆慕其賢而惜其去之早也乃相與設供張祖道于城之北郊曰華泉子者府之長吏也爵而問之曰異哉斛陽山人之為病也胡為乎仕而劇耶胡為乎去其仕而愈耶髮則鬒鬒體則廪廪起坐晏笑無異少夫然而固以病去異哉斛陽之為病也客有捧觴而進者曰子謂斛陽山人為真病者乎哉是吾嘗聞之矣其少也好山水之觀鹿豖是偕木石是鄰視聲利淡然無與于中以故壯也而仕嘗尹于介休又倅于鍾離矣又進而守于中山而佐于邵陵矣去來南北者十有八年雖往往獲休譽被旌薦其心之思歸固如痿人之夢不忘于起是以病于履今其歸也入其函谷之關曰是吾秦之邦也過其華之隂與灞之涘曰是吾秦之山與水也又指其斛陽之麓曰是吾少時之所居而逰耕而讀之所也有不洋洋而喜者乎夫人有思弗遂斯心弗紓心弗紓斯氣鬱氣鬱斯病思而遂則喜喜則其心暢其心暢則其氣宣以達其氣宣以達則所謂病者脫然逺矣斛陽山人非真病者也華泉子曰世之仕也躬磬折黃馘而俯行跛曵而越閾病于踰垣喘呻以臨案牘若是者非真病也乎哉問之則曰吾非病也夫病也而以為非病也與非病也而以為病也之二者其為均矣而其人之賢不肖何如耶于是諸客者各以大斗酌而飲華泉子曰歸請筆之郡乘以為仕者勸又酌而飲斛陽山人曰歸矣歸矣處之榮多于仕之辱矣斛陽山人忽姓忠名蒲城人成化丁酉舉人荆州知府邊貢華泉子也别唐子詩序唐子舉壬戌進士乙丒拜秋官郎秋官郎號稱劇曹唐子居嘗會客賦詩奕棋談笑以終日也人曰是有餘力也戊辰唐子以秋官員外郎出為穀城令令之以郎官為者無弗戚戚也甚者恚而寢弗能飲食唐子得命則會客賦詩奕棋談笑以終日也人又曰是有養者也不然何以若是裕也踰旬唐子具車馬將辭闕以行京師之與唐子逰者數人皆觴餞唐子而太常丞華泉子某與焉問之曰令也者邑之主也夫既為邑之主則凡邑之人之飢之寒與疾若苦無所弗責也子則能會客賦詩奕棋以談笑終日也耶唐子引滿而酌以復華泉子曰是何其不知我也是何其不知我也于是數人者盡醉而别各為之詩以贈唐子而以某也序之河南鄉試録序監察御史毛伯溫奉命之按河南也嵗在正德丙子會河南鄉試屆期至則嚴事肅官核士程物咸集咸允及試庶寮職分內外惟貞棘扄餼廪範防咸則亹亹翼翼無弗慎者某等文乎是司亦日夜翻閲心殫目赤怠失是愳是時巡撫右副都御史李充嗣振弛激頽士勃焉興前御史袁宗儒先事飭務諧明有徴而提學副使邊貢鑒士惟式故士入者無弗材者也是故試也有不公憂者矣無私焉蒙者也故謄無潦草之書掌無混遺之卷取無弗協之次刋無靡程之文始而無罔恫之議終也而罔歉也而人人充焉若有獲于心者是故是試也稱獲人焉録也稱獲文焉心也稱獲公焉而諸事事者弗敢自謂其然也録成某序之曰夫試者科舉之謂也厯代求士孰非兹由而儒者則曰自媒者汚自售者賤夫棘圍而邏防檢其巾衣鈐縫糊名書易隙投凡此者士奚以應上之求而求之者亦奚使士此為哉然纁聘輪徴之徒固亦有引經飾詐曲學附人者矣而光偉峻超之業如宋王李韓范諸人則又往往自科目中出故知儒言者非言心者也程朱二公教人初不使之舉業廢也第曰勿令奪志耳然朱公實亦科目中出斯不可以觀學乎哉夫天下有不可易之勢亦有不可易之學自選舉之法亡而科舉之制興于是上不得不科目設而求而士亦不得不科目應而出是謂不可易之勢研經以求心因文以彰學措功考業罔惑初志是謂不可易之學故曰易勢非時易學非士今仁聖之朝治融化濡文禮陶士設科賓之不可謂非時矣非經不業切務則文斥浮屏華鏤雕靡尚士不可謂非學矣賔之于鄉偕計吏而上又不可謂非其應而出矣夫學出而必行者也士自今求初志如程朱教哉抑以科目為筌蹄將遂兔魚乎計也夫志士尚友近則景其鄉先生河南宋所都也實王李韓范諸人立業之地然二程倡心學又實起于洛伊士出將景之以行其學乎抑飾詐曲學者倫也且夫獲士者獲文焉耳不敢謂獲非士者獲公焉耳士他日誠易其學諸事試事者將文焉公焉委矣士何以自委哉於乎慎哉慎哉是試也御馬監太監孫清以鎮守至工部右侍郎趙璜以治河至監察御史袁澤以清軍至刑部郎中馬文以録刑至工部員外張正蒙唐升以考工至行人孫慎以秉禮至而河南諸司贊試于外者則右布政使胡玥按察使陳奎左參政楊志學右參政王震副使文皓韓俊左參議宋冕右參議石昭僉事何正王鏜李鉞韓亷閻欽而諸在內者録有姓名兹不書云孫生送行卷後序贈行詩一卷凡若干篇蓋朝之諸大夫為孫生作也生故鄒平人年十六入太學能修其業有聲譽籍籍縉紳間故諸大夫皆內交焉太學五年入譯館為譯館生又能修其業有聲籍籍也居六年業成而將仕乃一旦翻然曰吾久在外吾親老孰為養者不歸吾無以為子也即日上書皇帝闕下上憫其情而允之遂束裝歸諸大夫相告曰吾屬在朝所內交者亦衆矣然少年而修其業有聲譽籍籍如孫生者幾人也即有能修其業有聲譽籍籍如孫生者然將仕矣而又能思其親遂一旦去者幾人也是惡可以弗有言也此詩之所以作也詩之作蓋在𢎞治丁巳春又十一年為正德戊辰生來京師會豫逆旅中出其卷以相示已而愀然曰鄉也吾得諸大夫之詩也以為吾親榮吾未嘗以去左右今吾親墓木已拱而卷中之人有去者有死者有仕於四方者而吾亦老矣而在朝者幾人也言既欷歔以泣豫感其意為之辭以志之然又恨諸大夫之不及見其終身慕也華泉集卷九
