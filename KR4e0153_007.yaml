聞閭里動歡聲防邊不在多戎馬只有人心是甲兵題賈園四首濼水橋西一畝宫小窗春度碧荷風老夫野性無拘束便欲移家向此中門巷沈沈草徑紆緑槐深護野人居鳥聲不斷日亭午時有小童來捕魚樹繞園亭水漫池西溪風物最宜詩即教痛飲成深醉莫遣空懸别後思靡靡菰蒲傍水涯粼粼白石映青鞋今年欲此消長夏合扁君堂作我齋舟行近滄洲白雲渺渺水悠悠兩岸蘆花覆釣舟年少自知官紱在尋常不敢問滄洲湖上雜興四首雲水地臨三憲節江湖天放一漁舟虛煩倚樹看黃帽耐可乘槎漾碧流漾漾蓮舟繫古槎沈沈波影照烏紗多情最喜臺中客乘興能看水際花水岸風回晚更涼菰蒲零亂拂衣裳扁舟莫到花深處恐礙波心片月光萬竹陰陰暑氣微主人迎客敞山扉翻愁使節傳呼近驚起舟前白鷺飛昌平廢縣層阿回眺獨行行日落春山煙霧生山下荒城隱叢薄路人云是古昌平山行即事二首山徑春深滿緑苔景陵東去轉縈回忽逢樵父驚相問言自黃花鎮裏來陵署青青生午煙山渠㶁㶁響春泉白頭宫監松林下間説英皇北狩年草場牧馬場邊苜蓿香回龍宫外樹蒼蒼當年駿骨今何處曽被金鞍侍武皇栁塘雜興四首汲水澆花栁貫魚草堂巢燕暮春餘要知開徑誅茅意不為濃陰好讀書御溝東畔栁成林御水盈盈十里陰白馬青衫橋上客春來多少故園心琴臺書榭緑陰深杖履時時隔水尋間過永明湖上看幾家桃李自成隂塘煙漠漠水迢迢搖蕩春風幾萬條不傍御園歌舞地只愁宮女妬纎腰泰山回馬嶺回馬嶺前春日西澗花巖樹鬱萋萋上方鐘落不知處惟見白雲巖畔棲貞女祠長城在秦那在齊齊山古寺春草萋千載哭夫能變俗至今猶説杞梁妻鹿門山龎公舊隱鹿門山近在襄城漢水間石洞草荒無路入夕陽時見鳥飛還習池習家池上草萋萋流水成渠稻作畦山簡不來遊客散居人猶唱白銅鞮峴山大樹蕭蕭白日寒羊公祠下獨憑欄尋常一種青山石長使行人灑淚看望嶽亭為王生作時其父戍雲中東嶽名髙四海間此山之外更無山何時倚杖青雲上與爾朝登復暮攀望嶽亭臨河水隈碧窗遙對孔林開誰知仰止平生意不為巖巖氣象來岱宗西與太行臨嵐翠霏微曉不分底是靈州狄刺史不看巖障只看雲汴上題吳國賔園林沙海原南古戰場曲池荒畎蔭堤長相逢折得芙蕖贈莫向西風笑冷香大堤大堤女兒花見羞大堤楊栁映青樓金壺滿注樊城酒醉殺狂夫不解愁梨雲軒獨坐有懷睡起僧房日未斜興來隨處即為家美人不見幽期渺間對蒼黃數落花楝塘歌楝塘老人塘上遊颯颯西風吹素秋記得看花三四月滿塘紅紫映波流姚園次亭溪韻竹塢柴關破曉開石池花徑轉縈回春深漫有尋芳興老近慚非作賦才散步零零宵露濕春堤楊栁風清曉月低童子莫愁江路滑老夫扶老有青藜觀風望雲雲浮劔閣夜英英白馬江邊踏月行傳語啼猿莫相近恐教遊子不勝情飲菊泉二首雨色巖花入牖斜城中風景似山家橫琴不奏朱絃調對菊惟看白玉花十月霜庭菊正肥亭亭寒影照山扉野夫本是淵明侣可怪淹留夜不歸或曰雖有寓意然非善言故改作紅芳瘦盡緑陰肥幽鳥枝頭自在棲一日天風吹羽翮上林便作好聲啼浙人自遼囊父櫬返葬感其事為賦客衣零落鬢毛斑迢遞沙場負骨還三尺古碑千載恨曹娥江上水潺潺避喧二首興在桃源山水間幅巾藜杖每忘還沙田雨濕青牛卧石洞花深白鹿間北窗無人春睡安時聞春樹鳥關關老翁元是避喧者又欲移家向别山五月五日以扇奉寄二親侑以小詩二首迢迢親舍白雲下長日登樓思有餘代谷燕山空説近經時不見一封書薰風簾幕燕翻翻庭際榴花火欲然睡起忽生千里思慈顔一别又三年示弟賦鴈門秋髙多烈風煙沙極目見雲中憐君弓馬年來慣不數翩翩塞上雄插秧歌紅石岡頭夜雨晴湖田水滿接堤平行人欲問年豐儉試向田中聽鼓聲促梅次韻庭下梅花開未開帝孫邀月久停杯終知不入繁華夢莫遣笙歌取次催曉起口號春眠不奈鳥聲催起立荒園傍古槐怪底幽尋苦無力夢中曽上故山來聞董汝卿喪內二首草堂雙燕壘新巢坐感琴絲理斷膠麥飯一壺香一瓣此情何處哭芳郊好學平生説仲舒絳帷常坐五更餘春來睡足三竿日應是無人唤讀書寫懷白髮蕭蕭五十春宦途猶作未歸人何時杖履柴門路風景依然逺俗塵吳竹齋惠藥品六月漳河艤客舟小窗間卧白雲秋憐君饋藥如康子不療山翁四海憂田家栁覆崇垣水護門不依鄰舍自為村何緣却近山陵道日夕時聞車馬喧薛汝茂乞蓮栽薛家池中千葉蓮出波今已疊青錢分栽不為看花色要向山窗聽雨眠竹店鋪候髙生不至行盡荒山更涉溪故人聞説在城西空庭日午車馬寂惟有鵓鴣深樹啼遊仙詞四章夀楊母次劉五清韻翡翠衣裳雲母軿往來常在碧霄行老君臺上凌風過王母池邊看月生一寸靈光萬古心笑看烏兔兩升沉已遣夀顔同紫玉更欺仙骨比黃金冉冉霓旌覆羽仙雙雙玄鶴舞芳筵眼看庭樹真瓊樹不數藍田是玉田江流山色繞金堂管領年華入夀觴仙家自與人間别千嵗都來一刻長夀歌三章為松鶴翁作松裊山堂紅日開天風吹鶴下瑶臺傳書為問西王母别後蟠桃熟幾回西園十月菊花黃花底流泉水亦香汲水採花宵釀酒曉筵傾入萬年觴八旬遐齒三齡錫四海升平見七朝潁上漫隨巢父隱渭南還有太公招五言排律留别董三屏次韻晚照長雲合春帆細雨開别離豫正苦魂夢子頻來石路齊南境風花白下臺十年今去國千里獨憐才會有荷裳寄應煩想像裁遊仙巖黃帝昔好道相傳駐此山至今鍊藥處猶見五雲還丹井霞空聚清池水自潺鳯笙歸寂寞龍駕絶追攀曠劫留仙迹何年啓佛關看花周法界鐘鼓隔人寰瀑響千巖應潭虛萬象間排空雲木古夾道翠泉環澗鹿衝人返山花照酒殷寺荒翻雅淡僧老更蕭間問法空羣妄探竒始一斑未能兼吏隱回首愧塵顔白巖太宰寄示新作兼有并刀之貺奉謝一首忽報王孫使新從相府旋下階忘病足開牘醒愁眠碧落仙人字黃初大雅篇空巖泣神鬼白日走雲煙䇿杖東峰外看碑北嶽前依微穿雪竇想像俯春泉客路千餘里離心兩隔年倦遊甘散拙髙舉謝聨翩水國身猶寄山堂夢屢牽愧非清廟質虛枉佩刀傳贈張御醫九齡故居移杏圃新寵沐楓宸天馬飛黃日雲龍際會辰華陀初入魏扁鵲舊鳴秦術妙乾坤祕功存社稷臣東衢迎寶鏹西第擁朱輪家是華胥國人呼有腳春翻嗟縫掖士章句老風塵遊仙詞贈李羽士擬初唐四子體碧落新移牒玄津晚繫槎天臨北斗地人住上清家樹古金壇靜花深玉洞斜靈砂飛綘雪仙醴注青霞緱嶺音書密函關道路遐月明蒼鶴羽風度紫鸞車幾見桃成實重聞海變沙瑶窗禮星後間坐讀南華賦得白鷺洲送柴墟儲中丞路轉長干渡洲傳白鷺名滄波去不息緑芷復叢生隱隱江田抱團團堰日明鏃沙沈壁壘牆堞隱臺城湍古晴霓下蒲深晝虎行漁人牽網迹商女踏歌聲佳麗千年恨豪華六代情經過夕臨眺誰並客舟橫送金中丞赴延綏上郡防戎切中丞入陜遙隼旗明曉甸鐃吹轉春橋二月花新綴三川雪正消北門來冦凖西極使班超國仗和戎利人傳破膽謡按圖收地險堅壁阻天驕禮樂欽儒將經綸翊聖朝長城一身是詎數霍嫖姚送許中丞德新赴甘肅暫布山東化還為隴右行中丞新受敕賤子舊知名玉露承冠劍金颷捲斾旌神羊心自直孤隼勢初橫地接祈連寨星羅冒頓營未須懷破斧先喜號長城草映邊雲白沙流漢月明陜人歌召伯關吏識終生許國知公志通家是我情離筵忽隔水秋望轉盈盈送唐京兆送母還邵陽奉詔還將母南歸樂未涯日明吳苑樹風引邵陵槎萬里遙瞻闕三湘近接家望灘懷孔雀臨洞識桃花夀祝青山永書傳碧海遐趙張前史艷曽閔後人誇去值桑蠶老迎看竹馬斜却憐春别苦飛絮滿江沙送别白樓先生次郭司業韻曉騎傳中旨春曹陟上卿樂推吳季札經許鄭康成車馬秋江出鄉邦晝錦行論交襪始結惜别蓋初傾拜手雙龍闕承恩五鳳城御階聽曵履樞密待持衡制作登三殿聲華振八瀛新班岱嶽重舊寺雪山輕古貌看常健氷銜列自清英英伯夷志垂白轉精明繡斧西征為何輔之御史作蜀道軍容使秋風振旅還功成萬里外捷報五雲間電掃妖氛滅川流戰血殷漢兵隨指顧蕃部凛威顔曉坐轅門靜宵登劍閣間丹心懸海日繡斧照江關飲馬瞿唐峽封刀麥子山班超桓典後芳駕幾人攀題芳洲書屋為俞大參作見説林居勝清江繞舍流元方登瑣闥小謝隱滄洲草蒨辰占麗梧飄嵗識秋煙霞互吞吐鷗鷺接飛浮日有髙軒過時同靜者遊麈揮山榻冷棋對竹窗幽寶笈通三昧牙籖富九丘側聞能尚志應不愛封侯薇省牽魂夢萸樽阻唱酬詎諳方嶽寄深切廟廊憂聽吳子談吳中事吳子近南遊龍江復虎丘三分形勝地六代帝王州望月晴臨嶠聽潮夜泛舟寶珠商女得靈劍海人求去日蘼蕪緑歸來菡蓞秋逢宵話竒賞吾興亦雲浮長短句送顧華玉席上分體得三五七言送歸客送歸客東城復西苑碧草萋萋别路長蒼山厯厯愁心逺愁心逺征駕不可留去年送歸陌上雪今年送歸江上秋江上秋江雨霽返照入林光翳翳家在齊川未得歸年年送客來沙際送歸客請客聽我歌我如水中鳬君如江上波波流去不息鳬飛無逺翼回橋轉岸君已遙薄暮徘回此何極燒荒風怒號振城瓦塞草白朔雲赭漢兵出火掃蕩原野祝融馳炎帝下騰赤龍走朱馬雲濤沸星雨灑黃沙一望千里通魍魎書啼巢穴空敵人臨水不敢過將軍歸來閉關坐吳將軍課子大兒龍小兒虎碌碌犬與豚眼中何足數將軍回獵騎帳下斑衣舞天河東傾月西落蘭膏夜射簾珠薄庭槐烏鳥棲復驚弦誦聲髙應金柝將有法兵有機吁嗟易聞不易知長平一坑萬人死君不見邯鄲子題風木遺哀卷苫為席塊為枕憔悴孤兒墓田寢墓田樹聲蕭蕭寒濤捲空風葉飄樹不止風不息孤兒欲化田中石題趙訓夫海屋添籌卷海上屋幾千尺麗日起扶桑鱗鱗曙煙碧仙籌刻玉雲花湛海塵一飛籌一點借問仙翁夀幾何十屋仙籌充畫檻仙翁家住海中村平原公子宋王孫相逢欲訪桑田事雙鶴何年下海門光復堂詩巋巋光復堂湯湯嵗寒溪故家世業傳江西他園豈無木重是祖手植他地豈無土重是祖手闢物生各有主天道終好還嵐光映朝牖不改門前山堂有趾溪有涘我溪不竭堂永峙六言送客舟橫斷岸日斜鴈度空山落霞欲採芙蓉贈逺秋江何處天涯湖上二首一溪流水秋碧兩岸垂楊晝陰絶愛王家池館酒旗低拂波心田田蓮葉洲北寂寂孤亭水南恐有人來摘取淆他萬頃清潭靳莊鋪坐雨次沈休翁韻村南村北雲山亭外亭中煙景東巖過客重來蘿徑蕭蕭薄暝鳥啼千樹萬樹雲起前山後山門外青春向晚雨中遊客西還黃山店趙山家人西山半銜落日東嶺尚宿歸雲雨過荒村向暮柴門流水沄沄瓠葉翻翻雨驟竹枝裊裊風斜忽見緑柳花發猶疑春在山家流鶯百囀深樹巢燕雙飛短簾過客不慙阮籍主人只似陶潛煙中白鳥雙度草際黃牛獨還山寺暮鐘何處隨風飄落人間蔡石岡寄瓶梨綴樹同梅止渴登筵比蔗生津却憶帝爐燒賜曽分衣白山人淮北滎南接境凍姿霜色含秋如得此君萬顆豈論千户封侯不緣摘取商洛定自傳分秣陵笑殺山妻鄙俗安排慢火相蒸武帝巡遊不返文園渴病難除誰致內林一顆且成封禪之書送范侍御蘇山北上四首隼旟低拂垂栁驄馬嬌嘶落花碣石春風萬里盧溝曉月千家生憎白雲春去無奈黃鶯晝啼欲採芙蓉贈逺北湖蓮葉初齊廊廟江湖身世先憂後樂心情本是仲淹孫子怪來夷夏知名君山已歸地下燕泉却在天南落落故人如此蕭蕭短髮何堪六言近體贈錢世恩向風征馬頻嘶獨客行吟古堤百里文星斗下三年水部河西遙心浦樹煙渺短夢城烏曙啼記取今宵醉别雪堂燈火凄凄華泉集卷七
