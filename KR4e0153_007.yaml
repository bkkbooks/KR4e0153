body:
  text: 華泉集卷七明邊貢撰詩集五言絶句十六夜春城燈火靜華月滿天街陌上歸來晚香塵有墮叉中元見月甲子嵗坐愛清光好更深不下樓不因逢閏月今夜是中秋董啓之按滇過鄞省母夫人焚黃于父墓作難將寸草心報得三春暉十章贈之垂栁拂征鞍雨中行路難河梁一分手山疊水漫漫嵗月交心久江潭别路長手中雙白璧持贈比干將離心似明月皎皎在方寸但令光不遺道逺何足恨北堂天未晚遊子歸來早堂前一夜風開遍宜男草白髮對青芩日髙江院深豸冠階下舞好慰柏舟心荒壠薦秋蘋深恩詎能報嗟嗟死後封猶是生前誥人生重鄉邦歧路苦南北簡書限王程欲住不可得嵗嵗中臺使巡行道十三要知君厯處風土接交南萬里炎荒地經冬復厯春帝星臨柱史休祀碧雞神繍斧肅霜威澄清志不違瘴鄉人拭目驚喜見晴暉寄王升舍人二首不見王子猷經春復厯夏有時中宵夢宛到君堂下獨把重陽酒西風白雁回江南菊花早應傍美人開送于利四首送君城南橋笑折城南栁歸來掩關坐皎月當窗牖霜下夜已久清軒調玉琴凄涼湘水曲窈窕白頭吟一别春城雨兩回秋月圓燈前不盡醉書札但空傳離腸似連環宛轉不可絶相送淮水秋相思燕地雪送馮侍御允中還郴離館背寒塘霜清野菊芳美人千里去明日是重陽驄馬逝駸駸蒼林蔭長陌憐君楚雲外獨作秋江客送客四首相思若連環宛轉不可絶那知汴上逢却是關西别梁苑送君處溫風吹客衣盈盈春暮感不為落紅稀故人滿秦隴為寄一言拜問我今若何病多慵束帶日照昆明水雲開少華峰夢魂登覽處白髮倚青松雜畫十一首為儲柴墟題日出打魚去日斜沽酒還漁翁家不逺只隔岸西山藹藹古城暮遙遙車馬度同為城外人不識城中路北風吹大雪向夕滿空山遙見山中客懸燈草屋間雞鳴山店昏四郊風雨辰蒼茫野田際愁殺獨行人田家春酒熟野老日相過醉别衡門外山鶯啼緑蘿江水春春碧江門晝晝開荒村過客少獨自掃蒼苔道上秋雨過道傍秋樹紅采樵歸樹晚吹笛月明中閉門聽春雨開門寡行旅借問橋上翁河水深幾許征夫慕前侣杳藹出幽林欲渡溪橋去山中暮雪深鳥啼青石岡日照紅泥坂杳杳雲外鐘山僧獨歸晚上山行采薇下山行苦飢山風夕凜凜吹笠復吹衣畫上四首放舟前溪水水文白如練風吹絲裊裊驚起沙中燕煙霞變陂水山照暖楓林不聽舟中語誰知江上心月色沙上淡山雲天際浮春江萬里濶獨見一漁舟經旬不出戶忘却城南道江亭細雨過一夜生春草題孫志同侍郎扇圖青青山上松繚之以白雲雲山不可到圖畫只空聞山木各有林烈士各有心借問種松意悠悠江漢深題畫手種江頭樹成林已數秋寄言樵採客留繫木蘭舟畫三首近浦寒潮落平沙返照紅不嫌歸路晚家在板橋東旭日上東峯山人睡正濃洞門無鎖鑰長是白雲封琴罷興不盡起登江上臺水空秋萬里不見一舟來方日升雜畫雞雛不離母離母聲不休如何宦途人嵗嵗天邊遊右雞雛枇杷江外果感念主恩深長憶叨供奉朝回滿袖金右枇杷異質人所貴能令鼠窟虛如何北窗下間卧飽溪魚右獅子貓迢迢越裳國萬里獻珍禽不覩周王化誰知姬旦心右白雉題子立扇頭江靜無飛鳥亭空有落花主人何所在沽酒向漁家題賈子扇頭回風起船頭激浪落船內生憎木蘭橈搖蕩日光碎題扇面小景四首秋樹鳥聲寂夕陽山影沈遙憐抱琴者不為訪知音獨坐草堂餘涼風水閣虛門前相訪者應有載來書罷釣歸來晚前溪水正深臨橋不敢渡誰識此翁心茅堂枕江涯種竹只九箇時有清風來還同故人坐畫竹石染湘江淚真涵太極情百年雙老眼相對兩無聲題林醫士畫册江上春潮靜舟中日似年不須生羽翼無事即神仙中秋慈恩寺登眺過崇國寺分體二首東寺復西寺朝遊還暮遊百年塵迹裏同醉幾中秋寒月出關山秋窗白如曙空流雲中影不照雲中戍西園八景朝看長白山暮看長白山山色有朝暮吾心常自間清川映白石遊魚止復行共有臨淵羡能無結網情月落古堤上人行春陌頭曉煙如有意長伴緑楊樓初日照園桃盈盈散霞綺主人窗中坐顔色宛相似共道農家事辛勤在一春靜觀田野際多少輟耕人近浦寒煙上平沙落鴈遙行人欲歸去舟子故招招寒泉冽古井上有雙梧桐借問往來者誰知疏鑿功城外望城中朝來氣逾爽吾心浩然者入夜還能長泛南湖十首聞道南湖曲芙蓉似錦張如何一夜雨空見水茫茫水殿穿湖入風闌過雨憑微微夕陽外時見出林僧盈盈緑水際泛泛白鵝羣借問乘舟客何如王右軍碧樹圍青殿朱垣接紺堤王孫罕遊豫馳路草萋萋風恬湖水平畫舸月中行不見漁父處但聞漁笛聲泛泛白鷗鳥悠悠長自隨憶君何處切湖上月明時深淺元無定行舠識水頻急流天下險最好是平津嫋嫋暮風細團團秋月明沙河聞不逺起我故山情赤日亂青霞照我湖中艑來船時借問前途水深淺睡起看雲坐玄心入杳冥吾將訪蓬島雙棹莫教停自泉上歸登西門樓落日照行蓋涼風吹不休未消臨水興還倚對山樓集江淹句白日隱寒樹層陰萬里生歸人望煙火嵗晏返柴荆雜咏四首黃金滿歸槖白日行亦懼道左遺愛碑賊來將不去乳燕巢古堤流鶯度層閣試看白馬郎金丸向誰落東山雷殷殷南澗雨冥冥愛爾衡門下團團松蓋青行人爭渡急江黑雨鳴船戢戢中林鳥歸飛薄暮前山中雜詩下馬古寺門偶與山僧遇相對兩不言蟬聲在髙樹園果垂丹實園丁日夜看未曽供寢廟不敢獻中官無題二首楊栁三春暮沙場萬里餘紫騮何日返空有寄來書庭際何所有有萱復有芋自聞秋雨聲不種芭蕉樹冬至上陵途中雜咏八首鴉啼古城上月落古城闉城外車馬道清風飄素塵蒼蒼土門口日出逢樵叟問爾何事來山中苦無酒沙苑平如掌青青苜蓿痕昔時放馬地今作牧牛村朝從田父飯憩馬古林西村雞不知曙日髙猶自啼蜿蜿野田中白鷺靜如掃停鞭問征客云是居庸道枯楊臨大堤上有鸜鵒窠春風幾日至會使緑陰多山中風日暖藹藹似初春亂石牛羊徑時逢掃葉人月出東陵峯照見西陵樹何事同心子山中不相遇同台峯熊侍御看花四首嫋嫋葉含雨菲菲香近人如何向陽蕊開花向陽春秀色紅翻坐濃陰緑繞階覷花還拄杖衝雨不憐鞋借問雨中好何如晴後看錦江紅濕處應記獨憑闌室靜客稀賞地偏花更清自開還自落宛似野人情題內兄子立扇頭斜日清源北浮雲岱嶽東故山歸路好不得與君同七言絶句寄李顯之逆旅逢秋感倍深美人何處坐鳴琴南宫只隔西河水一夜相思萬里心集杜句贈胡三良醫此身飄泊苦西東未就丹砂愧葛洪多病所須惟藥物知君才是濟川功卿到朝廷説老翁秋來相顧尚飄蓬釣竿欲拂珊瑚樹未掣鯨魚碧海中長開篋笥擬心神巾拂香餘搗藥塵詞翰升堂為君掃已知仙客意相親斷腸分手各風煙肺病幾時朝日邊同輦隨君侍君側自稱臣是酒中仙春日雜興集杜句二月已破三月來百年多病獨登臺支離東北風塵際懷抱何時得好開柴門空閉鎖松筠燕子銜泥兩度新不是尚書期不顧故園猶得見殘春未有涓埃答聖朝便應華髮老漁樵東流江水西飛燕人事音書漫寂寥自從官馬送還官信有人間行路難獨在陰崖結茅屋強移棲息一枝安七月七日同侍御毛東塘渡河遇風偶然同渡不同舟風到揚帆共逆流莫謂狂瀾無砥柱嵩行千古鎮中州迎鑾曲二十首和劉希尹之作南幸三吳北幸幽乾坤開闢兩神州文儒自守髙皇訓武將誰分聖主憂金陵自古帝王都碧石清江儼畫圖五聖百年虛想像鸞輿曽到此間無滚滚飛塵千里餘驛途來往日無虛皇心旦夕懷慈聖數遣中官問起居石頭城如銀虎盤金陵山似玉龍蟠休訝六軍停蹕久本來江左是長安緑栁陰中顯赭黃路人爭説見君王只為薦新供寢廟水邊終日打魚忙孝陵重樹紫金山王氣蔥蔥碧漢間靈殿本無荒草入掃除霜露始應還自采民風問老農微行不遣近官從那知天子關天象到處雲成五色龍羽蓋霓旌曉出遊紺霞紅日映江流雲中帝子三千闕海上仙人十二樓青龍山下虎蹄新玄武湖中躍錦鱗錯意吾皇好漁獵不知端訪後車人揚子江頭駐六師太平天子賞功時紅雲影亂黃龍艦白日光搖繡虎旗弓如滿月向江開箭插寒潮捲浪回水上黿鼉莫深避我皇元為射蛟來江口傳呼大駕臨順流風雨注江心風起半山羣虎嘯雨來深水一龍吟大君仁聖迥非常逺似唐宗近宋皇訪道先過趙普宅哀賢還弔魏徵喪潮落江門煙水秋雲帆八月過揚州兩京馳道三千里夾岸垂楊接御溝翩翩龍馬控雕戈白日清秋沛上過聖主守邊思猛士臨風髙詠大風歌九月南征九月回清源黃菊趁時開何人得似行宫蕊兩度親承萬夀杯瑟瑟金風鳴玉鑾路車何日到長安官河不似江濤險只恐秋深白露寒疊鼓凝笳入禁中似聞韶樂奏南風通明殿敞秋雲碧閶闔樓開曉日紅雪殿雲墀列羽旄天王開宴賞勳勞封侯未賜將軍印歸馬先分戰士袍郊祀元居百禮先史文虛擬闕今年小臣曽讀三王紀冬至由來始祭天凱歌五首日射江流生紫氛喧喧鐃吹隔江聞江頭巨石髙千尺好勒元戎破賊勳帳前銀甲映朱旄帳外牙旗捲日髙白書紅塵飛一騎尚方新賜玉麟袍虎豹鯨魚一夜擒湖南湖北動歡心論功宜並衡山峻比德還同漢水深秋水沈沈漾列星盤渦殷殷鬪雷霆扁舟昨夜巴陵過風起猶聞戰血腥鳳儀獸舞盡來王犬豕何知悖且狂髙壘固巢今不見麻洋灘下水湯湯秋日過西內團殿御溝東畔古松盤曾得先皇倚笑看龍馭不歸鸞吹杳石廊圓殿鎮秋寒雲中曲二首六軍歌舞健長征五色雲隨九仭旌傳語單于休近塞太平天子駐天城萬嵗聲歡四海聞大同新䇿破戎勳漢文可是勤邊主按轡間過細栁營感事八首天山戎馬本天驕入貢能輕道路遙底事內兵翻作亂禍胎疑自武宗朝一自甘州殺憲臣國家綱紀似秋塵各邊聲勢元相倚緩急誰為死力人代郡城中十萬家膏粱珠翠甚繁華兵殘火烈須臾事女哭男啼亦可嗟宣府雲中五日程朱門王子白衣行回頭却向西山哭玉眷金昆知死生諸將邀勳各逞能邊軍反側寢還興撫哺休誇桂元帥綏來還有蔡中丞紫荆西望白雲山腹裏雲中指顧間好降絲綸促諸將急操兵馬備三關城中金鼓晝逄逄城上髙懸首級雙二十四家同日死自今休更説招降白日城門四不開就中情狀頗難猜乘時早定安邊計只恐春深牧馬來宫詞次陳以道韻佳麗曽矜得寵先後宫歌舞一當干那知寵極能生妬不是青娥誤少年次白巖韻甲申除夕五首前山雲接後山煙可道公歸是偶然霖雨出山知有日入山親紀甲申年北窗間卧讀南華出處吾生信有涯五色曉雲天子宅一籬秋菊野人家黑髮勳名鏡裏看紫宸章疏早辭官間心自愛商山曲懶聽人歌蜀道難落落朝廷醉眼中苦緣憂國願年豐老臣心事如工部只有升沈迹未同留公無計奈公何外國中朝屬望多此日同為太行賦幾時重和慶雲歌趙文昌中乙榜雨中感懷見遺走筆和答華髮王門晚拜官齊竽聲裏獨成嘆何人為薦長沙傅一見文皇獻治安十日春無一日晴客堂沽酒莫辭傾紙窗風信梨花雨惱亂歸心是此聲撚斷吟鬚字未安短歌聊爾代長嘆春風座上無邊景漫道儒官是冷官春歸花落鳥無聲一夜間愁帶雨傾自古浮雲本無定漫將消息問陰晴答灤江王中丞見懷之作院臺深處緑陰屯松下棊枰竹下尊苦憶去年歡賞地碧天如水月當門贈北山周子二首宦接鄉山事已稀謫居猶得近王畿勸君今夜且雄飲明日出城風葉飛華髮青袍不染塵宦程回復主恩新縣人爭説中都宰曽向雲霄忤貴人答台峰侍御見候三首斜日照雨明霜臺紅花白花相映開野老愛花情太劇不須招致也能來葵花半紅山雨來不辭沾濕看花開主人莫掃花前徑恐破青陰與緑苔一尊花底思悠然落日空庭席屢前酒熟共歡遊此地花開誰與坐明年寄薑廷輔王升店前秋草生秦皇臺畔暮蟬鳴海翁欲訪無人識何處孤舟短笛橫胡菊泉惠我丈菊走筆謝答四首菊花元自菊泉分見菊真如即對君安得對君還見菊短籬斜日坐秋薰丈菊亭亭入座新白花輝映白綸巾生來自有凌雲志可是孤髙不近人一枝分取到山家月映疏籬水映花欲把贈梅詩贈菊暗香浮動影橫斜月閏逢秋菊早芳盛開還喜近重陽休憐閴寂朝臨水且看孤清晚耐霜贈王松溪四首月下山車往復回秋深歧路滿青苔不緣鄉飲邀賓坐肯向城池故故來暮春庭館見花稀黃鳥嚶嚶燕子飛堂北假山苔蘚蝕祇應偏待主人歸雨過茅屋秋草生霜凄榆塞候禽鳴間來倚杖柴門外童子騎牛短笛橫十年離思一宵同坐歇寒鐘意不窮碧草未舒湖石畔黃花爭艷竹籬中次棠陵韻題黑菊贈石岡圖史春行滿客囊此中偏載晚籬香臨歧欲採寒花贈似隔盈盈水一方次白洲韻贈黃教授二首賈生只合住長沙三載江陵却寄家雲靜碧天秋日午講堂吟對木樨花春日􅓺宫花正開宫前宫後錦成堆如今南郡多桃李盡是黃公種得來寄洪山人二首隱君家住白雲間不愛功名只愛間聞説花園新更好門前流水屋中山卧牛山前春草肥華陽宫外雨霏霏主人侵曉踏青去日暮家童扶醉歸題梅贈華山人夢裏神交幾見親畫中還比夢時真嵗寒心事東風面人與梅花一樣春憫雨奉答白巖光祿故鄉風景夢依然魚浦窗西兔嶺顛誰道不歸歸未得芙蕖窗下抱愁眠赤日簾櫳如火然野夫懷秋病欲顛安得海風吹霹靂九淵呼起蟄龍眠東潭寧子將赴潛山以棊几留贈荒涼棋社隔秋春世事年來著著新眼底相逢論成敗誰知當局苦心人髹几文楸光照雲僧堂長與對斜曛翻愁置我南窗下一度臨棋一憶君泊河口却寄林醫士二首杏子成林竹護牆傍河雲物晝蒼蒼園中似是林家屋過客時聞藥草香凶年老稚多竒病吉水仙人有妙方不用相逢問名字滿城人説是醫王孫塘秀才以芍藥二枝見贈走筆奉謝芍藥開時三月過京華五月見猶多雲栽露種元相異雨驟風狂奈爾何長安日日走塵沙春盡多時不見花蒲州公子能相送醉倒東山處士家贈楊撫軍白馬香風度落花絳桃穠李避妍華長安陌上歸來晚笑指龍樓是外家五月六日柬孔倅艾家河邊蒲葉長扁舟昨日過端陽荆南客路千餘里回首銅臺亦故鄉金陵逢方日升燕市分攜十七春白門相見白頭新鳳凰樓畔含香侣江海飄零有幾人東園徐君送藕栽戲呈短句兼求碧桃玉藕根移玉井髙感君分贈謝君勞書生見慣秋江色且向名園問碧桃題扇寄夀春希尹淮南花雨送春還叢桂陰陰郡閣間自是劉安有仙骨謫居猶近八公山題扇寄錢畫士睡起看圖氣未降丹青誰有筆如杠欲煩畫我茅亭下靜數飛帆涉大江睡起口號戲呈黎仰止兩家兒女對船窗學語真同乳燕雙日午夢回成一莞不知身世在清江題菊贈俞國聲歸無錫次韻逺攜尊酒惠山來夢草情牽對月杯雲際忍聽雙雁别水邊愁見一帆開寄吕思泉次韻京國論交記往年城南風景夢依然春江未卜看花地秋水空歌伐木篇次韻梧山中丞寄别東塘侍史八首宋臺梁館暮霜餘野色蒼茫擁使車馬首不隨南去鴈袖中元有北征書岸葦蕭蕭河水寒驕嘶驄馬鞴銀鞍燕山代谷飛騰過送别無歌行路難行部能教陰雨晴渡河還遣濁流清願磨中嶽山頭石記取西江御史名漫懷家慶感晨昏國士須憑國士論聞道阿翁將阿母花間長日醉清樽諌草書殘驛舍燈翠華衝雪恐難勝回軺莫向春明路見説君王在白登羽蓋飄颻白日臨回光應燭小臣心願同汲黯留中闥更擬相如賦上林每逢朝客轉驚神北望長安幾側身紫禁煙花夾城栁别來今已十畨春閃閃龍旗樹五更煌煌芝火照層城當年奉引趨蹡地曽聽鈞天廣樂聲柬馬公順同年三載風塵一見難每將書札報平安梁園幸是同官地春月春花却自看顔聲寅長惠川扇蜀璽離離金錯光逺隨驄馬過秦梁奉持敢作尋常看一道清風五月霜寄何仲默梁王臺前春草生梁王臺上鳥嚶嚶美人遙在黃金屋客子登臨空復情贈長垣宗室二首鳥語深宫白日斜彩毫濃墨散春霞王孫不學雕蟲技只寫忠花與孝花瑶室青編萬卷餘宫中誰道日間居家臣昨夜長安去猶問君王乞祕書重贈吳國賓漢江明月照歸人萬里秋風一葉身休把客衣輕浣濯此中猶有帝京塵寄閭衛之同府二首客來君寄一雙魚客去還君一紙書欲買扁舟向東下洞庭春浪近何如江上逢君感昔年往來相見陸陵前那知宦迹如萍梗猶得相依一水邊寄京師友人同朝同寺十年情迢遞燕山隔楚城一别天涯今萬里欲從何處望春明贈阮翁三首躍馬橫戈老尚堪時時遊獵過龍潭遙知此日非熊兆不在周南在漢南鶴髮虬鬚八十齡白頭長對峴山青朝來虎帳看雲坐間課諸孫讀武經眉際生毫似髮長採苓時到白雲鄉間來莫向桃源去恐有漁人識阮郎夜宿太常官舍懷元佐二首咫尺東曹信渺然别離何似路三千松窗月色槐陰雨一夜愁心似隔年文園消息近如何酒盞生疏藥裹多却向故山憶舊隱膏肓從古在煙蘿答秦孟陽長史次韻長鑱秋圃自鉏荒望入髙山路渺茫不信愛蓮亭子上有人白日到羲皇塵滿紗帷舊業荒江都雲水暮蒼茫清時不用天人䇿方朔詼諧侍武皇枕上簡獻吉二首自入秋來日日晴看花看月每同行一夜六街風雨惡莫言天不解離情早涼衝曉入紗帷聽雨聽風睡起遲街西咫尺不相見却似河梁别後時諸友二首濟水源南舜井旁月明曽共坐宵長六春暌隔離江路五月相逢是帝鄉雙鴈北來河水平兩岸秋陰蘆荻生黑頭七度曽過此不似今回感别情淮浦歌三章為太僕楊敬之作淮浦泱泱淮水流月明長照浦中樓白鶴青猿好相訪主人今只在滁州清淮蒲荻晚蕭蕭浦口山明欲上潮七里正貪漁艇樂九重無耐鶴書招水蓼花紅淮浦煙晚來鷗鷺下翩翩依沙宿槳當門繫莫是揚家問字船俞國昌大參小松二株鬱鬱青松尺許長似看顔色有風霜何時却覩干霄勢六月濃陰覆草堂寓延津夜起天霽北望東彭太保月明風靜雨初收一鶚橫空萬里秋四海蒼生正翹首秀峰巖下莫遲留得同年寅之管城見寄之作酬答二首翩翩驄馬度秋涯思入風雲句意佳多病獨憐梁苑客閉門髙卧草侵階詩來恰值酒醒餘起步秋庭病忽除喚婦不須愁夜黑老夫今日得明珠東王灤江病裏懷人掩客窗尚聞仙舸在龍江觀音閣下梅花水對雨何時倒玉缸次韻寄王光生四首屋裏琴書屋外田繞庭松樹古藤纒何時却遂東山約間伴先生樂暮年緑陰回首代紅英客舍流光只可驚病起偶寬書簿債獨將尊酒向誰傾博得荆南五袴歌一錢囊底奈貧何匣中猶有龍泉在間就巴江石上磨一麾江郡領塵官何似山中菽水歡梁楚板輿平似砥憑君休説路行難口號呈問龎二少府黃鶴樓前夜泊舟葦花楓葉似江州樂天本是多情客卧聽歌聲起别愁內弟文甫至清河一見而别題扇贈之逆旅相逢意惘然四年魂夢一燈前即教乍見還分手猶勝山陰雪夜船謝東園送菊薄暮霜籬景色加名園分得嵗寒花誰知建業騷人館不是潯陽處士家寄間齋少宰四首次白巖韻𨝍江西路泝流風城郭山林道路通兄弟自為真率會秪應隨儉復隨豐腰裊燕臺白玉珂水亭山寺賞吟多相看已恨俱華髮更奈蒼江逺别何登臨隨處見題名想像當年載酒行山翠不遮牛首寺江流長抱石頭城竹門瀟灑對江開中有髙亭扁快哉為問亭中二仙客幾時騎鶴上蓬萊瑞卿留别以答揚舲無奈客心何暑雨平添潞水波草閣驛亭談笑别碧山回首暮雲多題白頭翁鳥圖送友人歸蜀省覲短棹長江下蜀州家中風景畫中收蒲牙出水荷錢小一笑相看兩白頭唐仁夫出使廣西四首碧衣黃簡照青春寵宴傳呼出尚珍辭罷閣門東上馬道傍羅列拜王臣樓船風景入春多鐃吹聲中故里過兩岸緑楊陰不斷隔江知是栁州河手捧鸞書下九天恩光初到墓門前山川不改孤兒恨風木蕭蕭似往年十年知已一綈袍萬里南雲望爾勞待得明年好春日牡丹花裏候旌旄送錢水部致仕次杭秋官韻虎頭將軍圖畫竒成都待詔功名遲春風草草拂衣去投老相尋知幾時冥鴻杳杳碧天秋虞人網羅空復求朔地苦寒江渚燠常時虛擬稻粱謀青門挂冠春欲暮白首放歌江上歸野老相逢話朝市龍飛天子正垂衣老子田園歸興豪已將功業付兒曹庭中手種梧桐樹他日朝陽看鳳毛蓮葉田田溪日曛竹竿裊裊白鷗羣水南即是長洲苑杳靄歌聲穿暮雲東觀雞號風雨冥十年通籍綰銀青栖栖不向故山去兀兀窮愁何以醒秦州石經半埋土蘚剝苔封誰為開憑君覔取吳中本江上雲帆日往來送顧侍御出守馬湖五首露冕南征火井西東過漉水北泥溪借問鄉愁何處切千山明月子規啼五馬驕嘶錦水隈雙旌遙指劍門開巴童吹笛羌兒舞重見文翁鎮蜀來五月瀘州蕉葉黃武侯祠下水如湯行人莫惡南中熱自有參天古柏長古箐人稀秋草深碧松蒼檜接陰森髙樓永日彈棊暇海北天南萬里心漢家驛路止牂牁相望龍湖路幾何聞説夜郎天更逺潯陽李白亦經過送潘伯振守漢中三首石棧凌雲鳥路賒漢中城府枕三巴風林落葉猿聲滿那得行人不憶家白馬河邊春日晴黃牛山下百花明家家耒耜居民出太守來時親課耕金城戶曹張鳳翔埋玉空山宿草長天上故人驅五馬經過流涕問孤孀送蘇通判四首天涯相見地曹郎郡閣清尊夜語長休向燈前易成别江頭春水正茫茫曽並長安逐馬蹄謫居同過楚雲西他年縱有看花句休向玄都觀裏題去嵗秋風别省闈木樨花落雨霏霏那知此日江陵郡春草連天送客歸春風江閣喜同遊苦恨逢君不少留東去巴陵三日路幾時同上嶽陽樓送張元亮二首知君元在識君先水國相逢亦偶然何日一尊還逺别暮雲春樹暗江天冉冉遊雲覆短簷霏霏寒靄度重簾羇懷正苦逢春别行李何妨入夜淹送林贊賢醫士歸臨清四首送君濼源溪水濱岸桃堤栁俱鮮新黃鸝聲中白日晚又是鄉園一度春林花欲開春草生村煙漠漠午雞鳴君行落魄似阮籍休嘆路歧縱復橫臘月驅車東郡來元宵今始雪中回臨清城外成林杏盡是州人為爾栽雞聲喔喔宵近庭出户忽聞春雨腥西江髙士别我去日出煙消山更青送賈廷臣司訓二首行李蕭條石徑荒賈生東去路茫茫盧龍不是長沙地莫把吾皇比漢皇卑耳溪邊秋草深裂坡山北樹陰陰西風匹馬弔孤竹一曲商歌千古心送毛東塘侍御北還後懷寄八首汴上相逢一載餘五雲回首送軺車河梁别意真堪畫行李蕭蕭幾卷書霜雲千里朔風寒豸錦貂裘獨據鞍大厦如今要梁棟憑君歸報得材難夜來風雨曉來晴萬里無塵海嶽清白日共看驄馬色青天不負使君名漫談時事共傷神白首丹心許國身歸覲正逢長至節六陰行且見陽春榮親報國皆吾事孝子忠臣只此心聞説致身同養志莫分朝市與山林客窗風雨對寒燈午夜懷人思不勝梁苑宋臺秋色裏也應回首憶同登别來公署易黃昏心曲憑誰與細論宦海風波無定處相逢何日對芳樽夢回欹枕夜三更煙樹微茫隔衛城獨向屋梁驚落月不堪還聽雁來聲衛輝阻雨奉别幸菴彭太保宦情時事劇秋雲話到傷心不忍聞别夢迢迢似明月漢關楚塞逺隨君别湯萬戶半生湖海識君遲可奈相逢是别期扁舟獨泛秋溪水採得芙蓉欲贈誰送吕二守西征二